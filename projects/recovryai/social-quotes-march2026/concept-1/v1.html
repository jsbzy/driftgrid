<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden;
}
body {
  width: 1200px; height: 627px;
  background: #F5F7FA;
  font-family: 'IBM Plex Mono', monospace;
  position: relative;
  -webkit-font-smoothing: antialiased;
}
.grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(62,181,166,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(62,181,166,0.07) 1px, transparent 1px);
  background-size: 60px 60px;
}
.card {
  position: absolute; inset: 0;
  margin: 56px 80px;
  padding: 48px 80px 48px 96px;
  border-left: 3px solid #3EB5A6;
  display: flex; flex-direction: column; justify-content: center;
}
.source {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.13em; text-transform: uppercase;
  color: #3EB5A6; margin-bottom: 22px;
}
.quote { font-size: 24px; font-weight: 400; line-height: 1.6; color: #1a1a1a; margin-bottom: 26px; }
.quote em { font-style: normal; color: #3EB5A6; }
.attr-name { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 3px; }
.attr-title { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; color: #888; }
.logo { position: absolute; bottom: 44px; right: 80px; }
.logo img { height: 80px; width: auto; display: block; }
@media print {
  html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style></head>
<body>
<div class="grid"></div>

<div class="card">
  <div class="source" data-drift-editable="source" data-drift-maxlen="60">STAT News &nbsp;&middot;&nbsp; March 3, 2026</div>
  <div class="quote" data-drift-editable="quote" data-drift-maxlen="300">&ldquo;Because we are in fact <em>influencing behaviors</em> or <em>influencing patient care</em>, that is the bright line.&rdquo;</div>
  <div class="attr-name" data-drift-editable="attribution-name" data-drift-maxlen="60">Scott Walchek</div>
  <div class="attr-title" data-drift-editable="attribution-title" data-drift-maxlen="120">CEO &amp; Co-Founder, RecovryAI &nbsp;&middot;&nbsp; as quoted in STAT News</div>
</div>
<div class="logo"><img src="../../brand/logos/logo-color-dark.svg" alt="RecovryAI"></div>
</body></html>
