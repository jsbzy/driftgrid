<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11 — Clinic at a Glance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #F4F2EE; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 80px; gap: 20px; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .browser { width: 100%; max-width: 1300px; height: 620px; border: 2px solid #C8C6C1; border-radius: 10px; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
        .bbar { height: 30px; background: #F0EEEA; border-bottom: 1px solid #E8E6E1; display: flex; align-items: center; padding: 0 12px; gap: 5px; }
        .bd { width: 8px; height: 8px; border-radius: 50%; }
        .bd.r { background: #FF5F56; } .bd.y { background: #FFBD2E; } .bd.g { background: #27C93F; }
        .portal { flex: 1; display: flex; }
        .sb { width: 44px; background: #F9F8F6; border-right: 1px solid #E8E6E1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 4px; }
        .sb-logo { width: 24px; height: 24px; background: #33B5B0; border-radius: 6px; margin-bottom: 12px; }
        .sb-dot { width: 24px; height: 24px; border-radius: 5px; }
        .sb-dot.active { background: #E8E6E1; }
        .main { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; }
        .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .tb-title { width: 140px; height: 10px; background: #E8E6E1; border-radius: 4px; }
        .tb-tabs { display: flex; gap: 3px; margin-left: 20px; }
        .tb-tab { width: 60px; height: 24px; border-radius: 5px; background: #F0EEEA; }
        .tb-tab.active { background: #1B1B1A; }
        .tb-actions { display: flex; gap: 4px; margin-left: auto; }
        .tb-btn { width: 56px; height: 24px; border-radius: 5px; border: 1px solid #E8E6E1; }
        .tb-btn.add { background: #1B1B1A; border: none; }

        .table { flex: 1; display: flex; flex-direction: column; }
        .t-head { display: flex; padding: 10px 12px; border-bottom: 1px solid #E8E6E1; }
        .th { height: 5px; background: #E8E6E1; border-radius: 2px; }
        .t-row { display: flex; align-items: center; padding: 12px 12px; border-bottom: 1px solid #F0EEEA; }
        .tc-name { width: 180px; display: flex; align-items: center; gap: 8px; }
        .tc-av { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid #D0D0CC; }
        .tc-lines { display: flex; flex-direction: column; gap: 3px; }
        .tc-l { background: #E8E6E1; border-radius: 2px; }
        .tc-l.a { width: 70px; height: 5px; }
        .tc-l.b { width: 30px; height: 4px; }
        .tc-score { width: 100px; }
        .tc-score-bar { width: 36px; height: 7px; border-radius: 3px; }
        .tc-assigned { width: 160px; }
        .tc-al { width: 100px; height: 5px; background: #E8E6E1; border-radius: 2px; }
        .tc-pod { width: 60px; }
        .tc-pl { width: 20px; height: 5px; background: #E8E6E1; border-radius: 2px; }
        .tc-pain { width: 100px; display: flex; align-items: center; gap: 6px; }
        .tc-dot { width: 7px; height: 7px; border-radius: 50%; }
        .tc-dot.green { background: #33B5B0; }
        .tc-dot.amber { background: #D49150; }
        .tc-dot.red { background: #E05555; }
        .tc-pain-l { width: 40px; height: 5px; background: #E8E6E1; border-radius: 2px; }
        .tc-seen { width: 100px; }
        .tc-sl { width: 60px; height: 4px; background: #F0EEEA; border-radius: 2px; }
        .tc-action { flex: 1; display: flex; justify-content: flex-end; }
        .tc-link { width: 60px; height: 5px; background: #33B5B0; border-radius: 2px; opacity: 0.3; }

        .caption { position: absolute; bottom: 40px; left: 0; right: 0; text-align: center; padding: 0 180px; font-size: 19px; font-weight: 400; color: #8A8A86; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="browser">
        <div class="bbar"><div class="bd r"></div><div class="bd y"></div><div class="bd g"></div></div>
        <div class="portal">
            <div class="sb"><div class="sb-logo"></div><div class="sb-dot"></div><div class="sb-dot active"></div><div class="sb-dot"></div><div class="sb-dot"></div></div>
            <div class="main">
                <div class="top-bar">
                    <div class="tb-title"></div>
                    <div class="tb-tabs"><div class="tb-tab"></div><div class="tb-tab"></div><div class="tb-tab active"></div><div class="tb-tab"></div></div>
                    <div class="tb-actions"><div class="tb-btn"></div><div class="tb-btn"></div><div class="tb-btn add"></div></div>
                </div>
                <div class="table">
                    <div class="t-head">
                        <div class="tc-name"><div style="width:70px;"><div class="th" style="width:40px;"></div></div></div>
                        <div class="tc-score"><div class="th" style="width:70px;"></div></div>
                        <div class="tc-assigned"><div class="th" style="width:60px;"></div></div>
                        <div class="tc-pod"><div class="th" style="width:24px;"></div></div>
                        <div class="tc-pain"><div class="th" style="width:50px;"></div></div>
                        <div class="tc-seen"><div class="th" style="width:48px;"></div></div>
                    </div>
                    <div class="t-row"><div class="tc-name"><div class="tc-av"></div><div class="tc-lines"><div class="tc-l a"></div><div class="tc-l b"></div></div></div><div class="tc-score"><div class="tc-score-bar" style="background:#E05555;"></div></div><div class="tc-assigned"><div class="tc-al"></div></div><div class="tc-pod"><div class="tc-pl"></div></div><div class="tc-pain"><div class="tc-dot red"></div><div class="tc-pain-l"></div></div><div class="tc-seen"><div class="tc-sl"></div></div><div class="tc-action"><div class="tc-link"></div></div></div>
                    <div class="t-row"><div class="tc-name"><div class="tc-av"></div><div class="tc-lines"><div class="tc-l a"></div><div class="tc-l b"></div></div></div><div class="tc-score"><div class="tc-score-bar" style="background:#E05555;"></div></div><div class="tc-assigned"><div class="tc-al"></div></div><div class="tc-pod"><div class="tc-pl"></div></div><div class="tc-pain"><div class="tc-dot amber"></div><div class="tc-pain-l"></div></div><div class="tc-seen"><div class="tc-sl"></div></div><div class="tc-action"><div class="tc-link"></div></div></div>
                    <div class="t-row"><div class="tc-name"><div class="tc-av"></div><div class="tc-lines"><div class="tc-l a"></div><div class="tc-l b"></div></div></div><div class="tc-score"><div class="tc-score-bar" style="background:#33B5B0;"></div></div><div class="tc-assigned"><div class="tc-al"></div></div><div class="tc-pod"><div class="tc-pl"></div></div><div class="tc-pain"><div class="tc-dot green"></div><div class="tc-pain-l"></div></div><div class="tc-seen"><div class="tc-sl"></div></div><div class="tc-action"><div class="tc-link"></div></div></div>
                    <div class="t-row"><div class="tc-name"><div class="tc-av"></div><div class="tc-lines"><div class="tc-l a"></div><div class="tc-l b"></div></div></div><div class="tc-score"><div class="tc-score-bar" style="background:#E05555;"></div></div><div class="tc-assigned"><div class="tc-al"></div></div><div class="tc-pod"><div class="tc-pl"></div></div><div class="tc-pain"><div class="tc-dot green"></div><div class="tc-pain-l"></div></div><div class="tc-seen"><div class="tc-sl"></div></div><div class="tc-action"><div class="tc-link"></div></div></div>
                    <div class="t-row"><div class="tc-name"><div class="tc-av"></div><div class="tc-lines"><div class="tc-l a"></div><div class="tc-l b"></div></div></div><div class="tc-score"><div class="tc-score-bar" style="background:#33B5B0;"></div></div><div class="tc-assigned"><div class="tc-al"></div></div><div class="tc-pod"><div class="tc-pl"></div></div><div class="tc-pain"><div class="tc-dot amber"></div><div class="tc-pain-l"></div></div><div class="tc-seen"><div class="tc-sl"></div></div><div class="tc-action"><div class="tc-link"></div></div></div>
                    <div class="t-row"><div class="tc-name"><div class="tc-av"></div><div class="tc-lines"><div class="tc-l a"></div><div class="tc-l b"></div></div></div><div class="tc-score"><div class="tc-score-bar" style="background:#E05555;"></div></div><div class="tc-assigned"><div class="tc-al"></div></div><div class="tc-pod"><div class="tc-pl"></div></div><div class="tc-pain"><div class="tc-dot red"></div><div class="tc-pain-l"></div></div><div class="tc-seen"><div class="tc-sl"></div></div><div class="tc-action"><div class="tc-link"></div></div></div>
                    <div class="t-row"><div class="tc-name"><div class="tc-av"></div><div class="tc-lines"><div class="tc-l a"></div><div class="tc-l b"></div></div></div><div class="tc-score"><div class="tc-score-bar" style="background:#33B5B0;"></div></div><div class="tc-assigned"><div class="tc-al"></div></div><div class="tc-pod"><div class="tc-pl"></div></div><div class="tc-pain"><div class="tc-dot amber"></div><div class="tc-pain-l"></div></div><div class="tc-seen"><div class="tc-sl"></div></div><div class="tc-action"><div class="tc-link"></div></div></div>
                </div>
            </div>
        </div>
    </div>
    <div class="caption">At a glance, the care team sees every patient — who's on track, who needs attention, who needs it now. Continuous visibility across the entire recovery window.</div>
</body>
</html>
