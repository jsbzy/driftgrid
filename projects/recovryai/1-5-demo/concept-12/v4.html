<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat 12 — Close</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;
            background: #F4F2EE;
            display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 28px;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .logo { width: 56px; height: 56px; border: 2px solid #33B5B0; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .logo-inner { width: 20px; height: 20px; background: #33B5B0; border-radius: 4px; }
        .wordmark { font-size: 48px; font-weight: 600; letter-spacing: -0.03em; color: #1B1B1A; }
        .wordmark span { color: #33B5B0; }
        .tagline { font-size: 17px; font-weight: 400; color: #8A8A86; margin-top: -4px; }
        .url { font-size: 17px; font-weight: 500; color: #33B5B0; margin-top: 12px; }
        .fda { padding: 8px 18px; border: 1px solid #D0D0CC; border-radius: 8px; font-size: 12px; color: #8A8A86; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="logo"><div class="logo-inner"></div></div>
    <div class="wordmark">recovry<span>.</span>ai</div>
    <div class="tagline">Physician-Prescribed AI for Post-Operative Recovery</div>
    <div class="url">recovry.ai</div>
    <div class="fda">FDA Breakthrough Device Designation</div>
</body>
</html>
