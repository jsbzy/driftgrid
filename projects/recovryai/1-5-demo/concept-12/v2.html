<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat 12 — Close (Wireframe)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #F5F7FA; color: #1a1a1a; display: flex; align-items: center; justify-content: center; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        .endcard {
            display: flex; flex-direction: column; align-items: center; gap: 32px;
        }
        .logo-area {
            width: 160px; height: 160px; border: 2px dashed #D0D5DC; border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-area span { font-size: 14px; color: #3EB5A6; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 500; }
        .wordmark {
            font-size: 48px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.02em;
        }
        .wordmark span { color: #3EB5A6; }
        .tagline {
            font-size: 18px; font-weight: 300; color: #999; letter-spacing: 0.02em;
        }
        .url {
            font-size: 16px; font-weight: 500; color: #3EB5A6; letter-spacing: 0.04em;
            margin-top: 16px;
        }
        .fda-badge {
            display: flex; align-items: center; gap: 8px; margin-top: 8px;
            padding: 8px 16px; border: 1px solid #D0D5DC; border-radius: 8px;
        }
        .fda-badge span { font-size: 11px; color: #aaa; }
    </style>
</head>
<body>
    <div class="endcard">
        <div class="logo-area"><span>Logo Mark</span></div>
        <div class="wordmark">Recovry<span>AI</span></div>
        <div class="tagline">Physician-Prescribed AI for Post-Operative Recovery</div>
        <div class="url">recovry.ai</div>
        <div class="fda-badge">
            <span>FDA Breakthrough Device Designation</span>
        </div>
    </div>
</body>
</html>
