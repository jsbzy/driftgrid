<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat 12 — Close</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #F4F2EE;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 32px;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        .logo-mark {
            width: 72px; height: 72px;
        }
        .logo-mark svg { width: 72px; height: 72px; }

        .wordmark {
            font-size: 52px; font-weight: 600; letter-spacing: -0.02em; color: #1B1B1A;
        }
        .wordmark span { color: #33B5B0; }

        .tagline {
            font-size: 19px; font-weight: 400; color: #6B6B68;
            margin-top: -8px;
        }

        .url {
            font-size: 18px; font-weight: 500; color: #33B5B0;
            margin-top: 16px; letter-spacing: 0.02em;
        }

        .fda-badge {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px; border: 1px solid #D0D0CC; border-radius: 10px;
            margin-top: 8px;
        }
        .fda-badge span {
            font-size: 12px; color: #6B6B68; font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="logo-mark">
        <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="6" width="60" height="60" rx="15" fill="#33B5B0"/>
            <path d="M36 20L40 32H52L42 40L46 52L36 44L26 52L30 40L20 32H32L36 20Z" fill="white"/>
        </svg>
    </div>
    <div class="wordmark" data-drift-editable="wordmark" data-drift-maxlen="20">recovry<span>.</span>ai</div>
    <div class="tagline" data-drift-editable="tagline" data-drift-maxlen="80">Physician-Prescribed AI for Post-Operative Recovery</div>
    <div class="url" data-drift-editable="url" data-drift-maxlen="30">recovry.ai</div>
    <div class="fda-badge">
        <span>FDA Breakthrough Device Designation</span>
    </div>
</body>
</html>
