<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>08 — Provider Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #F4F2EE; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 80px; gap: 20px; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .browser { width: 100%; max-width: 1300px; height: 620px; border: 2px solid #C8C6C1; border-radius: 10px; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
        .bbar { height: 30px; background: #F0EEEA; border-bottom: 1px solid #E8E6E1; display: flex; align-items: center; padding: 0 12px; gap: 5px; }
        .bd { width: 8px; height: 8px; border-radius: 50%; }
        .bd.r { background: #FF5F56; } .bd.y { background: #FFBD2E; } .bd.g { background: #27C93F; }
        .portal { flex: 1; display: flex; }
        .sb { width: 44px; background: #F9F8F6; border-right: 1px solid #E8E6E1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 4px; }
        .sb-logo { width: 24px; height: 24px; background: #33B5B0; border-radius: 6px; margin-bottom: 12px; }
        .sb-dot { width: 24px; height: 24px; border-radius: 5px; border: 1px solid #E8E6E1; }
        .sb-dot.active { background: #E8E6E1; }
        .panel { border-right: 1px solid #E8E6E1; display: flex; flex-direction: column; padding: 16px; overflow: hidden; }
        .panel.left { width: 220px; }
        .panel.center { flex: 1; }
        .panel.right { width: 200px; border-right: none; }
        .rect { background: #E8E6E1; border-radius: 4px; }
        .rect.card { background: #F9F8F6; border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px; }
        .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .circ { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid #E8E6E1; flex-shrink: 0; }
        .circ.sm { width: 20px; height: 20px; }
        .lines { display: flex; flex-direction: column; gap: 3px; }
        .l { background: #E8E6E1; border-radius: 3px; }
        .l.w60 { width: 60px; height: 6px; }
        .l.w80 { width: 80px; height: 6px; }
        .l.w100 { width: 100px; height: 5px; }
        .l.w120 { width: 120px; height: 5px; }
        .l.w40 { width: 40px; height: 5px; }
        .info-block { background: #F9F8F6; border-radius: 8px; padding: 10px; margin-bottom: 6px; }
        .info-val { width: 40px; height: 18px; background: #33B5B0; border-radius: 4px; opacity: 0.15; margin: 4px 0; }
        .stat-r { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #F0EEEA; }
        .msg-r { border-radius: 12px; margin-bottom: 6px; }
        .msg-r.bot { background: #F0EEEA; height: 40px; width: 65%; border-bottom-left-radius: 3px; }
        .msg-r.pt { background: #1B1B1A; height: 32px; width: 60%; align-self: flex-end; border-bottom-right-radius: 3px; margin-left: auto; }
        .report-r { border: 1px solid #E8E6E1; border-radius: 8px; padding: 8px; width: 55%; margin-bottom: 6px; }
        .hist-item { padding: 8px 0; border-bottom: 1px solid #F0EEEA; display: flex; flex-direction: column; gap: 4px; }
        .caption { position: absolute; bottom: 40px; left: 0; right: 0; text-align: center; padding: 0 200px; font-size: 19px; font-weight: 400; color: #8A8A86; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="browser">
        <div class="bbar"><div class="bd r"></div><div class="bd y"></div><div class="bd g"></div></div>
        <div class="portal">
            <div class="sb">
                <div class="sb-logo"></div>
                <div class="sb-dot"></div>
                <div class="sb-dot active"></div>
                <div class="sb-dot"></div>
                <div class="sb-dot"></div>
            </div>
            <div class="panel left">
                <div class="row"><div class="circ"></div><div class="lines"><div class="l w80"></div><div class="l w60"></div></div></div>
                <div class="info-block"><div class="l w60"></div><div class="info-val"></div><div class="l w40"></div></div>
                <div class="stat-r"><div class="l w60"></div><div class="l w40"></div></div>
                <div class="stat-r"><div class="l w60"></div><div class="l w40"></div></div>
                <div class="stat-r"><div class="l w60"></div><div class="l w40"></div></div>
                <div class="stat-r"><div class="l w60"></div><div class="l w40"></div></div>
                <div style="margin-top: 12px;"><div class="l w80" style="margin-bottom: 6px;"></div><div class="l w120"></div></div>
                <div style="margin-top: 8px;"><div class="l w80" style="margin-bottom: 6px;"></div><div class="l w100"></div></div>
            </div>
            <div class="panel center">
                <div style="display:flex;margin-bottom:12px;"><div style="display:flex;background:#F0EEEA;border-radius:14px;padding:2px;width:180px;"><div style="flex:1;height:22px;border-radius:12px;background:#fff;"></div><div style="flex:1;height:22px;border-radius:12px;"></div></div></div>
                <div style="display:flex;flex-direction:column;gap:8px;flex:1;">
                    <div class="msg-r bot"></div>
                    <div class="msg-r pt"></div>
                    <div class="report-r"><div class="l w60" style="margin-bottom:4px;"></div><div class="l w80" style="margin-bottom:3px;"></div><div class="l w40"></div></div>
                    <div class="msg-r bot"></div>
                    <div class="msg-r pt"></div>
                    <div class="msg-r bot"></div>
                </div>
            </div>
            <div class="panel right">
                <div class="l w80" style="margin-bottom: 12px; height: 8px;"></div>
                <div class="hist-item"><div class="l w60"></div><div class="l w120"></div></div>
                <div class="hist-item"><div class="l w60"></div><div class="row" style="margin:4px 0 0;"><div class="circ sm"></div><div class="lines"><div class="l w80"></div><div class="l w60"></div></div></div></div>
                <div class="hist-item"><div class="l w60"></div><div class="l w120"></div><div class="l w100"></div></div>
            </div>
        </div>
    </div>
    <div class="caption">On the provider side, the care team sees everything — the patient's score, the full conversation, and a clinical summary. Nothing is lost between visits.</div>
</body>
</html>
