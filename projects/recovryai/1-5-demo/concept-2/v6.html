<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02 — The App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #F4F2EE; display: flex; align-items: center; justify-content: center; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .phone { width: 300px; height: 600px; border: 2.5px solid #C8C6C1; border-radius: 40px; background: #fff; display: flex; flex-direction: column; padding: 20px 18px; }
        .notch { width: 70px; height: 5px; background: #E8E6E1; border-radius: 3px; align-self: center; margin-bottom: 20px; }
        .welcome { display: flex; align-items: center; gap: 12px; padding: 0 4px 16px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #E8E6E1; }
        .name-lines { display: flex; flex-direction: column; gap: 4px; }
        .line { background: #E8E6E1; border-radius: 3px; }
        .line.w120 { width: 120px; height: 8px; }
        .line.w80 { width: 80px; height: 6px; }
        .score-card { border: 2px solid #E8E6E1; border-radius: 16px; padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 16px; }
        .score-label { width: 100px; height: 6px; background: #E8E6E1; border-radius: 3px; }
        .score-num { width: 80px; height: 28px; background: #33B5B0; border-radius: 6px; opacity: 0.15; position: relative; }
        .score-num::after { content: ''; position: absolute; inset: 4px; background: #33B5B0; border-radius: 3px; opacity: 0.6; }
        .score-badge { width: 160px; height: 6px; background: #E8E6E1; border-radius: 3px; }
        .pain-row { display: flex; align-items: center; gap: 12px; padding: 12px 4px; }
        .pain-circle { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #E8E6E1; }
        .pain-lines { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 4px; border-bottom: 1px solid #F0EEEA; }
        .stat-name { width: 60px; height: 6px; background: #E8E6E1; border-radius: 3px; }
        .stat-val { width: 28px; height: 8px; background: #E8E6E1; border-radius: 3px; }
        .nav { margin-top: auto; height: 40px; border-top: 1px solid #E8E6E1; display: flex; align-items: center; justify-content: space-around; padding-top: 8px; }
        .nav-dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid #D0D0CC; }
        .nav-dot.active { background: #33B5B0; border-color: #33B5B0; }
        .nav-center { width: 24px; height: 24px; border-radius: 50%; background: #33B5B0; }
        .home-bar { width: 36px; height: 3px; background: #D0D0CC; border-radius: 2px; align-self: center; margin-top: 8px; }
        .caption { position: absolute; bottom: 56px; left: 0; right: 0; text-align: center; padding: 0 240px; font-size: 19px; font-weight: 400; color: #8A8A86; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="notch"></div>
        <div class="welcome">
            <div class="avatar"></div>
            <div class="name-lines"><div class="line w120"></div><div class="line w80"></div></div>
        </div>
        <div class="score-card">
            <div class="score-label"></div>
            <div class="score-num"></div>
            <div class="score-badge"></div>
        </div>
        <div class="pain-row">
            <div class="pain-circle"></div>
            <div class="pain-lines"><div class="line w80"></div><div class="line w120"></div></div>
        </div>
        <div class="stat-row"><div class="stat-name"></div><div class="stat-val"></div></div>
        <div class="stat-row"><div class="stat-name"></div><div class="stat-val"></div></div>
        <div class="stat-row"><div class="stat-name"></div><div class="stat-val"></div></div>
        <div class="stat-row"><div class="stat-name"></div><div class="stat-val"></div></div>
        <div class="nav">
            <div class="nav-dot active"></div>
            <div class="nav-dot"></div>
            <div class="nav-center"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
        </div>
        <div class="home-bar"></div>
    </div>
    <div class="caption">A physician prescribes RecovryAI at discharge. The patient opens the app and meets their Virtual Care Assistant.</div>
</body>
</html>
