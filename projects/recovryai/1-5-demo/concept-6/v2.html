<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat 6 — Journey Over Time (Wireframe)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #F5F7FA; color: #1a1a1a; display: flex; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .meta-strip { width: 280px; min-width: 280px; background: #EBEEF2; padding: 48px 32px; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid #D0D5DC; }
        .beat-num { font-size: 48px; font-weight: 700; color: #3EB5A6; line-height: 1; }
        .beat-title { font-size: 20px; font-weight: 600; margin-top: 8px; color: #1a1a1a; }
        .beat-time { font-size: 12px; color: #999; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
        .vo-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #3EB5A6; margin-bottom: 8px; }
        .vo-text { font-size: 14px; font-weight: 300; line-height: 1.6; color: #555; }
        .vo-text em { font-style: normal; color: #3EB5A6; font-weight: 500; }
        .canvas { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px; }

        .timeline-container { display: flex; flex-direction: column; align-items: center; gap: 40px; width: 100%; max-width: 900px; }

        .phones-row { display: flex; align-items: flex-end; justify-content: center; gap: 20px; }
        .wf-phone-sm { width: 120px; height: 240px; border: 1.5px solid #D0D5DC; border-radius: 18px; display: flex; flex-direction: column; padding: 8px 6px; background: #FFFFFF; opacity: 0.5; transition: opacity 0.3s; }
        .wf-phone-sm.active { opacity: 1; border-color: #3EB5A6; }
        .wf-phone-sm .notch { width: 30px; height: 3px; background: #D0D5DC; border-radius: 2px; align-self: center; margin-bottom: 6px; }
        .wf-phone-sm .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
        .wf-phone-sm .score { font-size: 20px; font-weight: 700; color: #3EB5A6; }
        .wf-phone-sm .day { font-size: 7px; color: #aaa; text-transform: uppercase; }
        .wf-phone-sm .bars { display: flex; gap: 2px; align-items: flex-end; height: 20px; }
        .wf-phone-sm .bar { width: 4px; background: #D0D5DC; border-radius: 1px; }
        .wf-phone-sm.active .bar { background: #3EB5A6; }

        .timeline-track { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .track-line { width: 100%; height: 2px; background: linear-gradient(to right, #3EB5A6, #3EB5A6 60%, #D0D5DC 60%); border-radius: 1px; }
        .track-labels { display: flex; justify-content: space-between; }
        .track-label { font-size: 9px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; }
        .track-label.active { color: #3EB5A6; }

        .score-graph { width: 100%; height: 80px; position: relative; }
        .graph-line { position: absolute; inset: 0; }
        .graph-area { fill: rgba(62, 181, 166, 0.1); }
        .graph-stroke { fill: none; stroke: #3EB5A6; stroke-width: 2; }
        .graph-dot { fill: #3EB5A6; }
        .graph-grid { stroke: #E8ECF0; stroke-width: 1; }

        .callout { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; }
    </style>
</head>
<body>
    <div class="meta-strip">
        <div>
            <div class="beat-num">06</div>
            <div class="beat-title">Journey Over Time</div>
            <div class="beat-time">48 – 58 sec</div>
        </div>
        <div>
            <div class="vo-label">Voiceover</div>
            <div class="vo-text">"The patient checks in daily. The VCA <em>monitors trends</em> and adapts its guidance as recovery progresses."</div>
        </div>
    </div>
    <div class="canvas">
        <div class="timeline-container">
            <div class="callout">Days tick forward — score builds over time</div>

            <div class="phones-row">
                <div class="wf-phone-sm">
                    <div class="notch"></div>
                    <div class="content">
                        <div class="score">45</div>
                        <div class="day">Day 1</div>
                        <div class="bars"><div class="bar" style="height: 8px;"></div><div class="bar" style="height: 12px;"></div><div class="bar" style="height: 6px;"></div></div>
                    </div>
                </div>
                <div class="wf-phone-sm">
                    <div class="notch"></div>
                    <div class="content">
                        <div class="score">58</div>
                        <div class="day">Day 4</div>
                        <div class="bars"><div class="bar" style="height: 10px;"></div><div class="bar" style="height: 14px;"></div><div class="bar" style="height: 10px;"></div></div>
                    </div>
                </div>
                <div class="wf-phone-sm active">
                    <div class="notch"></div>
                    <div class="content">
                        <div class="score">72</div>
                        <div class="day">Day 7</div>
                        <div class="bars"><div class="bar" style="height: 14px;"></div><div class="bar" style="height: 16px;"></div><div class="bar" style="height: 12px;"></div></div>
                    </div>
                </div>
                <div class="wf-phone-sm">
                    <div class="notch"></div>
                    <div class="content">
                        <div class="score">81</div>
                        <div class="day">Day 12</div>
                        <div class="bars"><div class="bar" style="height: 16px;"></div><div class="bar" style="height: 18px;"></div><div class="bar" style="height: 14px;"></div></div>
                    </div>
                </div>
                <div class="wf-phone-sm">
                    <div class="notch"></div>
                    <div class="content">
                        <div class="score">89</div>
                        <div class="day">Day 20</div>
                        <div class="bars"><div class="bar" style="height: 18px;"></div><div class="bar" style="height: 20px;"></div><div class="bar" style="height: 16px;"></div></div>
                    </div>
                </div>
            </div>

            <div class="score-graph">
                <svg width="100%" height="80" viewBox="0 0 900 80" preserveAspectRatio="none">
                    <line x1="0" y1="20" x2="900" y2="20" class="graph-grid" />
                    <line x1="0" y1="40" x2="900" y2="40" class="graph-grid" />
                    <line x1="0" y1="60" x2="900" y2="60" class="graph-grid" />
                    <path d="M0,65 L150,50 L300,38 L450,24 L600,14 L750,8 L900,8" class="graph-stroke" />
                    <path d="M0,65 L150,50 L300,38 L450,24 L600,14 L750,8 L900,8 L900,80 L0,80 Z" class="graph-area" />
                    <circle cx="0" cy="65" r="4" class="graph-dot" />
                    <circle cx="150" cy="50" r="4" class="graph-dot" />
                    <circle cx="300" cy="38" r="5" class="graph-dot" />
                    <circle cx="450" cy="24" r="4" class="graph-dot" />
                    <circle cx="600" cy="14" r="4" class="graph-dot" />
                </svg>
            </div>

            <div class="timeline-track">
                <div class="track-line"></div>
                <div class="track-labels">
                    <span class="track-label active">Day 1</span>
                    <span class="track-label active">Day 7</span>
                    <span class="track-label active">Day 14</span>
                    <span class="track-label">Day 21</span>
                    <span class="track-label">Day 30</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
