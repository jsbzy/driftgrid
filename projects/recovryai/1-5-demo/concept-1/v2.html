<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat 1 — Open (Wireframe)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #F5F7FA; color: #1a1a1a; display: flex; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        .meta-strip {
            width: 280px; min-width: 280px; background: #EBEEF2; padding: 48px 32px;
            display: flex; flex-direction: column; justify-content: space-between;
            border-right: 1px solid #D0D5DC;
        }
        .beat-num { font-size: 48px; font-weight: 700; color: #3EB5A6; line-height: 1; }
        .beat-title { font-size: 20px; font-weight: 600; margin-top: 8px; color: #1a1a1a; }
        .beat-time { font-size: 12px; color: #999; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
        .vo-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #3EB5A6; margin-bottom: 8px; }
        .vo-text { font-size: 14px; font-weight: 300; line-height: 1.6; color: #555; }
        .vo-text em { font-style: normal; color: #3EB5A6; font-weight: 500; }

        .canvas {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 48px; position: relative;
        }
        .frame-area {
            width: 100%; max-width: 1200px; height: 100%;
            display: flex; align-items: center; justify-content: center; gap: 80px;
            position: relative;
        }

        /* Wireframe elements */
        .wf-logo-block {
            display: flex; flex-direction: column; align-items: center; gap: 24px;
        }
        .wf-logo {
            width: 200px; height: 200px; border: 2px dashed #D0D5DC; border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            color: #3EB5A6; font-size: 14px; font-weight: 500; text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .wf-wordmark {
            width: 320px; height: 48px; border: 2px dashed #D0D5DC; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #aaa; font-size: 12px; font-weight: 500; text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .wf-tagline {
            width: 480px; height: 32px; border: 1px dashed #D0D5DC; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            color: #333; font-size: 11px; letter-spacing: 0.05em;
        }

        .wf-arrow {
            display: flex; align-items: center; gap: 8px; color: #333;
        }
        .wf-arrow-line { width: 60px; height: 1px; background: #333; }
        .wf-arrow-head { width: 0; height: 0; border-left: 6px solid #333; border-top: 4px solid transparent; border-bottom: 4px solid transparent; }

        .wf-phone {
            width: 220px; height: 440px; border: 2px solid #D0D5DC; border-radius: 28px;
            display: flex; flex-direction: column; align-items: center; padding: 16px 12px;
            position: relative; background: #FFFFFF;
        }
        .wf-phone-notch {
            width: 80px; height: 6px; background: #D0D5DC; border-radius: 3px; margin-bottom: 16px;
        }
        .wf-phone-content {
            flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 12px;
        }
        .wf-phone-bar {
            width: 40px; height: 4px; background: #D0D5DC; border-radius: 2px;
        }
        .wf-label {
            font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em;
            text-align: center; margin-top: 4px;
        }

        .callout {
            position: absolute; font-size: 10px; color: #aaa;
            text-transform: uppercase; letter-spacing: 0.06em;
            display: flex; align-items: center; gap: 6px;
        }
        .callout-dot { width: 6px; height: 6px; border-radius: 50%; background: #3EB5A6; }
        .callout-top { top: 24px; left: 50%; transform: translateX(-50%); }
        .callout-bottom { bottom: 24px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>
    <div class="meta-strip">
        <div>
            <div class="beat-num">01</div>
            <div class="beat-title">Open</div>
            <div class="beat-time">0 – 8 sec</div>
        </div>
        <div>
            <div class="vo-label">Voiceover</div>
            <div class="vo-text">"<em>RecovryAI.</em> Physician-prescribed AI for post-operative recovery."</div>
        </div>
    </div>
    <div class="canvas">
        <div class="frame-area">
            <div class="callout callout-top"><div class="callout-dot"></div> Logo animates in first, wordmark follows</div>

            <div class="wf-logo-block">
                <div class="wf-logo">Logo Mark</div>
                <div class="wf-wordmark">RecovryAI Wordmark</div>
                <div class="wf-tagline">Physician-Prescribed AI for Post-Operative Recovery</div>
            </div>

            <div class="wf-arrow">
                <div class="wf-arrow-line"></div>
                <div class="wf-arrow-head"></div>
            </div>

            <div class="wf-phone">
                <div class="wf-phone-notch"></div>
                <div class="wf-phone-content">
                    <div style="width: 60px; height: 60px; border: 2px dashed #D0D5DC; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                        <span style="font-size: 10px; color: #333;">LOGO</span>
                    </div>
                    <div style="width: 120px; height: 8px; background: #D0D5DC; border-radius: 4px;"></div>
                    <div style="width: 80px; height: 6px; background: #E8ECF0; border-radius: 3px;"></div>
                </div>
                <div class="wf-phone-bar"></div>
            </div>

            <div class="callout callout-bottom"><div class="callout-dot"></div> Transition: logo dissolves into app splash</div>
        </div>
    </div>
</body>
</html>
