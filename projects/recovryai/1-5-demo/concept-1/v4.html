<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat 1 — Open</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;
            background: #F4F2EE;
            display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 28px;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .logo-mark { width: 64px; height: 64px; border: 2px solid #33B5B0; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .logo-inner { width: 24px; height: 24px; background: #33B5B0; border-radius: 4px; }
        .wordmark { font-size: 52px; font-weight: 600; letter-spacing: -0.03em; color: #1B1B1A; }
        .wordmark span { color: #33B5B0; }
        .tagline { font-size: 18px; font-weight: 400; color: #8A8A86; margin-top: -4px; letter-spacing: 0.01em; }
        .vo {
            position: absolute; bottom: 56px; left: 0; right: 0;
            text-align: center; padding: 0 240px;
            font-size: 17px; font-weight: 400; color: #8A8A86; line-height: 1.6;
        }
        .vo em { font-style: normal; color: #33B5B0; font-weight: 500; }
    </style>
</head>
<body>
    <div class="logo-mark"><div class="logo-inner"></div></div>
    <div class="wordmark">recovry<span>.</span>ai</div>
    <div class="tagline">Physician-Prescribed AI for Post-Operative Recovery</div>
    <div class="vo">"Every year, millions of patients are sent home after surgery with little more than a printed discharge sheet. <em>RecovryAI changes that.</em>"</div>
</body>
</html>
