<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>09 — Alerts & Action</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #F4F2EE; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 80px; gap: 20px; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .browser { width: 100%; max-width: 1300px; height: 620px; border: 2px solid #C8C6C1; border-radius: 10px; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
        .bbar { height: 30px; background: #F0EEEA; border-bottom: 1px solid #E8E6E1; display: flex; align-items: center; padding: 0 12px; gap: 5px; }
        .bd { width: 8px; height: 8px; border-radius: 50%; }
        .bd.r { background: #FF5F56; } .bd.y { background: #FFBD2E; } .bd.g { background: #27C93F; }
        .board { flex: 1; display: flex; }
        .sb { width: 44px; background: #F9F8F6; border-right: 1px solid #E8E6E1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 4px; }
        .sb-logo { width: 24px; height: 24px; background: #33B5B0; border-radius: 6px; margin-bottom: 12px; }
        .sb-dot { width: 24px; height: 24px; border-radius: 5px; }
        .sb-dot.active { background: #E8E6E1; }
        .col { flex: 1; border-right: 1px solid #E8E6E1; display: flex; flex-direction: column; }
        .col:last-child { border-right: none; }
        .col-head { padding: 12px 12px; border-bottom: 1px solid #E8E6E1; display: flex; align-items: center; gap: 6px; }
        .ch-line { width: 100px; height: 7px; background: #E8E6E1; border-radius: 3px; }
        .ch-badge { width: 8px; height: 8px; border-radius: 50%; }
        .ch-badge.red { background: #E05555; }
        .ch-badge.amber { background: #D49150; }
        .ch-badge.green { background: #33B5B0; }
        .col-body { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .card { background: #F9F8F6; border-radius: 8px; padding: 10px; border-left: 3px solid transparent; display: flex; flex-direction: column; gap: 6px; }
        .card.urgent { border-left-color: #E05555; }
        .card.review { border-left-color: #D49150; }
        .card.resolved { opacity: 0.4; }
        .card-head { display: flex; align-items: center; gap: 6px; }
        .c-av { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #D0D0CC; }
        .c-lines { display: flex; flex-direction: column; gap: 2px; }
        .cl { background: #E8E6E1; border-radius: 2px; }
        .cl.a { width: 60px; height: 5px; }
        .cl.b { width: 40px; height: 4px; }
        .c-status { width: 6px; height: 6px; border-radius: 50%; background: #33B5B0; margin-left: auto; }
        .c-body { display: flex; flex-direction: column; gap: 3px; }
        .cb { background: #E8E6E1; border-radius: 2px; height: 4px; }
        .cb.w80 { width: 80%; }
        .cb.w60 { width: 60%; }
        .c-foot { display: flex; justify-content: space-between; }
        .cf { width: 40px; height: 4px; background: #E8E6E1; border-radius: 2px; }
        .cf.link { background: #33B5B0; opacity: 0.3; }

        .msg-card { display: flex; gap: 6px; padding: 8px; background: #F9F8F6; border-radius: 6px; }
        .msg-av { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #D0D0CC; flex-shrink: 0; }
        .msg-lines { display: flex; flex-direction: column; gap: 3px; flex: 1; }
        .ml { background: #E8E6E1; border-radius: 2px; }
        .ml.a { width: 50px; height: 5px; }
        .ml.b { width: 80%; height: 4px; }
        .ml.c { width: 30px; height: 3px; }
        .msg-dot { width: 6px; height: 6px; border-radius: 50%; background: #33B5B0; flex-shrink: 0; margin-top: 3px; }

        .caption { position: absolute; bottom: 40px; left: 0; right: 0; text-align: center; padding: 0 180px; font-size: 19px; font-weight: 400; color: #8A8A86; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="browser">
        <div class="bbar"><div class="bd r"></div><div class="bd y"></div><div class="bd g"></div></div>
        <div class="board">
            <div class="sb"><div class="sb-logo"></div><div class="sb-dot active"></div><div class="sb-dot"></div><div class="sb-dot"></div></div>
            <div class="col">
                <div class="col-head"><div class="ch-line"></div><div class="ch-badge red"></div></div>
                <div class="col-body">
                    <div class="card urgent"><div class="card-head"><div class="c-av"></div><div class="c-lines"><div class="cl a"></div><div class="cl b"></div></div><div class="c-status"></div></div><div class="c-body"><div class="cb w80"></div><div class="cb w60"></div></div><div class="c-foot"><div class="cf"></div><div class="cf link"></div></div></div>
                    <div class="card urgent"><div class="card-head"><div class="c-av"></div><div class="c-lines"><div class="cl a"></div><div class="cl b"></div></div><div class="c-status"></div></div><div class="c-body"><div class="cb w80"></div><div class="cb w60"></div></div><div class="c-foot"><div class="cf"></div><div class="cf link"></div></div></div>
                    <div class="card urgent"><div class="card-head"><div class="c-av"></div><div class="c-lines"><div class="cl a"></div><div class="cl b"></div></div><div class="c-status"></div></div><div class="c-body"><div class="cb w60"></div></div><div class="c-foot"><div class="cf"></div><div class="cf link"></div></div></div>
                </div>
            </div>
            <div class="col">
                <div class="col-head"><div class="ch-line"></div><div class="ch-badge amber"></div></div>
                <div class="col-body">
                    <div class="card review"><div class="card-head"><div class="c-av"></div><div class="c-lines"><div class="cl a"></div><div class="cl b"></div></div><div class="c-status"></div></div><div class="c-body"><div class="cb w80"></div><div class="cb w60"></div></div><div class="c-foot"><div class="cf"></div><div class="cf link"></div></div></div>
                    <div class="card review"><div class="card-head"><div class="c-av"></div><div class="c-lines"><div class="cl a"></div><div class="cl b"></div></div><div class="c-status"></div></div><div class="c-body"><div class="cb w80"></div></div><div class="c-foot"><div class="cf"></div><div class="cf link"></div></div></div>
                </div>
            </div>
            <div class="col">
                <div class="col-head"><div class="ch-line"></div><div class="ch-badge green"></div></div>
                <div class="col-body">
                    <div class="card resolved"><div class="card-head"><div class="c-av"></div><div class="c-lines"><div class="cl a"></div><div class="cl b"></div></div></div><div class="c-body"><div class="cb w60"></div></div></div>
                    <div class="card resolved"><div class="card-head"><div class="c-av"></div><div class="c-lines"><div class="cl a"></div><div class="cl b"></div></div></div><div class="c-body"><div class="cb w60"></div></div></div>
                </div>
            </div>
            <div class="col" style="max-width: 200px;">
                <div class="col-head"><div class="ch-line" style="width:60px;"></div></div>
                <div class="col-body">
                    <div class="msg-card"><div class="msg-av"></div><div class="msg-lines"><div class="ml a"></div><div class="ml b"></div><div class="ml c"></div></div><div class="msg-dot"></div></div>
                    <div class="msg-card"><div class="msg-av"></div><div class="msg-lines"><div class="ml a"></div><div class="ml b"></div><div class="ml c"></div></div><div class="msg-dot"></div></div>
                    <div class="msg-card"><div class="msg-av"></div><div class="msg-lines"><div class="ml a"></div><div class="ml b"></div><div class="ml c"></div></div></div>
                </div>
            </div>
        </div>
    </div>
    <div class="caption">ER recommendations, pending follow-ups, and patient messages — all in one view. The AI summarizes each case so providers can act, not just read.</div>
</body>
</html>
