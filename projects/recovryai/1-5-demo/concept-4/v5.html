<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04 — Conversation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #F4F2EE; display: flex; align-items: center; justify-content: center; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .phone { width: 300px; height: 600px; border: 2.5px solid #C8C6C1; border-radius: 40px; background: #fff; display: flex; flex-direction: column; padding: 18px 16px; }
        .notch { width: 60px; height: 5px; background: #E8E6E1; border-radius: 3px; align-self: center; margin-bottom: 12px; }
        .header { height: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .header-line { width: 100px; height: 8px; background: #E8E6E1; border-radius: 4px; }
        .toggle { display: flex; margin: 0 0 12px; background: #F0EEEA; border-radius: 18px; padding: 3px; }
        .tab { flex: 1; height: 24px; border-radius: 15px; }
        .tab.active { background: #fff; }
        .chat { flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 4px 0; }
        .msg { border-radius: 14px; }
        .msg.bot { background: #F0EEEA; align-self: flex-start; border-bottom-left-radius: 3px; }
        .msg.user { background: #1B1B1A; align-self: flex-end; border-bottom-right-radius: 3px; }
        .msg.sm { width: 65%; height: 36px; }
        .msg.md { width: 78%; height: 52px; }
        .msg.lg { width: 82%; height: 72px; }
        .input-bar { display: flex; align-items: center; gap: 8px; margin-top: auto; padding-top: 8px; }
        .input-field { flex: 1; height: 32px; background: #F0EEEA; border-radius: 16px; }
        .send { width: 32px; height: 32px; background: #33B5B0; border-radius: 50%; }
        .home-bar { width: 36px; height: 3px; background: #D0D0CC; border-radius: 2px; align-self: center; margin-top: 10px; }
        .caption { position: absolute; bottom: 56px; left: 0; right: 0; text-align: center; padding: 0 240px; font-size: 19px; font-weight: 400; color: #8A8A86; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="notch"></div>
        <div class="header"><div class="header-line"></div></div>
        <div class="toggle"><div class="tab active"></div><div class="tab"></div></div>
        <div class="chat">
            <div class="msg bot md"></div>
            <div class="msg user sm"></div>
            <div class="msg bot lg"></div>
            <div class="msg user md"></div>
            <div class="msg bot md"></div>
        </div>
        <div class="input-bar">
            <div class="input-field"></div>
            <div class="send"></div>
        </div>
        <div class="home-bar"></div>
    </div>
    <div class="caption">Patients can ask questions anytime. The VCA responds immediately with guidance specific to their procedure and recovery day.</div>
</body>
</html>
