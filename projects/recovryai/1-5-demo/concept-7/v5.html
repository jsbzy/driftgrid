<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>07 — Escalation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #F4F2EE; display: flex; align-items: center; justify-content: center; gap: 56px; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .phone { width: 270px; height: 540px; border: 2.5px solid #C8C6C1; border-radius: 38px; background: #fff; display: flex; flex-direction: column; padding: 16px 14px; }
        .notch { width: 56px; height: 5px; background: #E8E6E1; border-radius: 3px; align-self: center; margin-bottom: 10px; }
        .header { height: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
        .hl { width: 90px; height: 7px; background: #E8E6E1; border-radius: 4px; }
        .toggle { display: flex; background: #F0EEEA; border-radius: 16px; padding: 2px; margin-bottom: 10px; }
        .tab { flex: 1; height: 22px; border-radius: 14px; }
        .tab.active { background: #fff; }
        .chat { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .msg { border-radius: 12px; }
        .msg.bot { background: #F0EEEA; align-self: flex-start; border-bottom-left-radius: 3px; }
        .msg.user { background: #1B1B1A; align-self: flex-end; border-bottom-right-radius: 3px; }
        .msg.alert { background: #FFF7ED; border: 2px solid #D4915040; align-self: flex-start; border-bottom-left-radius: 3px; }
        .msg.s1 { width: 60%; height: 28px; }
        .msg.s2 { width: 75%; height: 40px; }
        .msg.s3 { width: 70%; height: 48px; }
        .report { border: 1.5px solid #E8E6E1; border-radius: 10px; padding: 8px; width: 55%; align-self: flex-start; display: flex; flex-direction: column; gap: 4px; }
        .rp-line { height: 4px; background: #E8E6E1; border-radius: 2px; }
        .rp-line.w40 { width: 40px; }
        .rp-line.w60 { width: 60px; }
        .hb { width: 32px; height: 3px; background: #D0D0CC; border-radius: 2px; align-self: center; margin-top: 8px; }

        .steps { display: flex; flex-direction: column; align-items: center; }
        .step { display: flex; align-items: center; gap: 10px; }
        .step-dot { width: 12px; height: 12px; border-radius: 50%; }
        .step-dot.amber { border: 2.5px solid #D49150; }
        .step-dot.teal { background: #33B5B0; }
        .step-line-h { width: 60px; height: 5px; background: #E8E6E1; border-radius: 3px; }
        .step-sub { width: 80px; height: 4px; background: #F0EEEA; border-radius: 2px; }
        .connector { width: 2px; height: 20px; background: #E8E6E1; margin: 4px 0 4px 5px; }

        .caption { position: absolute; bottom: 56px; left: 0; right: 0; text-align: center; padding: 0 180px; font-size: 19px; font-weight: 400; color: #8A8A86; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="notch"></div>
        <div class="header"><div class="hl"></div></div>
        <div class="toggle"><div class="tab active"></div><div class="tab"></div></div>
        <div class="chat">
            <div class="msg bot s1"></div>
            <div class="msg user s2"></div>
            <div class="msg bot s2"></div>
            <div class="report"><div class="rp-line w40"></div><div class="rp-line w60"></div><div class="rp-line w40"></div></div>
            <div class="msg alert s3"></div>
        </div>
        <div class="hb"></div>
    </div>

    <div class="steps">
        <div class="step"><div class="step-dot amber"></div><div style="display:flex;flex-direction:column;gap:3px;"><div class="step-line-h"></div><div class="step-sub"></div></div></div>
        <div class="connector"></div>
        <div class="step"><div class="step-dot teal"></div><div style="display:flex;flex-direction:column;gap:3px;"><div class="step-line-h"></div><div class="step-sub"></div></div></div>
        <div class="connector"></div>
        <div class="step"><div class="step-dot teal"></div><div style="display:flex;flex-direction:column;gap:3px;"><div class="step-line-h"></div><div class="step-sub"></div></div></div>
    </div>

    <div class="caption">When recovery deviates from expected patterns, the VCA doesn't wait. It escalates to the care team automatically — with full clinical context.</div>
</body>
</html>
