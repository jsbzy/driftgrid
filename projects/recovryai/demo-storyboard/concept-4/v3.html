<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03, Check-In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #E8E4DE; display: flex; align-items: center; justify-content: center; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        .phone {
            width: 300px; height: 650px;
            border-radius: 40px; background: #f4f2ee;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 4px 60px rgba(0,0,0,0.07), 0 0 0 0.5px rgba(0,0,0,0.05);
        }

        /* Status bar */
        .status { height: 36px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 29px 5px; }
        .s-time { font-family: 'SF Pro Text', 'Inter', sans-serif; font-size: 12px; font-weight: 600; color: #1b1b1a; letter-spacing: -0.19px; }
        .s-icons { font-size: 10px; color: #1b1b1a; }

        /* Dark header */
        .header {
            padding: 8px 20px 28px;
            display: flex; flex-direction: column;
        }
        .header-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .header-nav svg { width: 22px; height: 22px; color: #1b1b1a; }
        .greeting-name {
            font-size: 18px; font-weight: 700; color: #1b1b1a;
            margin-bottom: 4px;
        }
        .greeting-sub {
            font-size: 14px; font-weight: 400; color: #6a6a66;
        }

        /* White card */
        .card {
            flex: 1; background: #fff;
            border-radius: 24px 24px 0 0;
            display: flex; flex-direction: column;
            padding: 24px 24px 0;
        }

        /* Category nav */
        .cat-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 4px;
        }
        .cat-title { font-size: 16px; font-weight: 700; color: #1b1b1a; }
        .cat-arrows { display: flex; gap: 12px; }
        .cat-arrows svg { width: 18px; height: 18px; color: #6a6a66; }

        /* Progress dots */
        .progress {
            display: flex; gap: 4px; margin-bottom: 28px;
        }
        .prog-bar {
            height: 3px; border-radius: 2px;
        }
        .prog-bar.filled { width: 20px; background: #1b1b1a; }
        .prog-bar.empty { width: 6px; background: #d4d0ca; }

        /* Question */
        .question {
            font-size: 22px; font-weight: 400; color: #1b1b1a;
            line-height: 1.35; margin-bottom: 24px;
        }

        /* Pain indicator */
        .indicator {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 28px;
        }
        .indicator-dot {
            width: 36px; height: 36px; border-radius: 50%;
            background: #33B5B0;
        }
        .indicator-label {
            font-size: 16px; font-weight: 600; color: #1b1b1a;
        }

        /* Slider */
        .slider-wrap { margin-bottom: 8px; }
        .slider-track {
            width: 100%; height: 8px; background: #E8E6E1; border-radius: 4px;
            position: relative;
        }
        .slider-fill {
            height: 100%; border-radius: 4px;
            background: #1b1b1a;
        }
        .slider-thumb {
            width: 28px; height: 28px; border-radius: 50%;
            background: #fff; border: 2px solid #1b1b1a;
            position: absolute; top: -10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
            display: flex; align-items: center; justify-content: center;
        }
        .slider-thumb svg { width: 14px; height: 14px; color: #1b1b1a; }
        .slider-labels {
            display: flex; justify-content: space-between;
            font-size: 11px; color: #a3a3a0; font-weight: 500;
            margin-top: 8px;
        }

        /* Continue button, pushed to bottom of card */
        .cta {
            background: #1b1b1a; color: #fff;
            border-radius: 14px; padding: 16px;
            font-size: 15px; font-weight: 600;
            text-align: center;
            margin-top: auto;
        }

        /* Home indicator, inside card */
        .home { width: 115px; height: 4px; background: #000; border-radius: 100px; align-self: center; margin: 10px 0 8px; }

        .vo { position: absolute; bottom: 48px; left: 0; right: 0; text-align: center; padding: 0 280px; font-size: 18px; font-weight: 400; color: #8A8A86; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="status">
            <span class="s-time">9:41</span>
            <span class="s-icons">&#9679;&#9679;&#9679;&#9679; &#8250;</span>
        </div>

        <div class="header">
            <div class="header-nav">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
            </div>
            <div class="greeting-name" data-drift-editable="greeting" data-drift-maxlen="40">Good morning, Marcia!</div>
            <div class="greeting-sub" data-drift-editable="greeting-sub" data-drift-maxlen="40">Let's submit your evening report</div>
        </div>

        <div class="card">
            <div class="cat-nav">
                <div class="cat-title">Pain</div>
                <div class="cat-arrows">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
                </div>
            </div>

            <div class="progress">
                <div class="prog-bar filled"></div>
                <div class="prog-bar empty"></div>
                <div class="prog-bar empty"></div>
                <div class="prog-bar empty"></div>
                <div class="prog-bar empty"></div>
            </div>

            <div class="question" data-drift-editable="question" data-drift-maxlen="60">How would you rate your pain level?</div>

            <div class="indicator">
                <div class="indicator-dot"></div>
                <div class="indicator-label">Low Pain</div>
            </div>

            <div class="slider-wrap">
                <div class="slider-track">
                    <div class="slider-fill" style="width: 25%;"></div>
                    <div class="slider-thumb" style="left: calc(25% - 14px);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 12h10M7 12l3-3M7 12l3 3M17 12l-3-3M17 12l-3 3"/></svg>
                    </div>
                </div>
                <div class="slider-labels">
                    <span>No Pain</span>
                    <span>Extreme</span>
                </div>
            </div>

            <div class="cta" data-drift-editable="cta" data-drift-maxlen="20">Continue</div>
            <div class="home"></div>
        </div>
    </div>
    <div class="vo" data-drift-editable="caption" data-drift-maxlen="140">Every day, the VCA walks the patient through a two-minute check-in, pain, sleep, medication, nutrition, and mobility.</div>
</body>
</html>
