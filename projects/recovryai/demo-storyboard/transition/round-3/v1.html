<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #ffffff; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        .caption {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cap {
            font-family: 'Inter', sans-serif;
            font-size: 40px;
            font-weight: 600;
            color: #1B1B1A;
            line-height: 1.25;
            letter-spacing: -0.02em;
            text-align: center;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.5s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .cap.show { opacity: 1; transform: translateY(0); }
        .cap.hide { opacity: 0; transform: translateY(-10px); }
    </style>
</head>
<body>
    <div class="caption">
        <div class="cap" id="cap1">Now let's look at what<br>the care team sees.</div>
    </div>
    <audio id="vo" preload="auto" src="../../audio/10-transition.mp3?v=4"></audio>
    <script>
        let currentCap = null;
        function showCap(id) {
            if (currentCap) {
                currentCap.classList.remove('show');
                currentCap.classList.add('hide');
            }
            const el = document.getElementById(id);
            if (el) {
                el.classList.remove('hide');
                void el.offsetHeight;
                el.classList.add('show');
                currentCap = el;
            }
        }

        function reset() {
            const vo = document.getElementById('vo');
            vo.pause();
            vo.currentTime = 0;
            currentCap = null;
            document.querySelectorAll('.cap').forEach(el => {
                el.classList.remove('show', 'hide');
            });
        }

        function run() {
            reset();
            const vo = document.getElementById('vo');
            vo.play().catch(() => {});
            setTimeout(() => showCap('cap1'), 400);
        }

        vo.addEventListener('ended', () => setTimeout(run, 2000));
        run();
        document.addEventListener('click', function handler() {
            document.removeEventListener('click', handler);
            run();
        });
    
        // VO mute toggle — press H to mute/unmute, persists across slides
        (function() {
            var a = document.getElementById('vo');
            if (!a) return;
            if (localStorage.getItem('drift-vo-muted') === 'true') a.muted = true;
            document.addEventListener('keydown', function(e) {
                if (e.key === 'h' || e.key === 'H') {
                    if (e.target instanceof HTMLInputElement || e.target instanceof HTMLTextAreaElement) return;
                    a.muted = !a.muted;
                    localStorage.setItem('drift-vo-muted', String(a.muted));
                }
            });
        })();
    </script>
</body>
</html>
