<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #ffffff; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        .cap-line {
            font-size: 48px; font-weight: 600; color: #1B1B1A; line-height: 1.25;
            letter-spacing: -0.02em; margin-bottom: 12px;
            opacity: 0; transform: translateY(16px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }
        .cap-line.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div style="width:100%;height:100vh;display:flex;align-items:center;justify-content:center;">
        <div class="caption" style="text-align:center;">
            <div class="cap-line" id="cap1">Now let's look at what<br>the care team sees.</div>
        </div>
    </div>
    <audio id="vo" preload="auto" src="../../audio/10-transition.mp3"></audio>
    <script>
        function showCap(id) { document.getElementById(id)?.classList.add('show'); }

        function reset() {
            const vo = document.getElementById('vo');
            vo.pause();
            vo.currentTime = 0;
            document.querySelectorAll('.cap-line').forEach(el => el.classList.remove('show'));
        }

        function run() {
            reset();
            document.getElementById('vo').play().catch(() => {});
            setTimeout(() => showCap('cap1'), 500);
        }

        run();
    </script>
</body>
</html>
