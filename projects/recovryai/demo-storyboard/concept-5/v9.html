<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04 — Home Screen (Animated)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@300;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #ffffff; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 0 1px #E8E6E1; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        /* Phone, 300px = 0.8x of Figma's 375px */
        .phone { width: 300px; height: 650px; border-radius: 40px; background: #f4f2ee; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 60px rgba(0,0,0,0.07), 0 0 0 0.5px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.08); }

        /* Status bar */
        .status-bar { height: 34px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 22px 5px; flex-shrink: 0; }
        .status-time { font-size: 12px; font-weight: 600; color: #1b1b1a; letter-spacing: -0.19px; }
        .status-icons { font-size: 10px; color: #1b1b1a; }

        /* Welcome header */
        .welcome-header { background: #f4f2ee; padding: 8px 13px 6px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .avatar-circle { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .greeting-text { flex: 1; }
        .greeting-name { font-family: 'Inter Tight', sans-serif; font-weight: 700; font-size: 17px; line-height: 22px; color: #1b1b1a; }
        .greeting-sub { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 12px; line-height: 15px; color: #6a6a66; letter-spacing: 0.08px; }
        .bell-button { width: 34px; height: 34px; border-radius: 100px; background: #fff; border: 2px solid rgba(28,27,31,0.12); display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
        .bell-button img.bell-icon { width: 20px; height: 20px; }
        .bell-button .notif-dot { position: absolute; top: 2px; right: 2px; width: 6px; height: 6px; border-radius: 50%; background: #E05555; }

        /* Scrollable content */
        .scroll-content { flex: 1; overflow-y: auto; padding: 0 13px; }

        /* Recovery score card */
        .score-card { background: #fff; border: 2px solid rgba(73,69,79,0.12); border-radius: 16px; padding: 18px 12px; margin-top: 6px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .score-label { font-size: 11px; line-height: 14px; color: #6a6a66; letter-spacing: 0.08px; }
        .score-row { display: flex; align-items: baseline; justify-content: center; gap: 5px; }
        .score-number { font-family: 'Inter Tight', sans-serif; font-weight: 700; font-size: 22px; line-height: 28px; color: #1c1b1f; }
        .score-percent { font-family: 'Inter Tight', sans-serif; font-weight: 700; font-size: 11px; color: #1c1b1f; align-self: flex-end; }
        .score-improving { font-family: 'Inter Tight', sans-serif; font-weight: 700; font-size: 22px; line-height: 28px; color: #00b292; }
        .score-badge { background: rgba(0,178,146,0.15); padding: 3px 10px; border-radius: 100px; font-weight: 700; font-size: 9px; line-height: 11px; color: #1c1b1f; letter-spacing: 0.06px; }

        /* Health stats card */
        .health-card { background: #fff; border: 2px solid rgba(73,69,79,0.12); border-radius: 16px; padding: 12px 14px 2px; margin-top: 8px; display: flex; flex-direction: column; gap: 10px; }

        /* Today dropdown */
        .today-row { display: flex; justify-content: flex-end; }
        .today-dropdown { display: flex; align-items: center; gap: 4px; border: 1px solid #dcd9d5; border-radius: 5px; padding: 3px 3px 3px 8px; }
        .today-dropdown span { font-weight: 700; font-size: 11px; color: #1b1b1a; }
        .today-chevron { width: 15px; height: 15px; background: #1b1b1a; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .today-chevron svg { width: 9px; height: 9px; color: #fff; }

        /* Pain summary */
        .pain-summary { display: flex; align-items: center; gap: 12px; }
        .pain-globe { width: 44px; height: 44px; border-radius: 100px; background: #ffc632; border: 2px solid rgba(28,27,31,0.12); flex-shrink: 0; }
        .pain-text { flex: 1; display: flex; flex-direction: column; gap: 1px; }
        .pain-meta { font-size: 9px; line-height: 11px; color: #6a6a66; }
        .pain-level { font-family: 'Inter Tight', sans-serif; font-weight: 700; font-size: 15px; line-height: 19px; color: #1c1b1f; }
        .pain-stable { display: inline-flex; align-self: flex-start; background: #f4f2ee; padding: 2px 8px; border-radius: 100px; font-weight: 700; font-size: 9px; color: #6a6a66; margin-top: 1px; }

        /* Stat rows */
        .stat-row { display: flex; align-items: center; border-top: 1px solid #ecebe9; padding: 11px 0; }
        .stat-info { flex: 1; display: flex; flex-direction: column; gap: 1px; }
        .stat-name { font-family: 'Inter Tight', sans-serif; font-weight: 700; font-size: 13px; line-height: 16px; color: #1c1b1f; letter-spacing: 0.03px; }
        .stat-status { font-size: 9px; line-height: 11px; color: #6a6a66; }
        .stat-right { display: flex; align-items: center; gap: 6px; }
        .trend-pill { display: flex; align-items: center; justify-content: center; padding: 3px 5px; border-radius: 100px; }
        .trend-pill.improving { background: rgba(0,178,146,0.15); }
        .trend-pill.declining { background: rgba(241,2,59,0.15); }
        .trend-pill img { width: 11px; height: 11px; }
        .trend-pill img.arrow-up { transform: rotate(180deg); }
        .stat-value { font-family: 'Inter Tight', sans-serif; font-weight: 300; font-size: 20px; line-height: 26px; color: #1c1b1f; min-width: 34px; text-align: right; }

        /* Bottom nav, chat FAB overlaps top edge */
        .bottom-nav { background: #fff; padding: 6px 8px 6px; display: flex; align-items: flex-end; justify-content: center; gap: 0; flex-shrink: 0; box-shadow: 0px -12px 30px #f4f2ee; position: relative; }
        .nav-group { display: flex; flex: 1; justify-content: space-around; align-items: flex-end; padding-bottom: 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
        .nav-item img { width: 20px; height: 20px; }
        .nav-item span { font-weight: 700; font-size: 8px; color: #b8b6b2; letter-spacing: 0.06px; }
        .nav-item.active span { color: #1b1b1a; }
        .nav-chat-fab { display: flex; flex-direction: column; align-items: center; gap: 1px; margin-top: -18px; }
        .chat-circle { width: 38px; height: 38px; border-radius: 100px; background: #1b1b1a; display: flex; align-items: center; justify-content: center; }
        .chat-circle img { width: 20px; height: 20px; }
        .nav-chat-fab span { font-weight: 700; font-size: 8px; color: #b8b6b2; }

        /* Home indicator */
        .home-wrap { background: #fff; display: flex; justify-content: center; flex-shrink: 0; }
        .home-bar { width: 100px; height: 4px; background: #000; border-radius: 100px; margin: 4px 0 6px; }

        /* Animation classes */
        .anim { opacity: 0; transform: translateY(12px); transition: opacity 0.3s ease-out, transform 0.3s ease-out; }
        .anim.show { opacity: 1; transform: translateY(0); }

        /* Scale pop for badge */
        .anim-pop { opacity: 0; transform: scale(0.85); transition: opacity 0.35s ease-out, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .anim-pop.show { opacity: 1; transform: scale(1); }
    </style>
</head>
<body>
    <div class="phone">
        <div class="status-bar">
            <span class="status-time">9:41</span>
            <span class="status-icons">&#9679;&#9679;&#9679;&#9679; &#8250;</span>
        </div>

        <div class="welcome-header anim" id="welcome">
            <div class="avatar-circle">
                <img src="https://www.figma.com/api/mcp/asset/4e432bfb-0622-47ed-9e42-4872bb5b168e" alt="Marcia">
            </div>
            <div class="greeting-text">
                <div class="greeting-name" data-drift-editable="greeting" data-drift-maxlen="30">Hi, Marcia</div>
                <div class="greeting-sub">Let's check in today!</div>
            </div>
            <div class="bell-button">
                <img class="bell-icon" src="https://www.figma.com/api/mcp/asset/d7f0e0a6-e40e-4943-96e3-0f8c0d5ecd85" alt="Bell">
                <div class="notif-dot"></div>
            </div>
        </div>

        <div class="scroll-content">
            <div class="score-card anim" id="scoreCard">
                <div class="score-label">Your recovery score</div>
                <div class="score-row">
                    <span class="score-number" id="scoreNumber">0.0</span>
                    <span class="score-percent">%</span>
                    <span class="score-improving anim" id="improving">Improving</span>
                </div>
                <div class="score-badge anim-pop" id="scoreBadge">Great job improving your recovery score!</div>
            </div>

            <div class="health-card anim" id="healthCard">
                <div class="today-row">
                    <div class="today-dropdown">
                        <span>Today</span>
                        <div class="today-chevron">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                        </div>
                    </div>
                </div>

                <div class="pain-summary anim" id="painRow">
                    <div class="pain-globe"></div>
                    <div class="pain-text">
                        <div class="pain-meta">*Average of pain reportings</div>
                        <div class="pain-level" data-drift-editable="pain-level" data-drift-maxlen="20">Moderate Pain</div>
                        <div class="pain-stable">Stable</div>
                    </div>
                </div>

                <div class="stat-row anim" id="statActivity">
                    <div class="stat-info"><div class="stat-name">Activity</div><div class="stat-status">Improving</div></div>
                    <div class="stat-right">
                        <div class="trend-pill improving"><img class="arrow-up" src="https://www.figma.com/api/mcp/asset/55c65eea-e6a7-43c5-be50-962aa81cdfaf" alt="Up"></div>
                        <div class="stat-value">45%</div>
                    </div>
                </div>
                <div class="stat-row anim" id="statDiet">
                    <div class="stat-info"><div class="stat-name">Diet</div><div class="stat-status">In Decline</div></div>
                    <div class="stat-right">
                        <div class="trend-pill declining"><img src="https://www.figma.com/api/mcp/asset/39cfd18b-b93d-4599-a9e7-ce6efdb37c77" alt="Down"></div>
                        <div class="stat-value">5%</div>
                    </div>
                </div>
                <div class="stat-row anim" id="statSleep">
                    <div class="stat-info"><div class="stat-name">Sleep</div><div class="stat-status">Stable</div></div>
                    <div class="stat-right"><div class="stat-value">27%</div></div>
                </div>
                <div class="stat-row anim" id="statMedication">
                    <div class="stat-info"><div class="stat-name">Medication</div><div class="stat-status">Improving</div></div>
                    <div class="stat-right">
                        <div class="trend-pill improving"><img class="arrow-up" src="https://www.figma.com/api/mcp/asset/55c65eea-e6a7-43c5-be50-962aa81cdfaf" alt="Up"></div>
                        <div class="stat-value">32%</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-nav anim" id="bottomNav">
            <div class="nav-group">
                <div class="nav-item active"><img src="https://www.figma.com/api/mcp/asset/50b17b23-a7cf-416b-a19a-dfd05b8185cc" alt="Home"><span>Home</span></div>
                <div class="nav-item"><img src="https://www.figma.com/api/mcp/asset/6278b2f8-7885-47ad-bd52-e58aac537b86" alt="Analytics"><span>Analytics</span></div>
            </div>
            <div class="nav-chat-fab">
                <div class="chat-circle"><img src="https://www.figma.com/api/mcp/asset/65029ef2-8565-47b9-9068-82cefca6ca06" alt="Chat"></div>
                <span>Chat</span>
            </div>
            <div class="nav-group">
                <div class="nav-item"><img src="https://www.figma.com/api/mcp/asset/0d1f42dc-2acd-4140-83d1-1280a87ea2ea" alt="Resources"><span>Resources</span></div>
                <div class="nav-item"><img src="https://www.figma.com/api/mcp/asset/a17a03a6-cf70-46b8-a140-3a382f5dad56" alt="Report"><span>Report</span></div>
            </div>
        </div>
        <div class="home-wrap"><div class="home-bar"></div></div>
    </div>

    <script>
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function animateScore(target, duration) {
            var el = document.getElementById('scoreNumber');
            var start = performance.now();

            function tick(now) {
                var elapsed = now - start;
                var progress = Math.min(elapsed / duration, 1);
                var eased = easeOutCubic(progress);
                var current = eased * target;
                el.textContent = current.toFixed(1);

                if (progress < 1) {
                    requestAnimationFrame(tick);
                }
            }

            requestAnimationFrame(tick);
        }

        var loopTimer = null;

        function runTimeline() {
            // Clear any pending loop
            if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; }

            // Reset all animated elements
            var allAnim = document.querySelectorAll('.anim, .anim-pop');
            allAnim.forEach(function(el) { el.classList.remove('show'); });
            document.getElementById('scoreNumber').textContent = '0.0';

            var timeline = [
                { delay: 300,  id: 'welcome' },
                { delay: 500,  id: 'bottomNav' },
                { delay: 800,  id: 'scoreCard' },
                { delay: 1200, action: function() { animateScore(75.8, 1500); } },
                { delay: 2000, id: 'improving' },
                { delay: 2400, id: 'scoreBadge' },
                { delay: 2800, id: 'healthCard' },
                { delay: 3200, id: 'painRow' },
                { delay: 3600, id: 'statActivity' },
                { delay: 3900, id: 'statDiet' },
                { delay: 4200, id: 'statSleep' },
                { delay: 4500, id: 'statMedication' }
            ];

            timeline.forEach(function(step) {
                setTimeout(function() {
                    if (step.id) {
                        document.getElementById(step.id).classList.add('show');
                    }
                    if (step.action) {
                        step.action();
                    }
                }, step.delay);
            });

            // Loop at 12000ms
            loopTimer = setTimeout(runTimeline, 12000);
        }

        // Start on load
        runTimeline();
    </script>
</body>
</html>
