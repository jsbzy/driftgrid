<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Storyboard — Scale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .beat-label {
            position: fixed;
            top: 32px; left: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #A3A3A0;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 44px;
            max-width: 760px;
            text-align: center;
        }
        .headline {
            font-size: 36px;
            font-weight: 600;
            color: #1B1B1A;
            line-height: 1.35;
        }
        .tiers {
            display: flex;
            gap: 32px;
            align-items: center;
        }
        .tier {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .tier-label {
            font-size: 16px;
            font-weight: 500;
            color: #3A3A38;
        }
        .tier-bar {
            height: 4px;
            background: #33B6B0;
            border-radius: 2px;
        }
        .tier:nth-child(1) .tier-bar { width: 40px; }
        .tier:nth-child(2) .tier-bar { width: 80px; }
        .tier:nth-child(3) .tier-bar { width: 140px; }
        .tier-arrow {
            font-size: 18px;
            color: #A3A3A0;
        }
        .placeholder-visual {
            width: 100%;
            max-width: 520px;
            height: 220px;
            background: #F5F5F3;
            border: 1px solid #DDD;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .placeholder-label {
            font-size: 14px;
            color: #AAA;
            letter-spacing: 0.05em;
        }
        .closing {
            font-size: 20px;
            font-weight: 400;
            color: #6B6B68;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="beat-label">12 · Scale</div>
    <div class="frame">
        <div class="headline" data-drift-editable="headline" data-drift-maxlen="60">From one physician<br>to an entire practice.</div>
        <div class="tiers">
            <div class="tier">
                <div class="tier-bar"></div>
                <div class="tier-label">One doctor</div>
            </div>
            <div class="tier-arrow">→</div>
            <div class="tier">
                <div class="tier-bar"></div>
                <div class="tier-label">One clinic</div>
            </div>
            <div class="tier-arrow">→</div>
            <div class="tier">
                <div class="tier-bar"></div>
                <div class="tier-label">Multiple locations</div>
            </div>
        </div>
        <div class="placeholder-visual">
            <span class="placeholder-label">Scaling progression visual</span>
        </div>
        <div class="closing" data-drift-editable="closing" data-drift-maxlen="80">Continuous clinical supervision<br>at a scale human labor can't reach.</div>
    </div>
</body>
</html>
