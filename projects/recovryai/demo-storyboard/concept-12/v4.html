<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Storyboard — Close</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .beat-label {
            position: fixed;
            top: 32px; left: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #A3A3A0;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
        }
        .logo {
            height: 56px;
            width: auto;
        }
        .accent-line {
            width: 48px;
            height: 3px;
            background: #33B6B0;
            border-radius: 2px;
        }
        .wordmark {
            font-size: 48px;
            font-weight: 700;
            color: #1B1B1A;
            letter-spacing: -0.02em;
        }
        .tagline {
            font-size: 20px;
            font-weight: 400;
            color: #3A3A38;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="beat-label">13 · Close</div>
    <div class="frame">
        <img src="../../brand/logos/logo-color-light.svg" alt="RecovryAI" class="logo">
        <div class="accent-line"></div>
        <div class="wordmark" data-drift-editable="wordmark" data-drift-maxlen="20">recovry.ai</div>
        <div class="tagline" data-drift-editable="tagline" data-drift-maxlen="80">Physician-prescribed AI for post-operative recovery.</div>
    </div>
</body>
</html>
