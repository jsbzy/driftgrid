<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Storyboard — Close</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .beat-label {
            position: fixed;
            top: 32px; left: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #AAA;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        .logo-box {
            width: 88px; height: 88px;
            border: 2px dashed #CCC;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #AAA;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .wordmark {
            font-size: 48px;
            font-weight: 700;
            color: #222;
            letter-spacing: -0.03em;
        }
        .tagline {
            font-size: 18px;
            font-weight: 400;
            color: #777;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="beat-label">12 · Close</div>
    <div class="frame">
        <div class="logo-box">logo</div>
        <div class="wordmark" data-drift-editable="wordmark" data-drift-maxlen="20">recovry.ai</div>
        <div class="tagline" data-drift-editable="body" data-drift-maxlen="60">Regulated, patient-facing, clinical AI.</div>
    </div>
</body>
</html>
