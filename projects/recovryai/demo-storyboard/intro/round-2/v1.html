<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02 — Intro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #ffffff; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        /* Slide layout */
        .slide { display: flex; width: 100%; height: 100vh; }
        .left { width: 42%; display: flex; align-items: center; padding-left: 100px; }
        .right { width: 58%; display: flex; align-items: center; justify-content: center; }
        .caption { max-width: 540px; }
        .cap-line {
            font-size: 48px; font-weight: 600; color: #1B1B1A; line-height: 1.25;
            letter-spacing: -0.02em; margin-bottom: 12px;
            opacity: 0; transform: translateY(16px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out, color 0.4s ease;
        }
        .cap-line.show { opacity: 1; transform: translateY(0); }
        .cap-line.dim { color: #C8C6C1; }

        /* Devices area */
        .devices { display: flex; align-items: center; gap: 40px; }

        /* Phone wireframe */
        .phone-wire {
            width: 140px; height: 280px; border: 2.5px solid #C8C6C1; border-radius: 24px;
            background: #FAFAF8; display: flex; flex-direction: column; align-items: center;
            padding: 30px 14px 20px; position: relative; gap: 10px;
        }
        .phone-notch {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            width: 36px; height: 5px; border-radius: 4px; background: #C8C6C1;
        }
        .phone-line {
            width: 100%; height: 6px; border-radius: 3px; background: #E0DED9;
        }
        .phone-line.short { width: 60%; }
        .phone-line.med { width: 80%; }
        .phone-block {
            width: 100%; height: 32px; border-radius: 6px; background: #E0DED9;
        }
        .phone-home {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 4px; border-radius: 3px; background: #C8C6C1;
        }
        .phone-label {
            font-size: 11px; font-weight: 600; color: #B0B0AC; letter-spacing: 0.05em;
            text-transform: uppercase; margin-top: 12px;
        }

        /* Plus sign */
        .plus {
            font-size: 40px; font-weight: 300; color: #C8C6C1;
        }

        /* Laptop wireframe */
        .laptop-wire { display: flex; flex-direction: column; align-items: center; }
        .laptop-screen {
            width: 360px; height: 230px; border: 2.5px solid #C8C6C1; border-radius: 10px 10px 0 0;
            background: #FAFAF8; display: flex; flex-direction: column; overflow: hidden;
        }
        .laptop-bar {
            height: 20px; background: #F0EEEA; border-bottom: 1px solid #E0DED9;
            display: flex; align-items: center; padding: 0 8px; gap: 4px;
        }
        .laptop-dot { width: 6px; height: 6px; border-radius: 50%; background: #C8C6C1; }
        .laptop-body { flex: 1; display: flex; overflow: hidden; }
        .laptop-sidebar {
            width: 40px; background: #F0EEEA; border-right: 1px solid #E0DED9;
            display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 10px;
        }
        .laptop-sidebar-icon {
            width: 16px; height: 16px; border-radius: 4px; background: #D0D0CC;
        }
        .laptop-sidebar-icon.active { background: #33B5B0; }
        .laptop-content {
            flex: 1; padding: 14px; display: flex; flex-direction: column; gap: 8px;
        }
        .laptop-line {
            width: 100%; height: 5px; border-radius: 3px; background: #E0DED9;
        }
        .laptop-line.short { width: 50%; }
        .laptop-line.med { width: 75%; }
        .laptop-block {
            width: 100%; height: 36px; border-radius: 6px; background: #E0DED9;
        }
        .laptop-base {
            width: 392px; height: 10px; background: #E0DED9; border-radius: 0 0 6px 6px;
        }
        .laptop-label {
            font-size: 11px; font-weight: 600; color: #B0B0AC; letter-spacing: 0.05em;
            text-transform: uppercase; margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="left">
            <div class="caption">
                <div class="cap-line" id="cap1">A patient app.</div>
                <div class="cap-line" id="cap2">And a provider<br>dashboard.</div>
                <div class="cap-line" id="cap3">They work together.</div>
            </div>
        </div>
        <div class="right">
            <div class="devices">
                <!-- Phone wireframe -->
                <div class="device" id="dev-phone" style="opacity:0;transform:translateY(20px);transition:all 0.6s ease;display:flex;flex-direction:column;align-items:center;">
                    <div class="phone-wire">
                        <div class="phone-notch"></div>
                        <div class="phone-line"></div>
                        <div class="phone-line short"></div>
                        <div class="phone-block"></div>
                        <div class="phone-line med"></div>
                        <div class="phone-line"></div>
                        <div class="phone-line short"></div>
                        <div class="phone-block"></div>
                        <div class="phone-line med"></div>
                        <div class="phone-line short"></div>
                        <div class="phone-home"></div>
                    </div>
                    <div class="phone-label">Patient</div>
                </div>

                <!-- Plus sign -->
                <div class="plus" id="dev-plus" style="opacity:0;transition:opacity 0.4s;">+</div>

                <!-- Laptop wireframe -->
                <div class="device" id="dev-laptop" style="opacity:0;transform:translateY(20px);transition:all 0.6s ease;display:flex;flex-direction:column;align-items:center;">
                    <div class="laptop-wire">
                        <div class="laptop-screen">
                            <div class="laptop-bar">
                                <div class="laptop-dot"></div>
                                <div class="laptop-dot"></div>
                                <div class="laptop-dot"></div>
                            </div>
                            <div class="laptop-body">
                                <div class="laptop-sidebar">
                                    <div class="laptop-sidebar-icon active"></div>
                                    <div class="laptop-sidebar-icon"></div>
                                    <div class="laptop-sidebar-icon"></div>
                                    <div class="laptop-sidebar-icon"></div>
                                </div>
                                <div class="laptop-content">
                                    <div class="laptop-line"></div>
                                    <div class="laptop-line short"></div>
                                    <div class="laptop-block"></div>
                                    <div class="laptop-line med"></div>
                                    <div class="laptop-line"></div>
                                    <div class="laptop-line short"></div>
                                    <div class="laptop-block"></div>
                                </div>
                            </div>
                        </div>
                        <div class="laptop-base"></div>
                    </div>
                    <div class="laptop-label">Provider</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function showCap(id) {
            document.querySelectorAll('.cap-line.show').forEach(el => el.classList.add('dim'));
            const el = document.getElementById(id);
            if (el) { el.classList.add('show'); el.classList.remove('dim'); }
        }

        setTimeout(() => {
            document.getElementById('dev-phone').style.opacity = '1';
            document.getElementById('dev-phone').style.transform = 'translateY(0)';
            showCap('cap1');
        }, 500);

        setTimeout(() => {
            document.getElementById('dev-plus').style.opacity = '1';
        }, 1500);

        setTimeout(() => {
            document.getElementById('dev-laptop').style.opacity = '1';
            document.getElementById('dev-laptop').style.transform = 'translateY(0)';
            showCap('cap2');
        }, 2000);

        setTimeout(() => showCap('cap3'), 4000);
    </script>
</body>
</html>
