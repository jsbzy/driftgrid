<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Storyboard — Emergency</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .beat-label {
            position: fixed;
            top: 32px; left: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #A3A3A0;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
            max-width: 640px;
            text-align: center;
        }
        .headline {
            font-size: 36px;
            font-weight: 600;
            color: #1B1B1A;
            line-height: 1.35;
        }
        .alert {
            font-size: 16px;
            font-weight: 500;
            color: #1B1B1A;
            background: #FDF2F2;
            border-left: 3px solid #C44;
            padding: 16px 24px;
            text-align: left;
            border-radius: 0 8px 8px 0;
            width: 100%;
            max-width: 480px;
        }
        .actions-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            text-align: left;
            width: 100%;
            max-width: 480px;
        }
        .action-item {
            display: flex;
            align-items: baseline;
            gap: 14px;
            font-size: 18px;
            font-weight: 400;
            color: #3A3A38;
            line-height: 1.5;
        }
        .action-marker {
            width: 8px;
            height: 8px;
            background: #C44;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="beat-label">09 · Emergency</div>
    <div class="frame">
        <div class="headline" data-drift-editable="headline" data-drift-maxlen="60">If it's critical,<br>EMS is contacted immediately.</div>
        <div class="alert" data-drift-editable="alert" data-drift-maxlen="60">Shortness of breath detected. SpO2 dropping.</div>
        <div class="actions-list">
            <div class="action-item">
                <div class="action-marker"></div>
                <span data-drift-editable="action-1" data-drift-maxlen="50">Patient advised to call 911.</span>
            </div>
            <div class="action-item">
                <div class="action-marker"></div>
                <span data-drift-editable="action-2" data-drift-maxlen="60">EMS notified with location and clinical context.</span>
            </div>
            <div class="action-item">
                <div class="action-marker"></div>
                <span data-drift-editable="action-3" data-drift-maxlen="50">Care team alerted simultaneously.</span>
            </div>
        </div>
    </div>
</body>
</html>
