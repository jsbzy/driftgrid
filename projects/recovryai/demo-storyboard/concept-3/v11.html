<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02, The App (Video)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; background: #f5f5f4; }
        body { display: flex; align-items: center; justify-content: center; position: relative; }
        video { max-width: 100%; max-height: 100%; object-fit: contain; }
        .controls {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            border-radius: 100px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            font-family: system-ui, sans-serif;
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        body:hover .controls { opacity: 1; }
        .controls button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 2px;
            display: flex;
            align-items: center;
        }
        .progress-bar {
            width: 120px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: white;
            border-radius: 2px;
            width: 0%;
        }
        .vo { position: absolute; left: 80px; top: 50%; transform: translateY(-50%); max-width: 360px; text-align: left; font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: 400; color: #8A8A86; line-height: 1.6; }
        .vo-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #B8B6B2; display: block; margin-bottom: 6px; }
        .vo-cover { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #f5f5f4; z-index: 5; }
    </style>
</head>
<body>
    <div class="vo-cover"></div>
    <video id="vid" autoplay loop muted playsinline>
        <source src="beat02.mp4" type="video/mp4">
    </video>
    <div class="controls">
        <button id="playBtn" onclick="togglePlay()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <div class="progress-bar" id="progressBar" onclick="seek(event)">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span id="timeLabel">0:00</span>
    </div>
    <script>
        const vid = document.getElementById('vid');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const timeLabel = document.getElementById('timeLabel');
        const playIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
        const pauseIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
        function togglePlay() {
            if (vid.paused) { vid.play(); playBtn.innerHTML = pauseIcon; }
            else { vid.pause(); playBtn.innerHTML = playIcon; }
        }
        vid.addEventListener('play', () => { playBtn.innerHTML = pauseIcon; });
        vid.addEventListener('pause', () => { playBtn.innerHTML = playIcon; });
        vid.addEventListener('timeupdate', () => {
            const pct = (vid.currentTime / vid.duration) * 100;
            progressFill.style.width = pct + '%';
            const s = Math.floor(vid.currentTime);
            timeLabel.textContent = Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
        });
        function seek(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            vid.currentTime = pct * vid.duration;
        }
    </script>
    <div class="vo"><span class="vo-label">v/o</span>A physician prescribes RecovryAI at discharge. The patient opens the app and meets their Virtual Care Assistant.</div>
</body>
</html>
