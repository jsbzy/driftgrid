<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Storyboard — Check-ins</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .beat-label {
            position: fixed;
            top: 32px; left: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #AAA;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            max-width: 700px;
            text-align: center;
        }
        .headline {
            font-size: 36px;
            font-weight: 600;
            color: #222;
            line-height: 1.4;
        }
        .channels {
            font-size: 22px;
            font-weight: 400;
            color: #777;
            line-height: 1.6;
        }
        .domains {
            font-size: 22px;
            font-weight: 400;
            color: #777;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="beat-label">06 · Check-ins</div>
    <div class="frame">
        <div class="headline" data-drift-editable="headline" data-drift-maxlen="60">Patient-initiated check-ins<br>across every channel.</div>
        <div class="channels" data-drift-editable="channels" data-drift-maxlen="60">Voice · Text · Video · App</div>
        <div class="domains" data-drift-editable="domains" data-drift-maxlen="80">Sleep · Pain · Nutrition · Medication · Mobility</div>
    </div>
</body>
</html>
