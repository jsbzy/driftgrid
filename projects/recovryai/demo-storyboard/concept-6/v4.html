<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Storyboard — Check-ins</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .beat-label {
            position: fixed;
            top: 32px; left: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #A3A3A0;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            max-width: 700px;
            text-align: center;
        }
        .headline {
            font-size: 36px;
            font-weight: 600;
            color: #1B1B1A;
            line-height: 1.4;
        }
        .domains {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .domain-tag {
            font-size: 15px;
            font-weight: 500;
            color: #33B6B0;
            background: rgba(51, 182, 176, 0.08);
            padding: 8px 20px;
            border-radius: 24px;
            letter-spacing: 0.02em;
        }
        .placeholder-visual {
            width: 100%;
            max-width: 480px;
            height: 240px;
            background: #F5F5F3;
            border: 1px solid #DDD;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .placeholder-label {
            font-size: 14px;
            color: #AAA;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="beat-label">06 · Check-ins</div>
    <div class="frame">
        <div class="headline" data-drift-editable="headline" data-drift-maxlen="60">Daily check-ins via<br>chat, voice, video, or the app.</div>
        <div class="domains">
            <span class="domain-tag">Sleep</span>
            <span class="domain-tag">Pain</span>
            <span class="domain-tag">Nutrition</span>
            <span class="domain-tag">Medication</span>
            <span class="domain-tag">Mobility</span>
        </div>
        <div class="placeholder-visual">
            <span class="placeholder-label">Channel icons and app card visual</span>
        </div>
    </div>
</body>
</html>
