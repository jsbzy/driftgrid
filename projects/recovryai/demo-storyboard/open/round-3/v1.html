<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02 — Intro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: #ffffff; }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        /* Slide layout */
        .slide { display: flex; width: 100%; height: 100vh; }
        .left { width: 46%; display: flex; align-items: center; padding-left: 120px; }
        .right { width: 54%; display: flex; align-items: center; justify-content: center; padding-right: 60px; }
        .caption { width: 580px; position: relative; min-height: 120px; }
        .cap-line {
            font-size: 40px; font-weight: 600; color: #1B1B1A; line-height: 1.3;
            letter-spacing: -0.02em;
            position: absolute; top: 0; left: 0; right: 0;
            opacity: 0; transform: translateY(14px);
            transition: opacity 0.5s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .cap-line.show { opacity: 1; transform: translateY(0); }
        .cap-line.hide { opacity: 0; transform: translateY(-10px); }

        /* Devices area */
        .devices { display: flex; align-items: center; gap: 36px; }

        /* Phone wireframe */
        .phone-wire {
            width: 160px; height: 320px; border: 2.5px solid #C8C6C1; border-radius: 28px;
            background: #FAFAF8; display: flex; flex-direction: column; align-items: center;
            padding: 34px 16px 22px; position: relative; gap: 11px;
        }
        .phone-notch {
            position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 5px; border-radius: 4px; background: #C8C6C1;
        }
        .phone-line {
            width: 100%; height: 7px; border-radius: 3px; background: #E0DED9;
        }
        .phone-line.short { width: 60%; }
        .phone-line.med { width: 80%; }
        .phone-block {
            width: 100%; height: 36px; border-radius: 6px; background: #E0DED9;
        }
        .phone-home {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            width: 44px; height: 4px; border-radius: 3px; background: #C8C6C1;
        }
        .phone-label {
            font-size: 11px; font-weight: 600; color: #B0B0AC; letter-spacing: 0.08em;
            text-transform: uppercase; margin-top: 14px;
        }

        /* Plus sign */
        .plus {
            font-size: 32px; font-weight: 400; color: #B0B0AC;
        }

        /* Laptop wireframe */
        .laptop-wire { display: flex; flex-direction: column; align-items: center; }
        .laptop-screen {
            width: 400px; height: 256px; border: 2.5px solid #C8C6C1; border-radius: 12px 12px 0 0;
            background: #FAFAF8; display: flex; flex-direction: column; overflow: hidden;
        }
        .laptop-bar {
            height: 22px; background: #F0EEEA; border-bottom: 1px solid #E0DED9;
            display: flex; align-items: center; padding: 0 10px; gap: 5px;
        }
        .laptop-dot { width: 7px; height: 7px; border-radius: 50%; background: #C8C6C1; }
        .laptop-body { flex: 1; display: flex; overflow: hidden; }
        .laptop-sidebar {
            width: 44px; background: #F0EEEA; border-right: 1px solid #E0DED9;
            display: flex; flex-direction: column; align-items: center; padding-top: 14px; gap: 11px;
        }
        .laptop-sidebar-icon {
            width: 18px; height: 18px; border-radius: 4px; background: #D0D0CC;
        }
        .laptop-sidebar-icon.active { background: #33B5B0; }
        .laptop-content {
            flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 9px;
        }
        .laptop-line {
            width: 100%; height: 6px; border-radius: 3px; background: #E0DED9;
        }
        .laptop-line.short { width: 50%; }
        .laptop-line.med { width: 75%; }
        .laptop-block {
            width: 100%; height: 40px; border-radius: 6px; background: #E0DED9;
        }
        .laptop-base {
            width: 432px; height: 11px; background: #E0DED9; border-radius: 0 0 6px 6px;
        }
        .laptop-label {
            font-size: 11px; font-weight: 600; color: #B0B0AC; letter-spacing: 0.08em;
            text-transform: uppercase; margin-top: 14px;
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="left">
            <div class="caption">
                <div class="cap-line" id="cap1">RecovryAI is made up<br>of two parts —</div>
                <div class="cap-line" id="cap2">a patient-facing app,</div>
                <div class="cap-line" id="cap3">and a provider dashboard.</div>
                <div class="cap-line" id="cap4">They work together<br>in real time.</div>
            </div>
        </div>
        <div class="right">
            <div class="devices">
                <!-- Phone wireframe -->
                <div class="device" id="dev-phone" style="opacity:0;transform:translateY(24px);transition:all 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);display:flex;flex-direction:column;align-items:center;">
                    <div class="phone-wire">
                        <div class="phone-notch"></div>
                        <div class="phone-line"></div>
                        <div class="phone-line short"></div>
                        <div class="phone-block"></div>
                        <div class="phone-line med"></div>
                        <div class="phone-line"></div>
                        <div class="phone-line short"></div>
                        <div class="phone-block"></div>
                        <div class="phone-line med"></div>
                        <div class="phone-line short"></div>
                        <div class="phone-home"></div>
                    </div>
                    <div class="phone-label">Patient</div>
                </div>

                <!-- Plus sign -->
                <div class="plus" id="dev-plus" style="opacity:0;transition:opacity 0.5s ease;">+</div>

                <!-- Laptop wireframe -->
                <div class="device" id="dev-laptop" style="opacity:0;transform:translateY(24px);transition:all 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);display:flex;flex-direction:column;align-items:center;">
                    <div class="laptop-wire">
                        <div class="laptop-screen">
                            <div class="laptop-bar">
                                <div class="laptop-dot"></div>
                                <div class="laptop-dot"></div>
                                <div class="laptop-dot"></div>
                            </div>
                            <div class="laptop-body">
                                <div class="laptop-sidebar">
                                    <div class="laptop-sidebar-icon active"></div>
                                    <div class="laptop-sidebar-icon"></div>
                                    <div class="laptop-sidebar-icon"></div>
                                    <div class="laptop-sidebar-icon"></div>
                                </div>
                                <div class="laptop-content">
                                    <div class="laptop-line"></div>
                                    <div class="laptop-line short"></div>
                                    <div class="laptop-block"></div>
                                    <div class="laptop-line med"></div>
                                    <div class="laptop-line"></div>
                                    <div class="laptop-line short"></div>
                                    <div class="laptop-block"></div>
                                </div>
                            </div>
                        </div>
                        <div class="laptop-base"></div>
                    </div>
                    <div class="laptop-label">Provider</div>
                </div>
            </div>
        </div>
    </div>
    <audio id="vo" preload="auto" src="../../audio/02-intro.mp3?v=4"></audio>
    <script>
        let currentCap = null;

        function showCap(id) {
            if (currentCap) {
                currentCap.classList.remove('show');
                currentCap.classList.add('hide');
            }
            const el = document.getElementById(id);
            if (el) {
                el.classList.remove('hide');
                void el.offsetHeight;
                el.classList.add('show');
                currentCap = el;
            }
        }

        function reset() {
            const vo = document.getElementById('vo');
            vo.pause();
            vo.currentTime = 0;
            currentCap = null;
            document.querySelectorAll('.cap-line').forEach(el => el.classList.remove('show', 'hide'));
            document.getElementById('dev-phone').style.opacity = '0';
            document.getElementById('dev-phone').style.transform = 'translateY(24px)';
            document.getElementById('dev-plus').style.opacity = '0';
            document.getElementById('dev-laptop').style.opacity = '0';
            document.getElementById('dev-laptop').style.transform = 'translateY(24px)';
        }

        function run() {
            reset();
            const vo = document.getElementById('vo');
            vo.play().catch(() => {});

            // 0.4s — "RecovryAI is made up of two parts —"
            setTimeout(() => showCap('cap1'), 400);

            // 2.6s — "a patient-facing app,"
            setTimeout(() => {
                document.getElementById('dev-phone').style.opacity = '1';
                document.getElementById('dev-phone').style.transform = 'translateY(0)';
                showCap('cap2');
            }, 2600);

            // 3.6s — plus sign fades in
            setTimeout(() => document.getElementById('dev-plus').style.opacity = '1', 3600);

            // 3.9s — "and a provider dashboard."
            setTimeout(() => {
                document.getElementById('dev-laptop').style.opacity = '1';
                document.getElementById('dev-laptop').style.transform = 'translateY(0)';
                showCap('cap3');
            }, 3900);

            // 5.7s — "They work together in real time."
            setTimeout(() => showCap('cap4'), 5700);
        }

        // Loop after audio ends
        const vo = document.getElementById('vo');
        vo.addEventListener('ended', () => setTimeout(run, 2000));

        run();

        // Click anywhere to start (handles autoplay block)
        document.addEventListener('click', function handler() {
            document.removeEventListener('click', handler);
            run();
        });
    
        // VO mute toggle — press H to mute/unmute, persists across slides
        (function() {
            var a = document.getElementById('vo');
            if (!a) return;
            if (localStorage.getItem('drift-vo-muted') === 'true') a.muted = true;
            document.addEventListener('keydown', function(e) {
                if (e.key === 'h' || e.key === 'H') {
                    if (e.target instanceof HTMLInputElement || e.target instanceof HTMLTextAreaElement) return;
                    a.muted = !a.muted;
                    localStorage.setItem('drift-vo-muted', String(a.muted));
                }
            });
        })();
    </script>
</body>
</html>
