<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Storyboard — The Problem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        .beat-label {
            position: fixed;
            top: 32px; left: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #A3A3A0;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            max-width: 880px;
            text-align: center;
        }
        .stat {
            font-size: 32px;
            font-weight: 600;
            color: #1B1B1A;
            line-height: 1.5;
        }
        .stat-highlight {
            color: #33B6B0;
        }
        .divider {
            width: 48px;
            height: 2px;
            background: #33B6B0;
            border-radius: 1px;
        }
        .gap {
            font-size: 22px;
            font-weight: 400;
            color: #3A3A38;
            line-height: 1.6;
            max-width: 720px;
        }
    </style>
</head>
<body>
    <div class="beat-label">02 · The Problem</div>
    <div class="frame">
        <div class="stat" data-drift-editable="stat" data-drift-maxlen="160">More than <span class="stat-highlight">80%</span> of US surgeries are now same-day.<br>Over 150 million procedures a year — and rising.</div>
        <div class="divider"></div>
        <div class="gap" data-drift-editable="gap" data-drift-maxlen="180">Patients go home during their most vulnerable phase of recovery, with discharge instructions frequently forgotten or misunderstood.</div>
    </div>
</body>
</html>
