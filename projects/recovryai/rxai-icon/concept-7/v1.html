<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RxAI V07</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
        <style>
        :root { --teal: #33B6B0; --black: #1B1B1A; --bg: #FAFAF9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { max-width: 1440px; margin: 0 auto;
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg); color: var(--black);
            -webkit-font-smoothing: antialiased;
            padding: 48px 64px 120px;
        }
        .page-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px; font-weight: 500;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: #999; margin-bottom: 20px;
        }
        .label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px; font-weight: 500;
            letter-spacing: 0.06em; text-transform: uppercase;
            color: #999; margin-bottom: 14px; margin-top: 32px;
        }
        .section-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .section-desc {
            font-size: 13px; color: #777; margin-bottom: 28px;
            max-width: 580px; line-height: 1.5;
        }

        .hero { display: flex; gap: 24px; margin-bottom: 8px; flex-wrap: wrap; }
        .card {
            display: flex; align-items: center; justify-content: center;
            border-radius: 14px; border: 1px solid #E8E8E6; background: white;
        }
        .card.dark { background: var(--black); border-color: #333; }
        .card.teal-bg { background: var(--teal); border-color: var(--teal); }
        .card.hero-lg { width: 300px; height: 280px; }
        .card.hero-wide { width: 480px; height: 200px; }
        .card.sm { width: 120px; height: 110px; }

        .mark { display: block; }

        .sizes { display: flex; align-items: flex-end; gap: 40px; margin-bottom: 8px; flex-wrap: wrap; }
        .size-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .size-val { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #999; }

        .inline-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .inline-card {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 18px; background: white;
            border: 1px solid #E8E8E6; border-radius: 8px;
        }
        .inline-card.dark { background: var(--black); border-color: #333; }
        .inline-card span {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px; font-weight: 500; color: #3A3A38;
        }
        .inline-card.dark span { color: #ccc; }

        .color-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }

        .badge-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
        .category-badge {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 10px 18px; border-radius: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px; font-weight: 500; letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .category-badge.light { background: white; border: 1px solid #E8E8E6; color: var(--black); }
        .category-badge.dark { background: var(--black); border: 1px solid #333; color: white; }
        .category-badge.teal { background: rgba(51,182,176,0.1); border: 1px solid rgba(51,182,176,0.25); color: var(--teal); }
    </style>
</head>

<script>
document.querySelectorAll('svg:not([style*="display:none"])').forEach(svg => {
    if (!svg.closest('nav') && svg.querySelector('use')) {
        svg.style.cursor = 'pointer';
        svg.addEventListener('click', function() {
            const scale = 4;
            const w = this.width.baseVal.value || this.getBoundingClientRect().width;
            const h = this.height.baseVal.value || this.getBoundingClientRect().height;
            const clone = this.cloneNode(true);
            clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
            clone.setAttribute('width', w);
            clone.setAttribute('height', h);
            const defs = document.querySelector('svg[style*="display:none"] defs');
            if (defs) clone.insertBefore(defs.cloneNode(true), clone.firstChild);
            const xml = new XMLSerializer().serializeToString(clone);
            const blob = new Blob([xml], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = w * scale;
                canvas.height = h * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w * scale, h * scale);
                URL.revokeObjectURL(url);
                const a = document.createElement('a');
                a.download = 'rxai-' + (clone.querySelector('use')?.getAttribute('href')?.replace('#','') || 'icon') + '.png';
                a.href = canvas.toDataURL('image/png');
                a.click();
            };
            img.src = url;
        });
    }
});
</script>
