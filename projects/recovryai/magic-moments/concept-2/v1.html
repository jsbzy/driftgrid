<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecovryAI — Living Prescription</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: #F5F7FA;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            display: flex;
            flex-direction: column;
            width: 460px;
            height: 580px;
            border: 1.5px solid rgba(51,182,176,0.35);
            border-radius: 12px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            justify-content: space-between;
        }
        .watermark {
            position: absolute;
            bottom: -60px;
            right: -40px;
            opacity: 0.035;
        }
        .content { display: flex; flex-direction: column; gap: 18px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .logo { height: 42px; margin-left: -14px; }
        .status-row { display: flex; align-items: center; gap: 10px; }
        .day-counter { font-size: 14px; font-weight: 600; color: #1B1B1A; }
        .day-counter span { font-weight: 400; color: #aaa; }
        .active-pill {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 10px;
            background: rgba(5, 150, 105, 0.08);
            border: 1px solid rgba(5, 150, 105, 0.2);
            border-radius: 20px;
        }
        .active-dot {
            width: 7px; height: 7px; border-radius: 4px;
            background: #059669;
            box-shadow: 0 0 6px rgba(5,150,105,0.4);
        }
        .active-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; font-weight: 500;
            letter-spacing: 0.04em; color: #059669;
        }
        .divider { width: 100%; height: 1px; background: rgba(51,182,176,0.12); }
        .field-row { display: flex; gap: 40px; }
        .field { display: flex; flex-direction: column; gap: 3px; }
        .field-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px; font-weight: 500;
            letter-spacing: 0.06em;
            color: rgba(51,182,176,0.6);
            text-transform: uppercase;
        }
        .field-label.teal { color: #33B6B0; }
        .field-value { font-size: 13px; font-weight: 500; color: #1B1B1A; }
        .procedure-row { display: flex; align-items: center; gap: 5px; }
        .procedure-meta {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; font-weight: 400; color: #aaa;
        }
        .rx-name { font-size: 19px; font-weight: 600; color: #1B1B1A; line-height: 1.2; }
        .rx-desc { font-size: 12px; font-weight: 300; color: #555; }
        .connected-pills { display: flex; gap: 8px; }
        .sensor-pill {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 10px;
            border: 1px solid rgba(51,182,176,0.2);
            border-radius: 6px;
        }
        .sensor-dot { width: 5px; height: 5px; border-radius: 3px; background: #33B6B0; }
        .sensor-name {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; font-weight: 400; color: #555;
        }
        .signature-area { display: flex; flex-direction: column; gap: 12px; }
        .sig-row { display: flex; justify-content: space-between; align-items: flex-end; padding-top: 4px; }
        .sig-left { display: flex; flex-direction: column; width: 200px; }
        .sig-cursive {
            font-family: 'Dancing Script', cursive;
            font-size: 26px; font-weight: 400;
            color: #1B1B1A; padding-bottom: 4px;
        }
        .sig-line { width: 200px; height: 1px; background: #1B1B1A; }
        .sig-name { font-size: 10px; font-weight: 400; font-style: italic; color: #888; padding-top: 5px; }
        .sig-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .signed-badge {
            display: flex; align-items: center; gap: 4px;
            padding: 3px 8px;
            background: rgba(51,182,176,0.08);
            border: 1px solid rgba(51,182,176,0.2);
            border-radius: 4px;
        }
        .signed-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 7px; font-weight: 500;
            letter-spacing: 0.04em; color: #33B6B0;
        }
        .sig-date {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; font-weight: 400; color: #aaa;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Watermark: RxAI letterforms only (no border) -->
    <div class="watermark">
        <svg width="340" height="356" viewBox="0 0 370 387" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M76.5328 228V62.4056H144.937C157.336 62.4056 168.036 64.6426 177.038 69.1167C186.094 73.5369 193.074 79.8976 197.979 88.1989C202.885 96.4462 205.337 106.23 205.337 117.55C205.337 129.031 202.831 138.788 197.818 146.82C192.805 154.798 185.689 160.889 176.472 165.094C167.254 169.244 156.338 171.319 143.725 171.319H100.466V139.785H136.286C142.323 139.785 147.363 139.004 151.406 137.441C155.503 135.823 158.602 133.398 160.705 130.163C162.807 126.875 163.858 122.671 163.858 117.55C163.858 112.429 162.807 108.197 160.705 104.855C158.602 101.459 155.503 98.9259 151.406 97.2548C147.309 95.5299 142.269 94.6674 136.286 94.6674H116.557V228H76.5328ZM169.76 152.318L210.997 228H167.335L126.906 152.318H169.76Z" fill="#33B6B0"/>
            <path d="M176.042 167.406L206.282 219.72H207.576L238.14 167.406H282.934L232.965 250.203L284.552 333H238.625L207.576 280.12H206.282L175.233 333H129.63L180.974 250.203L130.924 167.406H176.042Z" fill="#33B6B0"/>
            <path d="M231.862 141H218.64L235.814 90.1006H252.192L269.366 141H256.144L244.189 102.925H243.792L231.862 141ZM230.098 120.968H257.734V130.313H230.098V120.968ZM287.148 90.1006V141H274.846V90.1006H287.148Z" fill="#33B6B0"/>
        </svg>
    </div>

    <!-- Content -->
    <div class="content">
        <!-- Header: Logo + Day Counter + Active -->
        <div class="header">
            <img class="logo" src="../../brand/logos/logo-color-dark.svg" alt="recovry.ai" />
            <div class="status-row">
                <div class="day-counter">Day 8 <span>of 90</span></div>
                <div class="active-pill">
                    <div class="active-dot"></div>
                    <div class="active-text">ACTIVE</div>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Patient + Procedure -->
        <div class="field-row">
            <div class="field">
                <div class="field-label">PATIENT</div>
                <div class="field-value">James Park</div>
            </div>
            <div class="field">
                <div class="field-label">PROCEDURE</div>
                <div class="procedure-row">
                    <div class="field-value">Right Total Knee Arthroplasty</div>
                    <svg width="11" height="12" viewBox="0 0 11 12" fill="none"><rect x="1.5" y="0.5" width="8" height="11" rx="1" stroke="#33B6B0" stroke-width="1.2" fill="none"/><line x1="3.5" y1="3.5" x2="7.5" y2="3.5" stroke="#33B6B0" stroke-width="1" stroke-linecap="round"/><line x1="3.5" y1="5.5" x2="7.5" y2="5.5" stroke="#33B6B0" stroke-width="1" stroke-linecap="round"/><line x1="3.5" y1="7.5" x2="6" y2="7.5" stroke="#33B6B0" stroke-width="1" stroke-linecap="round"/></svg>
                </div>
                <div class="procedure-meta">March 14, 2026 · UCSF Medical Center</div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Prescription -->
        <div class="field">
            <div class="field-label teal">PRESCRIPTION</div>
            <div class="rx-name">Virtual Care Assistant</div>
            <div class="rx-desc">90-day post-operative recovery monitoring</div>
        </div>

        <div class="divider"></div>

        <!-- Connected Sensors -->
        <div class="field" style="gap: 8px;">
            <div class="field-label">CONNECTED</div>
            <div class="connected-pills">
                <div class="sensor-pill"><div class="sensor-dot"></div><div class="sensor-name">Apple Watch</div></div>
                <div class="sensor-pill"><div class="sensor-dot"></div><div class="sensor-name">Knee Sensor</div></div>
            </div>
        </div>
    </div>

    <!-- Signature Area -->
    <div class="signature-area">
        <div class="divider"></div>
        <div class="sig-row">
            <div class="sig-left">
                <div class="sig-cursive">E. Morris</div>
                <div class="sig-line"></div>
                <div class="sig-name">Dr. Elena Morris, MD</div>
            </div>
            <div class="sig-right">
                <div class="signed-badge">
                    <svg width="8" height="10" viewBox="0 0 10 12" fill="none"><rect x="1" y="5" width="8" height="6" rx="1.5" fill="#33B6B0"/><path d="M3 5V3.5C3 2.12 3.9 1 5 1C6.1 1 7 2.12 7 3.5V5" stroke="#33B6B0" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
                    <div class="signed-text">SIGNED</div>
                </div>
                <div class="sig-date">March 14, 2026</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
