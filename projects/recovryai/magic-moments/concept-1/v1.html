<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rx Trust Indicator — Seal Animation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: #F5F7FA;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .chat { display: flex; flex-direction: column; width: 420px; gap: 16px; }

        .msg { display: flex; gap: 10px; opacity: 0; transform: translateY(12px); }
        .msg.show { animation: msgIn 0.4s ease-out forwards; }

        .avatar {
            width: 32px; height: 32px; border-radius: 16px;
            background: rgba(51,182,176,0.12);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .avatar svg { width: 18px; height: 18px; }

        .msg-content { display: flex; flex-direction: column; gap: 4px; flex: 1; }

        .bubble {
            background: #f0f0ee; border-radius: 14px; padding: 12px 16px;
        }
        .bubble p { font-size: 14px; color: #1B1B1A; line-height: 1.5; }

        .footer { display: flex; align-items: center; gap: 5px; padding-left: 4px; height: 20px; }

        /* The Rx badge — starts invisible, then seals in */
        .rx-badge {
            width: 16px; height: 16px; border-radius: 3px;
            background: #33B6B0;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: scale(0);
        }
        .rx-badge.seal { animation: sealIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .rx-badge span {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 8px; font-weight: 700; color: white; line-height: 1;
        }

        /* Seal ring — brief teal ring that expands and fades */
        .seal-ring {
            position: absolute; width: 16px; height: 16px; border-radius: 3px;
            border: 2px solid #33B6B0; opacity: 0; pointer-events: none;
        }
        .seal-ring.pulse { animation: ringPulse 0.6s ease-out forwards; }

        .verified-text {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 10px; color: #aaa;
            opacity: 0;
        }
        .verified-text.show { animation: fadeIn 0.3s ease-out forwards; }

        .dot { width: 3px; height: 3px; border-radius: 2px; background: #ccc; opacity: 0; }
        .dot.show { animation: fadeIn 0.2s ease-out forwards; }

        .time {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px; color: #aaa;
            opacity: 0;
        }
        .time.show { animation: fadeIn 0.3s ease-out forwards; }

        /* User message */
        .user-msg {
            display: flex; justify-content: flex-end;
            opacity: 0; transform: translateY(12px);
        }
        .user-msg.show { animation: msgIn 0.4s ease-out forwards; }
        .user-bubble {
            background: #33B6B0; border-radius: 14px; padding: 12px 16px; max-width: 280px;
        }
        .user-bubble p { font-size: 14px; color: white; line-height: 1.5; }

        /* Stylized version — glow border on the whole message */
        .msg.glow .bubble {
            animation: glowBorder 0.8s ease-out forwards;
            border: 1.5px solid transparent;
        }

        /* Replay button */
        .replay {
            position: fixed; bottom: 32px;
            font-family: 'IBM Plex Mono', monospace; font-size: 11px;
            color: #33B6B0; background: none; border: 1px solid rgba(51,182,176,0.3);
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
        }
        .replay:hover { background: rgba(51,182,176,0.05); }

        /* ── Keyframes ── */
        @keyframes msgIn {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes sealIn {
            0% { opacity: 0; transform: scale(0) rotate(-20deg); }
            60% { opacity: 1; transform: scale(1.15) rotate(3deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        @keyframes ringPulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 0; transform: scale(2.5); border-radius: 6px; }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes glowBorder {
            0% { border-color: rgba(51,182,176,0.6); box-shadow: 0 0 12px rgba(51,182,176,0.2); }
            100% { border-color: transparent; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="chat" id="chat">
    <!-- Message 1 -->
    <div class="msg" id="msg1">
        <div class="avatar">
            <svg viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M666.16 319.463C666.16 327.133 672.345 333.35 679.975 333.35H831.937V666.65H679.975C672.345 666.65 666.16 672.868 666.16 680.538V833.3H334.605V680.538C334.605 672.868 328.42 666.65 320.79 666.65H168.827V333.35H320.79C328.42 333.35 334.605 327.133 334.605 319.463V166.7H666.16V319.463ZM500.382 250.025C500.382 388.083 389.051 500 251.716 500C389.051 500 500.382 611.918 500.382 749.975C500.382 611.918 611.714 500 749.048 500C611.714 500 500.382 388.083 500.382 250.025Z" fill="#33B6B0"/>
            </svg>
        </div>
        <div class="msg-content">
            <div class="bubble">
                <p>Good morning, James. How did you sleep last night?</p>
            </div>
            <div class="footer">
                <div style="position: relative; display: flex;">
                    <div class="rx-badge" id="seal1"><span>Rx</span></div>
                    <div class="seal-ring" id="ring1"></div>
                </div>
                <span class="verified-text" id="vt1">Verified</span>
                <span class="dot" id="dot1"></span>
                <span class="time" id="time1">8:04 AM</span>
            </div>
        </div>
    </div>

    <!-- User reply -->
    <div class="user-msg" id="msg2">
        <div class="user-bubble">
            <p>Pretty well. Woke up once around 3am but fell back asleep.</p>
        </div>
    </div>

    <!-- Message 2 — escalation -->
    <div class="msg" id="msg3">
        <div class="avatar">
            <svg viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M666.16 319.463C666.16 327.133 672.345 333.35 679.975 333.35H831.937V666.65H679.975C672.345 666.65 666.16 672.868 666.16 680.538V833.3H334.605V680.538C334.605 672.868 328.42 666.65 320.79 666.65H168.827V333.35H320.79C328.42 333.35 334.605 327.133 334.605 319.463V166.7H666.16V319.463ZM500.382 250.025C500.382 388.083 389.051 500 251.716 500C389.051 500 500.382 611.918 500.382 749.975C500.382 611.918 611.714 500 749.048 500C611.714 500 500.382 388.083 500.382 250.025Z" fill="#33B6B0"/>
            </svg>
        </div>
        <div class="msg-content">
            <div class="bubble" style="border-left: 3px solid #D97706;">
                <p>Your pain has increased over the past two days. I've notified Dr. Morris.</p>
            </div>
            <div class="footer">
                <div style="position: relative; display: flex;">
                    <div class="rx-badge" id="seal2"><span>Rx</span></div>
                    <div class="seal-ring" id="ring2"></div>
                </div>
                <span class="verified-text" id="vt2">Verified</span>
                <span class="dot" id="dot2"></span>
                <span class="time" id="time2">10:14 AM</span>
            </div>
        </div>
    </div>
</div>

<button class="replay" onclick="replay()">Replay</button>

<script>
function runSequence() {
    // Reset
    document.querySelectorAll('.msg, .user-msg').forEach(el => el.classList.remove('show', 'glow'));
    document.querySelectorAll('.rx-badge').forEach(el => el.classList.remove('seal'));
    document.querySelectorAll('.seal-ring').forEach(el => el.classList.remove('pulse'));
    document.querySelectorAll('.verified-text, .dot, .time').forEach(el => el.classList.remove('show'));

    const t = (ms) => new Promise(r => setTimeout(r, ms));

    (async () => {
        // Message 1 slides in
        await t(500);
        msg1.classList.add('show');

        // Seal animation
        await t(800);
        seal1.classList.add('seal');
        ring1.classList.add('pulse');

        await t(300);
        vt1.classList.add('show');

        await t(150);
        dot1.classList.add('show');
        time1.classList.add('show');

        // User reply
        await t(1200);
        msg2.classList.add('show');

        // Message 2 (escalation)
        await t(1500);
        msg3.classList.add('show');

        // Seal animation on escalation
        await t(800);
        seal2.classList.add('seal');
        ring2.classList.add('pulse');

        await t(300);
        vt2.classList.add('show');

        await t(150);
        dot2.classList.add('show');
        time2.classList.add('show');
    })();
}

function replay() { runSequence(); }

// Auto-play on load
runSequence();
</script>

</body>
</html>
