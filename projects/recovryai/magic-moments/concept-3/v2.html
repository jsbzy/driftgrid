<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pain Check-In — Confident Circles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: #F5F7FA;
            -webkit-font-smoothing: antialiased;
        }

        .screen {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px 32px;
            position: relative;
        }

        .content {
            display: flex; flex-direction: column;
            align-items: center; gap: 56px;
            max-width: 380px; width: 100%;
            position: relative;
        }

        .greeting {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .greeting-day {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px; font-weight: 500;
            letter-spacing: 0.06em; color: #33B6B0;
        }
        .greeting-question {
            font-size: 32px; font-weight: 300;
            color: #1B1B1A; text-align: center;
            line-height: 1.25; letter-spacing: -0.01em;
        }
        .greeting-question strong { font-weight: 600; }

        .options {
            display: flex; flex-direction: column;
            gap: 6px; width: 100%;
        }

        .option {
            padding: 16px 20px;
            background: white;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex; flex-direction: row;
            align-items: center; gap: 16px;
            border: 1.5px solid transparent;
        }
        .option:hover {
            background: #FAFAF8;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .option:active { transform: translateY(0); }
        .option.selected { border-color: #E0E0DE; }

        .option-circle {
            width: 36px; height: 36px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px; font-weight: 500; color: white;
            flex-shrink: 0;
            transition: transform 0.15s ease;
        }
        .option:hover .option-circle { transform: scale(1.05); }

        .option-text {
            font-size: 17px; font-weight: 500;
            color: #1B1B1A;
        }

        /* Spectrum colors — muted, not neon */
        .option[data-level="1"] .option-circle { background: #6BCB9B; }
        .option[data-level="2"] .option-circle { background: #8CC98F; }
        .option[data-level="3"] .option-circle { background: #D4A843; }
        .option[data-level="4"] .option-circle { background: #CD7F3A; }
        .option[data-level="5"] .option-circle { background: #C45B4A; }

        .rx-footer {
            display: flex; align-items: center; gap: 6px;
            position: absolute; bottom: -60px;
        }
        .rx-badge {
            width: 14px; height: 14px; border-radius: 2px;
            background: #ccc;
            display: flex; align-items: center; justify-content: center;
        }
        .rx-badge span { font-size: 6px; font-weight: 700; color: white; }
        .rx-label { font-size: 10px; color: #bbb; }

        .confirmed {
            display: none; flex-direction: column;
            align-items: center; gap: 20px;
        }
        .confirmed.show { display: flex; }
        .confirmed-circle {
            width: 64px; height: 64px; border-radius: 32px;
            display: flex; align-items: center; justify-content: center;
        }
        .confirmed-text {
            font-size: 20px; font-weight: 300; color: #555;
            text-align: center; line-height: 1.4;
        }
        .confirmed-text strong { font-weight: 600; color: #1B1B1A; }
        .confirmed-sub {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px; color: #bbb;
        }

        .voice-hint {
            position: absolute; bottom: 32px;
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: #bbb;
        }
        .voice-dot {
            width: 8px; height: 8px; border-radius: 4px;
            background: rgba(51,182,176,0.3);
        }

        .replay {
            position: fixed; top: 20px; right: 20px;
            font-family: 'IBM Plex Mono', monospace; font-size: 11px;
            color: #999; background: none; border: 1px solid #ddd;
            padding: 6px 12px; border-radius: 6px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="screen">
    <div class="content" id="questionView">
        <div class="greeting">
            <div class="greeting-day">DAY 8 · MORNING CHECK-IN</div>
            <div class="greeting-question">How's your <strong>pain</strong> today?</div>
        </div>

        <div class="options">
            <div class="option" data-level="1" onclick="select(this, 1)">
                <span class="option-circle">1</span>
                <span class="option-text">None</span>
            </div>
            <div class="option" data-level="2" onclick="select(this, 2)">
                <span class="option-circle">2</span>
                <span class="option-text">Mild</span>
            </div>
            <div class="option" data-level="3" onclick="select(this, 3)">
                <span class="option-circle">3</span>
                <span class="option-text">Moderate</span>
            </div>
            <div class="option" data-level="4" onclick="select(this, 4)">
                <span class="option-circle">4</span>
                <span class="option-text">Significant</span>
            </div>
            <div class="option" data-level="5" onclick="select(this, 5)">
                <span class="option-circle">5</span>
                <span class="option-text">Severe</span>
            </div>
        </div>

        <div class="rx-footer">
            <div class="rx-badge"><span>Rx</span></div>
            <span class="rx-label">Verified</span>
        </div>
    </div>

    <div class="confirmed" id="confirmView">
        <div class="confirmed-circle" id="confirmCircle">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <path d="M7 14.5L12 19.5L21 9.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div>
            <div class="confirmed-text">Your pain is <strong id="painLevel">moderate</strong> today</div>
            <div class="confirmed-sub" style="text-align: center; margin-top: 8px;">Recorded · 8:04 AM</div>
        </div>
    </div>

    <div class="voice-hint">
        <div class="voice-dot"></div>
        Or just tell me how you feel
    </div>
</div>

<button class="replay" onclick="location.reload()">Replay</button>

<script>
const levels = {1: 'no pain', 2: 'mild', 3: 'moderate', 4: 'significant', 5: 'severe'};
const colors = {1: '#6BCB9B', 2: '#8CC98F', 3: '#D4A843', 4: '#CD7F3A', 5: '#C45B4A'};

function select(el, level) {
    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');

    setTimeout(() => {
        document.getElementById('painLevel').textContent = levels[level];
        document.getElementById('confirmCircle').style.background = colors[level];
        document.getElementById('questionView').style.display = 'none';
        document.querySelector('.voice-hint').style.display = 'none';
        document.getElementById('confirmView').classList.add('show');
    }, 350);
}
</script>

</body>
</html>
