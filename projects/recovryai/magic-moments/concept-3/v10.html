<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pain Check-In — v9 (Vertical)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: #F5F7FA;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        .screen {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 32px;
            position: relative;
        }

        .card {
            display: flex; flex-direction: column;
            align-items: center;
            background: white;
            border: 1.5px solid rgba(0,0,0,0.06);
            border-radius: 20px;
            padding: 28px 24px;
            max-width: 340px;
            width: 100%;
        }

        .left {
            display: flex; flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .greeting {
            display: flex; flex-direction: column; gap: 8px;
        }
        .greeting-day {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px; font-weight: 500;
            letter-spacing: 0.06em; color: #33B6B0;
        }
        .greeting-question {
            font-size: 24px; font-weight: 300;
            color: #1B1B1A; text-align: center;
            line-height: 1.2; letter-spacing: -0.02em;
        }
        .greeting-question strong { font-weight: 600; }

        .current-label {
            font-size: 22px; font-weight: 200;
            color: #1B1B1A; text-align: center;
            letter-spacing: -0.02em;
            min-height: 28px;
            transition: all 0.25s ease;
        }
        .current-label.prompt {
            font-size: 14px; font-weight: 400;
            color: #bbb; letter-spacing: 0;
        }

        .rx-footer {
            display: flex; align-items: center; gap: 6px;
        }
        .rx-badge {
            width: 14px; height: 14px; border-radius: 2px;
            background: #ccc;
            display: flex; align-items: center; justify-content: center;
        }
        .rx-badge span { font-size: 6px; font-weight: 700; color: white; }
        .rx-label { font-size: 10px; color: #bbb; }

        /* Right side — vertical dots */
        .dots-track {
            display: flex; flex-direction: column-reverse;
            align-items: center; justify-content: center;
            gap: 12px;
            padding: 12px 0;
            cursor: pointer;
            margin-top: 16px;
        }

        .dot-point {
            display: flex; flex-direction: row;
            align-items: center;
            position: relative;
        }

        .dot-label {
            position: absolute;
            left: 60px;
            font-size: 13px; font-weight: 400; color: #aaa;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(-4px);
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .dot-circle {
            width: 44px; height: 44px;
            border-radius: 22px;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
        }

        /* Teal baseline spectrum — bottom (none) to top (severe) */
        .dot-point[data-level="1"] .dot-circle { background: #33B6B0; }
        .dot-point[data-level="2"] .dot-circle { background: #7BADA6; }
        .dot-point[data-level="3"] .dot-circle { background: #B8A07A; }
        .dot-point[data-level="4"] .dot-circle { background: #C4805A; }
        .dot-point[data-level="5"] .dot-circle { background: #C45B4A; }

        /* Resting */
        .dot-point .dot-circle {
            opacity: 0.4;
            transform: scale(0.82);
        }

        /* Pulse on bottom dot */
        @keyframes softPulse {
            0%, 100% { transform: scale(0.82); }
            50% { transform: scale(0.88); }
        }
        .dot-point[data-level="1"] .dot-circle {
            animation: softPulse 3s ease-in-out infinite;
        }
        .dot-point.touched .dot-circle,
        .dot-point.active .dot-circle,
        .dot-point.lit .dot-circle { animation: none; }

        /* Hover */
        .dot-point:hover .dot-circle {
            opacity: 0.65;
            transform: scale(1);
        }
        .dot-point:hover .dot-label {
            opacity: 1;
            transform: translateX(0);
        }

        /* Lit */
        .dot-point.lit .dot-circle {
            opacity: 0.55;
            transform: scale(0.9);
        }

        /* Active */
        .dot-point.active .dot-circle {
            opacity: 1;
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(0,0,0,0.06);
        }
        .dot-point.active .dot-label {
            opacity: 1;
            transform: translateX(0);
            font-weight: 600;
            color: #555;
        }

        /* Glow */
        .dot-point.active .dot-circle::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 180%; height: 180%;
            border-radius: 50%;
            background: inherit;
            opacity: 0.12;
            filter: blur(10px);
            z-index: -1;
        }

        /* Confirmed */
        .confirmed {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px;
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            background: #F5F7FA;
        }
        .confirmed.show { display: flex; }
        .confirmed-dot {
            width: 44px; height: 44px; border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
        }
        .confirmed-text {
            font-size: 22px; font-weight: 300; color: #1B1B1A; text-align: center;
        }
        .confirmed-text strong { font-weight: 600; }
        .confirmed-sub {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px; color: #bbb; text-align: center; margin-top: 4px;
        }

        .voice-hint {
            position: absolute; bottom: 32px;
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: #bbb;
        }
        .voice-dot {
            width: 8px; height: 8px; border-radius: 4px;
            background: rgba(51,182,176,0.3);
        }

        .replay {
            position: fixed; top: 20px; right: 20px;
            font-family: 'IBM Plex Mono', monospace; font-size: 11px;
            color: #999; background: none; border: 1px solid #ddd;
            padding: 6px 12px; border-radius: 6px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="screen" id="questionView">
  <div class="card">
    <div class="left">
        <div class="greeting">
            <div class="greeting-day">DAY 8 · MORNING CHECK-IN</div>
            <div class="greeting-question">How's your<br><strong>pain</strong> today?</div>
        </div>

        <div class="current-label prompt" id="currentLabel">Tap or slide to select</div>
    </div>

    <div class="dots-track" id="dotsTrack">
        <div class="dot-point" data-level="1"><div class="dot-circle"></div><span class="dot-label">None</span></div>
        <div class="dot-point" data-level="2"><div class="dot-circle"></div><span class="dot-label">Mild</span></div>
        <div class="dot-point" data-level="3"><div class="dot-circle"></div><span class="dot-label">Moderate</span></div>
        <div class="dot-point" data-level="4"><div class="dot-circle"></div><span class="dot-label">Significant</span></div>
        <div class="dot-point" data-level="5"><div class="dot-circle"></div><span class="dot-label">Severe</span></div>
    </div>

    <div style="display: flex; flex-direction: row; align-items: center; justify-content: space-between; width: 100%; margin-top: 16px;">
        <div class="rx-footer">
            <div class="rx-badge"><span>Rx</span></div>
            <span class="rx-label">Verified</span>
        </div>
        <div style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="opacity: 0.4;">
                <rect x="5" y="1" width="4" height="7" rx="2" stroke="#33B6B0" stroke-width="1.2" fill="none"/>
                <path d="M3 7.5C3 9.7 4.8 11.5 7 11.5C9.2 11.5 11 9.7 11 7.5" stroke="#33B6B0" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="7" y1="11.5" x2="7" y2="13" stroke="#33B6B0" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span style="font-size: 10px; color: #bbb;">Tell me</span>
        </div>
    </div>
  </div>
</div>

<div class="confirmed" id="confirmView">
    <div class="confirmed-dot" id="confirmDot">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M5 11.5L9 15.5L17 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <div>
        <div class="confirmed-text">Pain: <strong id="painLevel">Moderate</strong></div>
        <div class="confirmed-sub">Recorded · 8:04 AM</div>
    </div>
    <div class="rx-footer">
        <div class="rx-badge"><span>Rx</span></div>
        <span class="rx-label">Verified</span>
    </div>
</div>

<button class="replay" onclick="location.reload()">Replay</button>

<script>
const labels = ['None', 'Mild', 'Moderate', 'Significant', 'Severe'];
const colors = ['#33B6B0', '#7BADA6', '#B8A07A', '#C4805A', '#C45B4A'];
const dots = document.querySelectorAll('.dot-point');
const track = document.getElementById('dotsTrack');
const label = document.getElementById('currentLabel');
let selected = null;
let dragging = false;

function setActive(level) {
    selected = level;
    dots.forEach((d, i) => {
        d.classList.remove('active', 'lit', 'touched');
        d.classList.add('touched');
        if (i < level - 1) d.classList.add('lit');
        if (i === level - 1) d.classList.add('active');
    });
    label.textContent = labels[level - 1];
    label.classList.remove('prompt');
    label.style.color = colors[level - 1];
}

function getLevelFromY(y) {
    const rect = track.getBoundingClientRect();
    // Column-reverse: bottom=level1, top=level5
    const pct = Math.max(0, Math.min(1, (rect.bottom - y) / rect.height));
    return Math.min(5, Math.max(1, Math.round(pct * 4) + 1));
}

// Click — one tap records
dots.forEach((d, i) => {
    d.addEventListener('click', (e) => {
        if (dragging) return;
        setActive(i + 1);
        setTimeout(() => {
            document.getElementById('painLevel').textContent = labels[selected - 1];
            document.getElementById('confirmDot').style.background = colors[selected - 1];
            document.getElementById('questionView').style.display = 'none';
            document.getElementById('confirmView').classList.add('show');
        }, 500);
    });
});

// Drag vertical
track.addEventListener('mousedown', (e) => {
    dragging = true;
    setActive(getLevelFromY(e.clientY));
});
document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    setActive(getLevelFromY(e.clientY));
});
document.addEventListener('mouseup', () => {
    if (dragging && selected) {
        dragging = false;
        setTimeout(() => {
            document.getElementById('painLevel').textContent = labels[selected - 1];
            document.getElementById('confirmDot').style.background = colors[selected - 1];
            document.getElementById('questionView').style.display = 'none';
            document.getElementById('confirmView').classList.add('show');
        }, 400);
    }
    dragging = false;
});

// Touch vertical
track.addEventListener('touchstart', (e) => {
    dragging = true;
    setActive(getLevelFromY(e.touches[0].clientY));
}, {passive: true});
document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    setActive(getLevelFromY(e.touches[0].clientY));
}, {passive: true});
document.addEventListener('touchend', () => {
    if (dragging && selected) {
        dragging = false;
        setTimeout(() => {
            document.getElementById('painLevel').textContent = labels[selected - 1];
            document.getElementById('confirmDot').style.background = colors[selected - 1];
            document.getElementById('questionView').style.display = 'none';
            document.getElementById('confirmView').classList.add('show');
        }, 400);
    }
    dragging = false;
});
</script>

</body>
</html>
