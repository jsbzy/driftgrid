<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pain Check-In — Slider</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: #F5F7FA;
            -webkit-font-smoothing: antialiased;
        }

        .screen {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px 32px;
            position: relative;
        }

        .screen::before {
            content: '';
            position: absolute;
            top: 30%; left: 50%;
            transform: translate(-50%, -50%);
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(51,182,176,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .content {
            display: flex; flex-direction: column;
            align-items: center; gap: 56px;
            max-width: 380px; width: 100%;
        }

        .greeting {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .greeting-day {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px; font-weight: 500;
            letter-spacing: 0.06em; color: #33B6B0;
        }
        .greeting-question {
            font-size: 32px; font-weight: 300;
            color: #1B1B1A; text-align: center;
            line-height: 1.25; letter-spacing: -0.01em;
        }
        .greeting-question strong { font-weight: 600; }

        /* Dynamic label that changes with slider */
        .pain-label {
            font-size: 48px; font-weight: 200;
            color: #1B1B1A; text-align: center;
            letter-spacing: -0.02em;
            transition: color 0.3s ease;
            min-height: 60px;
        }
        .pain-number {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px; font-weight: 400;
            color: #bbb; margin-top: 4px;
        }

        /* Slider */
        .slider-container {
            width: 100%;
            display: flex; flex-direction: column; gap: 12px;
        }
        .slider-track {
            position: relative;
            width: 100%; height: 6px;
            background: #E8E8E6;
            border-radius: 3px;
            cursor: pointer;
        }
        .slider-fill {
            position: absolute; top: 0; left: 0;
            height: 6px; border-radius: 3px;
            background: #33B6B0;
            width: 20%;
            transition: width 0.15s ease, background 0.3s ease;
        }
        .slider-thumb {
            position: absolute; top: 50%;
            transform: translate(-50%, -50%);
            width: 28px; height: 28px; border-radius: 14px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12), 0 0 0 2px #33B6B0;
            cursor: grab;
            left: 20%;
            transition: left 0.15s ease;
        }
        .slider-thumb:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.1); }

        .slider-labels {
            display: flex; justify-content: space-between;
            font-size: 11px; color: #aaa;
        }

        /* Confirm button */
        .confirm-btn {
            padding: 16px 48px;
            background: #33B6B0;
            border: none; border-radius: 14px;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 16px; font-weight: 600; color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0.5;
        }
        .confirm-btn.active { opacity: 1; }
        .confirm-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(51,182,176,0.25); }

        /* Rx badge */
        .rx-footer {
            display: flex; flex-direction: row;
            align-items: center; gap: 6px;
            position: absolute; bottom: 80px;
        }
        .rx-badge {
            width: 16px; height: 16px; border-radius: 3px;
            background: #ccc;
            display: flex; align-items: center; justify-content: center;
        }
        .rx-badge span { font-size: 7px; font-weight: 700; color: white; }
        .rx-label { font-size: 11px; color: #bbb; }

        .voice-hint {
            position: absolute; bottom: 32px;
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: #bbb;
        }
        .voice-dot {
            width: 8px; height: 8px; border-radius: 4px;
            background: rgba(51,182,176,0.3);
        }

        .replay {
            position: fixed; top: 20px; right: 20px;
            font-family: 'IBM Plex Mono', monospace; font-size: 11px;
            color: #999; background: none; border: 1px solid #ddd;
            padding: 6px 12px; border-radius: 6px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="screen">
    <div class="content">
        <div class="greeting">
            <div class="greeting-day">DAY 8 · MORNING CHECK-IN</div>
            <div class="greeting-question">How's your <strong>pain</strong> today?</div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div class="pain-label" id="painLabel">Not bad</div>
            <div class="pain-number" id="painNumber">2 of 5</div>
        </div>

        <div class="slider-container">
            <div class="slider-track" id="track">
                <div class="slider-fill" id="fill"></div>
                <div class="slider-thumb" id="thumb"></div>
            </div>
            <div class="slider-labels">
                <span>No pain</span>
                <span>Severe</span>
            </div>
        </div>

        <button class="confirm-btn active" onclick="confirm()">That's right</button>
    </div>

    <div class="rx-footer">
        <div class="rx-badge"><span>Rx</span></div>
        <span class="rx-label">Verified</span>
    </div>

    <div class="voice-hint">
        <div class="voice-dot"></div>
        Or just tell me how you feel
    </div>
</div>

<button class="replay" onclick="location.reload()">Replay</button>

<script>
const labels = ['None', 'Mild', 'Moderate', 'Significant', 'Severe'];
const colors = ['#33B6B0', '#33B6B0', '#D97706', '#D97706', '#DC2626'];

let value = 1; // 0-4 index
const track = document.getElementById('track');
const fill = document.getElementById('fill');
const thumb = document.getElementById('thumb');
const painLabel = document.getElementById('painLabel');
const painNumber = document.getElementById('painNumber');

function updateSlider(val) {
    value = Math.max(0, Math.min(4, val));
    const pct = (value / 4) * 100;
    fill.style.width = pct + '%';
    fill.style.background = colors[value];
    thumb.style.left = pct + '%';
    thumb.style.boxShadow = `0 2px 8px rgba(0,0,0,0.12), 0 0 0 2px ${colors[value]}`;
    painLabel.textContent = labels[value];
    painLabel.style.color = value >= 3 ? colors[value] : '#1B1B1A';
    painNumber.textContent = (value + 1) + ' of 5';
}

let dragging = false;
thumb.addEventListener('mousedown', () => dragging = true);
document.addEventListener('mouseup', () => dragging = false);
document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const rect = track.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    updateSlider(Math.round(pct * 4));
});
track.addEventListener('click', (e) => {
    const rect = track.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    updateSlider(Math.round(pct * 4));
});

// Touch support
thumb.addEventListener('touchstart', () => dragging = true);
document.addEventListener('touchend', () => dragging = false);
document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const rect = track.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.touches[0].clientX - rect.left) / rect.width));
    updateSlider(Math.round(pct * 4));
});

updateSlider(1);

function confirm() {
    document.querySelector('.confirm-btn').textContent = '✓ Recorded';
    document.querySelector('.confirm-btn').style.background = '#059669';
}
</script>

</body>
</html>
