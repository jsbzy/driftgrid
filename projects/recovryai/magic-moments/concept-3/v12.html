<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-In Flow — Cards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: #F5F7FA;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            display: flex; align-items: center; justify-content: center;
        }

        .flow {
            display: flex; flex-direction: column;
            gap: 12px;
            max-width: 380px; width: 100%;
            padding: 20px;
        }

        /* ── Active check-in card ── */
        .checkin-card {
            background: white;
            border: 1.5px solid rgba(0,0,0,0.05);
            border-radius: 16px;
            padding: 28px 28px 0;
            display: flex; flex-direction: column;
            align-items: center;
            gap: 16px;
            position: relative;
            transition: all 0.4s ease;
        }

        /* Rx footer with subtle line */
        .card-rx-footer {
            display: flex; align-items: center; gap: 4px;
            justify-content: center;
            padding: 14px 0;
            border-top: 1px solid rgba(0,0,0,0.04);
            margin: 8px -28px 0;
            padding-left: 28px; padding-right: 28px;
            width: calc(100% + 56px);
        }

        /* Hidden — not used anymore */
        .card-rx {
            display: none;
        }
        .rx-badge {
            width: 14px; height: 14px; border-radius: 2px;
            background: #ccc;
            display: flex; align-items: center; justify-content: center;
        }
        .rx-badge span { font-size: 6px; font-weight: 700; color: white; }
        .rx-text { font-size: 9px; color: #ccc; }

        .card-header {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .card-day {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px; font-weight: 500;
            letter-spacing: 0.06em; color: #33B6B0;
        }
        .card-question {
            font-size: 24px; font-weight: 300;
            color: #1B1B1A; text-align: center;
            line-height: 1.2; letter-spacing: -0.02em;
        }
        .card-question strong { font-weight: 600; }

        .card-label {
            font-size: 20px; font-weight: 200;
            color: #1B1B1A; text-align: center;
            min-height: 26px;
            transition: all 0.25s ease;
        }
        .card-label.prompt {
            font-size: 11px; font-weight: 400; color: #d0d0d0;
        }

        /* Endpoint labels */
        .dots-endpoints {
            display: flex; justify-content: space-between;
            width: 100%;
            padding: 0 0px;
            margin-top: -2px;
        }
        .dots-endpoints span {
            font-size: 9px; font-weight: 300; color: #ccc;
        }

        /* Dots row */
        .dots {
            display: flex; flex-direction: row;
            align-items: center; justify-content: center;
            gap: 20px;
            padding: 12px 0 4px;
            cursor: pointer;
            width: 100%;
        }

        .dot-point {
            display: flex; flex-direction: column;
            align-items: center;
            position: relative;
        }
        .dot-label {
            position: absolute; bottom: -22px;
            font-size: 10px; font-weight: 400; color: #aaa;
            white-space: nowrap;
            opacity: 0;
            transition: all 0.2s ease;
            pointer-events: none;
        }
        .dot-circle {
            width: 40px; height: 40px;
            border-radius: 20px;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
        }

        .dot-point[data-level="1"] .dot-circle { background: #33B6B0; }
        .dot-point[data-level="2"] .dot-circle { background: #7BADA6; }
        .dot-point[data-level="3"] .dot-circle { background: #B8A07A; }
        .dot-point[data-level="4"] .dot-circle { background: #C4805A; }
        .dot-point[data-level="5"] .dot-circle { background: #C45B4A; }

        .dot-point .dot-circle { opacity: 0.35; transform: scale(0.78); }

        @keyframes softPulse {
            0%, 100% { transform: scale(0.78); }
            50% { transform: scale(0.84); }
        }
        .dot-point[data-level="1"] .dot-circle { animation: softPulse 3s ease-in-out infinite; }
        .dot-point.touched .dot-circle { animation: none; }

        .dot-point:hover .dot-circle { opacity: 0.6; transform: scale(0.95); }
        .dot-point:hover .dot-label { opacity: 1; }
        .dot-point.lit .dot-circle { opacity: 0.5; transform: scale(0.85); animation: none; }
        .dot-point.active .dot-circle {
            opacity: 1; transform: scale(1.1);
            box-shadow: 0 0 16px rgba(0,0,0,0.05);
            animation: none;
        }
        .dot-point.active .dot-label { opacity: 1; font-weight: 600; color: #555; }
        .dot-point.active .dot-circle::after {
            content: ''; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 170%; height: 170%; border-radius: 50%;
            background: inherit; opacity: 0.1; filter: blur(8px); z-index: -1;
        }

        /* Voice — just the icon, very subtle */
        .voice-row {
            display: flex; align-items: center; justify-content: center;
            gap: 5px; cursor: pointer;
            padding: 4px 0;
        }
        .voice-row span { font-size: 10px; color: #d0d0d0; }

        /* ── Collapsed/answered state ── */
        .answered-card {
            background: white;
            border: 1.5px solid rgba(0,0,0,0.04);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex; flex-direction: row;
            align-items: center; justify-content: space-between;
            opacity: 0; transform: translateY(-8px);
        }
        .answered-card.show {
            animation: slideIn 0.35s ease-out forwards;
        }
        .answered-left {
            display: flex; align-items: center; gap: 10px;
        }
        .answered-dot {
            width: 12px; height: 12px; border-radius: 6px;
        }
        .answered-label {
            font-size: 14px; font-weight: 500; color: #1B1B1A;
        }
        .answered-dim {
            font-size: 14px; font-weight: 300; color: #999;
        }
        .answered-time {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px; color: #bbb;
        }

        /* ── Next card (appears after answering) ── */
        .next-card {
            opacity: 0; transform: translateY(12px);
        }
        .next-card.show {
            animation: slideIn 0.4s ease-out 0.2s forwards;
        }

        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }

        .replay {
            position: fixed; top: 20px; right: 20px;
            font-family: 'IBM Plex Mono', monospace; font-size: 11px;
            color: #999; background: none; border: 1px solid #ddd;
            padding: 6px 12px; border-radius: 6px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="flow">
    <!-- Pain card (active) -->
    <div class="checkin-card" id="painCard">
        <div class="card-header">
            <div class="card-day">DAY 8 · MORNING CHECK-IN</div>
            <div class="card-question">How's your <strong>pain</strong> today?</div>
        </div>

        <div class="card-label prompt" id="painLabel">Tap or slide</div>

        <div class="dots" id="painDots">
            <div class="dot-point" data-level="1"><div class="dot-circle"></div><span class="dot-label">None</span></div>
            <div class="dot-point" data-level="2"><div class="dot-circle"></div><span class="dot-label">Mild</span></div>
            <div class="dot-point" data-level="3"><div class="dot-circle"></div><span class="dot-label">Moderate</span></div>
            <div class="dot-point" data-level="4"><div class="dot-circle"></div><span class="dot-label">Significant</span></div>
            <div class="dot-point" data-level="5"><div class="dot-circle"></div><span class="dot-label">Severe</span></div>
        </div>
        <div class="dots-endpoints">
            <span>No pain</span>
            <span>High pain</span>
        </div>

        <div class="voice-row">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" style="opacity: 0.3;">
                <rect x="5" y="1" width="4" height="7" rx="2" stroke="#33B6B0" stroke-width="1.2" fill="none"/>
                <path d="M3 7.5C3 9.7 4.8 11.5 7 11.5C9.2 11.5 11 9.7 11 7.5" stroke="#33B6B0" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="7" y1="11.5" x2="7" y2="13" stroke="#33B6B0" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span>Or just tell me</span>
        </div>

        <div class="card-rx-footer">
            <div class="rx-badge"><span>Rx</span></div>
            <span class="rx-text" style="font-size: 9px; color: #ccc;">Verified</span>
        </div>
    </div>

    <!-- Pain answered (collapsed) — hidden initially -->
    <div class="answered-card" id="painAnswered">
        <div class="answered-left">
            <div class="answered-dot" id="painAnswerDot"></div>
            <span class="answered-label">Pain</span>
            <span class="answered-dim" id="painAnswerText">Moderate</span>
        </div>
        <span class="answered-time">8:04 AM</span>
    </div>

    <!-- Next question (sleep) — hidden initially -->
    <div class="checkin-card next-card" id="sleepCard">
        <div class="card-header">
            <div class="card-question">How did you <strong>sleep</strong> last night?</div>
        </div>

        <div class="card-label prompt">Tap or slide</div>

        <div class="dots">
            <div class="dot-point" data-level="1"><div class="dot-circle" style="background: #33B6B0;"></div><span class="dot-label">Great</span></div>
            <div class="dot-point" data-level="2"><div class="dot-circle" style="background: #7BADA6;"></div><span class="dot-label">Good</span></div>
            <div class="dot-point" data-level="3"><div class="dot-circle" style="background: #B8A07A;"></div><span class="dot-label">Okay</span></div>
            <div class="dot-point" data-level="4"><div class="dot-circle" style="background: #C4805A;"></div><span class="dot-label">Poor</span></div>
            <div class="dot-point" data-level="5"><div class="dot-circle" style="background: #C45B4A;"></div><span class="dot-label">Terrible</span></div>
        </div>
        <div class="dots-endpoints">
            <span>Well rested</span>
            <span>No sleep</span>
        </div>

        <div class="voice-row">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" style="opacity: 0.3;">
                <rect x="5" y="1" width="4" height="7" rx="2" stroke="#33B6B0" stroke-width="1.2" fill="none"/>
                <path d="M3 7.5C3 9.7 4.8 11.5 7 11.5C9.2 11.5 11 9.7 11 7.5" stroke="#33B6B0" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="7" y1="11.5" x2="7" y2="13" stroke="#33B6B0" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span>Or just tell me</span>
        </div>

        <div class="card-rx-footer">
            <div class="rx-badge"><span>Rx</span></div>
            <span class="rx-text" style="font-size: 9px; color: #ccc;">Verified</span>
        </div>
    </div>
</div>

<button class="replay" onclick="location.reload()">Replay</button>

<script>
const labels = ['None', 'Mild', 'Moderate', 'Significant', 'Severe'];
const colors = ['#33B6B0', '#7BADA6', '#B8A07A', '#C4805A', '#C45B4A'];
const dots = document.querySelectorAll('#painDots .dot-point');
const track = document.getElementById('painDots');
const label = document.getElementById('painLabel');
let selected = null;
let dragging = false;

function setActive(level) {
    selected = level;
    dots.forEach((d, i) => {
        d.classList.remove('active', 'lit', 'touched');
        d.classList.add('touched');
        if (i < level - 1) d.classList.add('lit');
        if (i === level - 1) d.classList.add('active');
    });
    label.textContent = labels[level - 1];
    label.classList.remove('prompt');
    label.style.color = colors[level - 1];
}

function getLevelFromX(x) {
    const rect = track.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
    return Math.min(5, Math.max(1, Math.round(pct * 4) + 1));
}

function recordPain() {
    if (!selected) return;
    // Collapse pain card
    const card = document.getElementById('painCard');
    card.style.opacity = '0';
    card.style.transform = 'translateY(-8px) scale(0.98)';
    card.style.height = card.offsetHeight + 'px';

    setTimeout(() => {
        card.style.display = 'none';
        // Show answered summary
        const ans = document.getElementById('painAnswered');
        ans.querySelector('#painAnswerDot').style.background = colors[selected - 1];
        ans.querySelector('#painAnswerText').textContent = labels[selected - 1];
        ans.classList.add('show');

        // Show next card (sleep)
        document.getElementById('sleepCard').classList.add('show');
    }, 350);
}

// Click
dots.forEach((d, i) => {
    d.addEventListener('click', (e) => {
        if (dragging) return;
        setActive(i + 1);
        setTimeout(recordPain, 500);
    });
});

// Drag
track.addEventListener('mousedown', (e) => { dragging = true; setActive(getLevelFromX(e.clientX)); });
document.addEventListener('mousemove', (e) => { if (dragging) setActive(getLevelFromX(e.clientX)); });
document.addEventListener('mouseup', () => { if (dragging && selected) { dragging = false; setTimeout(recordPain, 400); } dragging = false; });

// Touch
track.addEventListener('touchstart', (e) => { dragging = true; setActive(getLevelFromX(e.touches[0].clientX)); }, {passive: true});
document.addEventListener('touchmove', (e) => { if (dragging) setActive(getLevelFromX(e.touches[0].clientX)); }, {passive: true});
document.addEventListener('touchend', () => { if (dragging && selected) { dragging = false; setTimeout(recordPain, 400); } dragging = false; });
</script>

</body>
</html>
