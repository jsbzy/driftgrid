<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pain Check-In — v8 (Apple Refined)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: #F5F7FA;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        .screen {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px 32px;
            position: relative;
        }

        .content {
            display: flex; flex-direction: column;
            align-items: center; gap: 40px;
            max-width: 400px; width: 100%;
        }

        .greeting {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .greeting-day {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px; font-weight: 500;
            letter-spacing: 0.06em; color: #33B6B0;
        }
        .greeting-question {
            font-size: 34px; font-weight: 300;
            color: #1B1B1A; text-align: center;
            line-height: 1.2; letter-spacing: -0.02em;
        }
        .greeting-question strong { font-weight: 600; }

        /* Current selection — always visible, shows prompt when empty */
        .current-label {
            font-size: 32px; font-weight: 200;
            color: #1B1B1A; text-align: center;
            letter-spacing: -0.02em;
            min-height: 42px;
            transition: all 0.25s ease;
        }
        .current-label.prompt {
            font-size: 15px; font-weight: 400;
            color: #bbb; letter-spacing: 0;
        }

        /* Dots */
        .dots-track {
            display: flex; flex-direction: row;
            align-items: center; justify-content: center;
            gap: 20px;
            width: 100%;
            padding: 12px 0;
            cursor: pointer;
        }

        .dot-point {
            display: flex; flex-direction: column;
            align-items: center;
            position: relative;
        }

        .dot-label {
            position: absolute;
            bottom: -24px;
            font-size: 11px; font-weight: 400; color: #aaa;
            white-space: nowrap;
            opacity: 0;
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .dot-circle {
            width: 44px; height: 44px;
            border-radius: 22px;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        /* Teal baseline spectrum */
        .dot-point[data-level="1"] .dot-circle { background: #33B6B0; }
        .dot-point[data-level="2"] .dot-circle { background: #7BADA6; }
        .dot-point[data-level="3"] .dot-circle { background: #B8A07A; }
        .dot-point[data-level="4"] .dot-circle { background: #C4805A; }
        .dot-point[data-level="5"] .dot-circle { background: #C45B4A; }

        /* Resting state — visible but soft */
        .dot-point .dot-circle {
            opacity: 0.4;
            transform: scale(0.82);
        }

        /* Gentle idle pulse on the first dot to invite interaction */
        @keyframes softPulse {
            0%, 100% { transform: scale(0.82); }
            50% { transform: scale(0.88); }
        }
        .dot-point[data-level="1"] .dot-circle {
            animation: softPulse 3s ease-in-out infinite;
        }
        .dot-point.touched .dot-circle,
        .dot-point.active .dot-circle,
        .dot-point.lit .dot-circle { animation: none; }

        /* Hover */
        .dot-point:hover .dot-circle {
            opacity: 0.65;
            transform: scale(1);
        }
        .dot-point:hover .dot-label {
            opacity: 1;
        }

        /* Lit (below active) */
        .dot-point.lit .dot-circle {
            opacity: 0.55;
            transform: scale(0.9);
        }

        /* Active (selected) */
        .dot-point.active .dot-circle {
            opacity: 1;
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(0,0,0,0.06);
        }
        .dot-point.active .dot-label {
            opacity: 1;
            font-weight: 600;
            color: #555;
        }

        /* Glow behind active dot */
        .dot-point.active .dot-circle::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 180%; height: 180%;
            border-radius: 50%;
            background: inherit;
            opacity: 0.12;
            filter: blur(10px);
            z-index: -1;
        }

        /* Rx badge — closer to content */
        .rx-footer {
            display: flex; align-items: center; gap: 6px;
            margin-top: 8px;
        }
        .rx-badge {
            width: 14px; height: 14px; border-radius: 2px;
            background: #ccc;
            display: flex; align-items: center; justify-content: center;
        }
        .rx-badge span { font-size: 6px; font-weight: 700; color: white; }
        .rx-label { font-size: 10px; color: #bbb; }

        /* Confirmed state */
        .confirmed {
            display: none; flex-direction: column;
            align-items: center; gap: 20px;
        }
        .confirmed.show { display: flex; }
        .confirmed-dot {
            width: 44px; height: 44px; border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
        }
        .confirmed-text {
            font-size: 22px; font-weight: 300; color: #1B1B1A; text-align: center;
        }
        .confirmed-text strong { font-weight: 600; }
        .confirmed-sub {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px; color: #bbb; text-align: center; margin-top: 4px;
        }

        .voice-hint {
            position: absolute; bottom: 32px;
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: #bbb;
        }
        .voice-dot {
            width: 8px; height: 8px; border-radius: 4px;
            background: rgba(51,182,176,0.3);
        }

        .replay {
            position: fixed; top: 20px; right: 20px;
            font-family: 'IBM Plex Mono', monospace; font-size: 11px;
            color: #999; background: none; border: 1px solid #ddd;
            padding: 6px 12px; border-radius: 6px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="screen">
    <div class="content" id="questionView">
        <div class="greeting">
            <div class="greeting-day">DAY 8 · MORNING CHECK-IN</div>
            <div class="greeting-question">How's your<br><strong>pain</strong> today?</div>
        </div>

        <div class="current-label prompt" id="currentLabel">Tap or slide to select</div>

        <div class="dots-track" id="dotsTrack">
            <div class="dot-point" data-level="1"><div class="dot-circle"></div><span class="dot-label">None</span></div>
            <div class="dot-point" data-level="2"><div class="dot-circle"></div><span class="dot-label">Mild</span></div>
            <div class="dot-point" data-level="3"><div class="dot-circle"></div><span class="dot-label">Moderate</span></div>
            <div class="dot-point" data-level="4"><div class="dot-circle"></div><span class="dot-label">Significant</span></div>
            <div class="dot-point" data-level="5"><div class="dot-circle"></div><span class="dot-label">Severe</span></div>
        </div>

        <div class="rx-footer">
            <div class="rx-badge"><span>Rx</span></div>
            <span class="rx-label">Verified</span>
        </div>
    </div>

    <div class="confirmed" id="confirmView">
        <div class="confirmed-dot" id="confirmDot">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                <path d="M5 11.5L9 15.5L17 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div>
            <div class="confirmed-text">Pain: <strong id="painLevel">Moderate</strong></div>
            <div class="confirmed-sub">Recorded · 8:04 AM</div>
        </div>
        <div class="rx-footer">
            <div class="rx-badge"><span>Rx</span></div>
            <span class="rx-label">Verified</span>
        </div>
    </div>

    <div class="voice-hint">
        <div class="voice-dot"></div>
        Or just tell me how you feel
    </div>
</div>

<button class="replay" onclick="location.reload()">Replay</button>

<script>
const labels = ['None', 'Mild', 'Moderate', 'Significant', 'Severe'];
const colors = ['#33B6B0', '#7BADA6', '#B8A07A', '#C4805A', '#C45B4A'];
const dots = document.querySelectorAll('.dot-point');
const track = document.getElementById('dotsTrack');
const label = document.getElementById('currentLabel');
let selected = null;
let dragging = false;

function setActive(level) {
    selected = level;
    dots.forEach((d, i) => {
        d.classList.remove('active', 'lit', 'touched');
        d.classList.add('touched');
        if (i < level - 1) d.classList.add('lit');
        if (i === level - 1) d.classList.add('active');
    });
    label.textContent = labels[level - 1];
    label.classList.remove('prompt');
    label.style.color = colors[level - 1];
}

function getLevelFromX(x) {
    const rect = track.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
    return Math.min(5, Math.max(1, Math.round(pct * 4) + 1));
}

// Click — one tap records immediately
dots.forEach((d, i) => {
    d.addEventListener('click', (e) => {
        if (dragging) return;
        setActive(i + 1);
        // Record after a brief moment
        setTimeout(() => {
            document.getElementById('painLevel').textContent = labels[selected - 1];
            document.getElementById('confirmDot').style.background = colors[selected - 1];
            document.getElementById('questionView').style.display = 'none';
            document.querySelector('.voice-hint').style.display = 'none';
            document.getElementById('confirmView').classList.add('show');
        }, 500);
    });
});

// Drag — slide across to explore, release to select
track.addEventListener('mousedown', (e) => {
    dragging = true;
    setActive(getLevelFromX(e.clientX));
});
document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    setActive(getLevelFromX(e.clientX));
});
document.addEventListener('mouseup', () => {
    if (dragging && selected) {
        dragging = false;
        setTimeout(() => {
            document.getElementById('painLevel').textContent = labels[selected - 1];
            document.getElementById('confirmDot').style.background = colors[selected - 1];
            document.getElementById('questionView').style.display = 'none';
            document.querySelector('.voice-hint').style.display = 'none';
            document.getElementById('confirmView').classList.add('show');
        }, 400);
    }
    dragging = false;
});

// Touch
track.addEventListener('touchstart', (e) => {
    dragging = true;
    setActive(getLevelFromX(e.touches[0].clientX));
}, {passive: true});
document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    setActive(getLevelFromX(e.touches[0].clientX));
}, {passive: true});
document.addEventListener('touchend', () => {
    if (dragging && selected) {
        dragging = false;
        setTimeout(() => {
            document.getElementById('painLevel').textContent = labels[selected - 1];
            document.getElementById('confirmDot').style.background = colors[selected - 1];
            document.getElementById('questionView').style.display = 'none';
            document.querySelector('.voice-hint').style.display = 'none';
            document.getElementById('confirmView').classList.add('show');
        }, 400);
    }
    dragging = false;
});
</script>

</body>
</html>
