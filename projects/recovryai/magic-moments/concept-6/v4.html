<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM#4 — Sensor Sync (Concept)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            max-width: 375px;
            margin: 0 auto;
            font-family: 'Inter', -apple-system, sans-serif;
            background: #F5F7FA;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 32px;
            animation: page-in 1s ease-out both;
        }

        /* Convergence visual */
        .convergence {
            position: relative;
            width: 300px;
            height: 260px;
            margin-bottom: 48px;
        }

        /* Arc SVG */
        .arc-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .arc-path {
            fill: none;
            stroke: #3EB5A6;
            stroke-width: 1.5;
            opacity: 0.12;
        }

        /* Center node */
        .center-node {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #3EB5A6;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(62,181,166,0.12), 0 0 80px rgba(62,181,166,0.06);
            animation: center-breathe 4s ease-in-out infinite;
            z-index: 3;
        }
        .center-node svg { width: 28px; height: 28px; }
        .center-label {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 500;
            color: #3EB5A6;
            letter-spacing: 0.04em;
            white-space: nowrap;
            z-index: 3;
        }

        /* Device nodes */
        .device-origin {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            z-index: 3;
        }
        .device-origin.left {
            top: 10px;
            left: 16px;
        }
        .device-origin.right {
            top: 10px;
            right: 16px;
        }
        .device-origin-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #FFFFFF;
            border: 1.5px solid rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .device-origin-circle svg { width: 20px; height: 20px; }
        .device-origin-label {
            font-size: 10px;
            font-weight: 500;
            color: #999;
        }

        /* Data particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #3EB5A6;
            z-index: 2;
            opacity: 0;
        }

        /* Left arc particles */
        .particle.l1 { animation: travel-left 3s linear infinite 0s; }
        .particle.l2 { animation: travel-left 3s linear infinite 1s; }
        .particle.l3 { animation: travel-left 3s linear infinite 2s; }

        /* Right arc particles */
        .particle.r1 { animation: travel-right 3s linear infinite 0.5s; }
        .particle.r2 { animation: travel-right 3s linear infinite 1.5s; }
        .particle.r3 { animation: travel-right 3s linear infinite 2.5s; }

        /* Floating data labels */
        .data-label {
            position: absolute;
            font-size: 10px;
            font-weight: 300;
            color: #bbb;
            z-index: 1;
        }
        .data-label.l1 { top: 72px; left: 0; }
        .data-label.l2 { top: 112px; left: 10px; }
        .data-label.l3 { top: 152px; left: 30px; }
        .data-label.r1 { top: 72px; right: 0; }
        .data-label.r2 { top: 112px; right: 10px; }
        .data-label.r3 { top: 152px; right: 30px; }

        /* Text block */
        .statement {
            text-align: center;
            animation: text-in 0.8s ease-out 0.3s both;
        }
        .statement-main {
            font-size: 24px;
            font-weight: 300;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            line-height: 1.2;
        }
        .statement-sub {
            font-size: 13px;
            font-weight: 300;
            color: #888;
            line-height: 1.6;
            max-width: 280px;
            margin: 0 auto;
        }

        /* Brand mark */
        .brand-mark {
            margin-top: auto;
            padding-top: 48px;
            font-size: 11px;
            font-weight: 400;
            color: #bbb;
            letter-spacing: 0.02em;
        }
        .brand-mark .dot { color: #3EB5A6; }

        /* Animations */
        @keyframes page-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes text-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes center-breathe {
            0%, 100% { box-shadow: 0 0 40px rgba(62,181,166,0.10), 0 0 80px rgba(62,181,166,0.04); }
            50% { box-shadow: 0 0 50px rgba(62,181,166,0.16), 0 0 100px rgba(62,181,166,0.08); }
        }

        /* Left arc: from (38, 54) curving to (150, 220) */
        @keyframes travel-left {
            0%   { left: 38px;  top: 54px;  opacity: 0; }
            10%  { left: 38px;  top: 54px;  opacity: 0.7; }
            25%  { left: 50px;  top: 95px;  opacity: 0.7; }
            50%  { left: 75px;  top: 140px; opacity: 0.6; }
            75%  { left: 110px; top: 185px; opacity: 0.4; }
            90%  { left: 140px; top: 210px; opacity: 0.2; }
            100% { left: 148px; top: 220px; opacity: 0; }
        }

        /* Right arc: from (258, 54) curving to (150, 220) */
        @keyframes travel-right {
            0%   { left: 258px; top: 54px;  opacity: 0; }
            10%  { left: 258px; top: 54px;  opacity: 0.7; }
            25%  { left: 246px; top: 95px;  opacity: 0.7; }
            50%  { left: 221px; top: 140px; opacity: 0.6; }
            75%  { left: 186px; top: 185px; opacity: 0.4; }
            90%  { left: 156px; top: 210px; opacity: 0.2; }
            100% { left: 148px; top: 220px; opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- Convergence visual -->
    <div class="convergence">
        <!-- Arc paths -->
        <svg class="arc-svg" viewBox="0 0 300 260" fill="none">
            <!-- Left arc: Watch → Center -->
            <path class="arc-path" d="M 38 54 Q 30 160, 150 228" />
            <!-- Right arc: Sensor → Center -->
            <path class="arc-path" d="M 258 54 Q 266 160, 150 228" />
        </svg>

        <!-- Device: Apple Watch -->
        <div class="device-origin left">
            <div class="device-origin-circle">
                <svg viewBox="0 0 32 32" fill="none">
                    <rect x="7" y="3" width="18" height="26" rx="5" stroke="#1a1a1a" stroke-width="1.8"/>
                    <rect x="10" y="8" width="12" height="16" rx="2.5" fill="#1a1a1a"/>
                    <circle cx="16" cy="16" r="4" fill="white"/>
                    <path d="M16 14v2.5l1.5 1.5" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="device-origin-label">Apple Watch</div>
        </div>

        <!-- Device: Knee Sensor -->
        <div class="device-origin right">
            <div class="device-origin-circle">
                <svg viewBox="0 0 32 32" fill="none">
                    <circle cx="16" cy="16" r="10" stroke="#3EB5A6" stroke-width="1.8"/>
                    <circle cx="16" cy="16" r="5" fill="#3EB5A6" opacity="0.15"/>
                    <circle cx="16" cy="16" r="2.5" fill="#3EB5A6"/>
                    <path d="M16 6V3M16 29V26M6 16H3M29 16H26" stroke="#3EB5A6" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="device-origin-label">Knee Sensor</div>
        </div>

        <!-- Center: RecovryAI -->
        <div class="center-node">
            <svg viewBox="0 0 1000 1000" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M666.16 319.463C666.16 327.133 672.345 333.35 679.975 333.35H831.937V666.65H679.975C672.345 666.65 666.16 672.868 666.16 680.538V833.3H334.605V680.538C334.605 672.868 328.42 666.65 320.79 666.65H168.827V333.35H320.79C328.42 333.35 334.605 327.133 334.605 319.463V166.7H666.16V319.463ZM500.382 250.025C500.382 388.083 389.051 500 251.716 500C389.051 500 500.382 611.918 500.382 749.975C500.382 611.918 611.714 500 749.048 500C611.714 500 500.382 388.083 500.382 250.025Z" fill="white"/></svg>
        </div>
        <div class="center-label">RecovryAI</div>

        <!-- Data particles — left arc -->
        <div class="particle l1"></div>
        <div class="particle l2"></div>
        <div class="particle l3"></div>

        <!-- Data particles — right arc -->
        <div class="particle r1"></div>
        <div class="particle r2"></div>
        <div class="particle r3"></div>

        <!-- Floating data labels -->
        <span class="data-label l1">heart rate</span>
        <span class="data-label l2">steps</span>
        <span class="data-label l3">sleep</span>
        <span class="data-label r1">range of motion</span>
        <span class="data-label r2">temperature</span>
        <span class="data-label r3">gait</span>
    </div>

    <!-- Statement -->
    <div class="statement">
        <div class="statement-main" data-drift-editable="headline" data-drift-maxlen="50">Every signal. One intelligence.</div>
        <div class="statement-sub" data-drift-editable="subheadline" data-drift-maxlen="120">Apple Watch and Knee Recovery Sensor feed continuous data to your Virtual Care Assistant.</div>
    </div>

    <!-- Brand mark -->
    <div class="brand-mark">recovry<span class="dot">.</span>ai</div>
</body>
</html>
