<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM#4 — Sensor Sync (Concept: Sensor-First)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            max-width: 375px;
            margin: 0 auto;
            font-family: 'Inter', -apple-system, sans-serif;
            background: #F5F7FA;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            animation: page-in 0.8s ease-out both;
        }

        /* Radial container */
        .radial {
            position: relative;
            width: 310px;
            height: 310px;
            margin-bottom: 40px;
        }

        /* Center node */
        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: #3EB5A6;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(62,181,166,0.15), 0 0 80px rgba(62,181,166,0.06);
            animation: center-breathe 4s ease-in-out infinite;
            z-index: 3;
        }
        .center svg { width: 28px; height: 28px; }

        /* Connection lines SVG */
        .connections-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .conn-line {
            stroke: #3EB5A6;
            stroke-width: 1.5;
            opacity: 0.12;
            fill: none;
        }

        /* Device nodes positioned in a ring */
        .device {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            z-index: 2;
        }
        .device-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #FFFFFF;
            border: 1.5px solid rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .device-circle svg { width: 22px; height: 22px; }
        .device-name {
            font-size: 10px;
            font-weight: 500;
            color: #888;
            white-space: nowrap;
        }
        .device-check {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #059669;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #F5F7FA;
            animation: badge-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .device-check svg { width: 9px; height: 9px; }

        /* Ring positions — 5 devices evenly spaced */
        /* Ring radius ~120px from center (155, 155) */
        .device.d1 { top: 0; left: 50%; transform: translateX(-50%); }             /* 12 o'clock — Watch */
        .device.d2 { top: 38px; right: 4px; }                                       /* 1:30 — Ring */
        .device.d3 { bottom: 38px; right: 4px; }                                    /* 4:30 — BP Cuff */
        .device.d4 { bottom: 38px; left: 4px; }                                     /* 7:30 — Scale */
        .device.d5 { top: 38px; left: 4px; }                                        /* 10:30 — Knee */

        /* Stagger check badge animations */
        .device.d1 .device-check { animation-delay: 0.4s; }
        .device.d2 .device-check { animation-delay: 0.6s; }
        .device.d3 .device-check { animation-delay: 0.8s; }
        .device.d4 .device-check { animation-delay: 1.0s; }
        .device.d5 .device-check { animation-delay: 1.2s; }

        /* Data particles */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #3EB5A6;
            z-index: 2;
            opacity: 0;
        }
        /* Each device has 2 particles traveling to center (155, 155) */
        .particle.d1a { animation: p-d1 2.5s linear infinite 0s; }
        .particle.d1b { animation: p-d1 2.5s linear infinite 1.25s; }
        .particle.d2a { animation: p-d2 2.5s linear infinite 0.3s; }
        .particle.d2b { animation: p-d2 2.5s linear infinite 1.55s; }
        .particle.d3a { animation: p-d3 2.5s linear infinite 0.6s; }
        .particle.d3b { animation: p-d3 2.5s linear infinite 1.85s; }
        .particle.d4a { animation: p-d4 2.5s linear infinite 0.9s; }
        .particle.d4b { animation: p-d4 2.5s linear infinite 2.15s; }
        .particle.d5a { animation: p-d5 2.5s linear infinite 1.2s; }
        .particle.d5b { animation: p-d5 2.5s linear infinite 2.45s; }

        /* Particle paths: device → center */
        @keyframes p-d1 { /* top center (155, 30) → (155, 155) */
            0%   { left: 153px; top: 52px;  opacity: 0; }
            10%  { opacity: 0.6; }
            85%  { opacity: 0.3; }
            100% { left: 153px; top: 150px; opacity: 0; }
        }
        @keyframes p-d2 { /* top right (268, 64) → (155, 155) */
            0%   { left: 262px; top: 74px;  opacity: 0; }
            10%  { opacity: 0.6; }
            85%  { opacity: 0.3; }
            100% { left: 153px; top: 150px; opacity: 0; }
        }
        @keyframes p-d3 { /* bottom right (268, 228) → (155, 155) */
            0%   { left: 262px; top: 228px; opacity: 0; }
            10%  { opacity: 0.6; }
            85%  { opacity: 0.3; }
            100% { left: 153px; top: 150px; opacity: 0; }
        }
        @keyframes p-d4 { /* bottom left (30, 228) → (155, 155) */
            0%   { left: 40px;  top: 228px; opacity: 0; }
            10%  { opacity: 0.6; }
            85%  { opacity: 0.3; }
            100% { left: 153px; top: 150px; opacity: 0; }
        }
        @keyframes p-d5 { /* top left (30, 64) → (155, 155) */
            0%   { left: 40px;  top: 74px;  opacity: 0; }
            10%  { opacity: 0.6; }
            85%  { opacity: 0.3; }
            100% { left: 153px; top: 150px; opacity: 0; }
        }

        /* Text */
        .statement {
            text-align: center;
            animation: text-in 0.8s ease-out 0.3s both;
        }
        .statement-main {
            font-size: 22px;
            font-weight: 300;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            line-height: 1.25;
        }
        .statement-sub {
            font-size: 13px;
            font-weight: 300;
            color: #888;
            line-height: 1.6;
            max-width: 280px;
            margin: 0 auto;
        }

        /* Brand mark */
        .brand-mark {
            margin-top: auto;
            padding-top: 40px;
            font-size: 11px;
            font-weight: 400;
            color: #bbb;
            letter-spacing: 0.02em;
        }
        .brand-mark .dot { color: #3EB5A6; }

        /* Animations */
        @keyframes page-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes text-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes center-breathe {
            0%, 100% { box-shadow: 0 0 40px rgba(62,181,166,0.10), 0 0 80px rgba(62,181,166,0.04); }
            50% { box-shadow: 0 0 50px rgba(62,181,166,0.18), 0 0 100px rgba(62,181,166,0.08); }
        }
        @keyframes badge-in {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="radial">
        <!-- Connection lines -->
        <svg class="connections-svg" viewBox="0 0 310 310" fill="none">
            <line class="conn-line" x1="155" y1="52" x2="155" y2="122" />
            <line class="conn-line" x1="262" y1="74" x2="185" y2="132" />
            <line class="conn-line" x1="262" y1="238" x2="185" y2="180" />
            <line class="conn-line" x1="48" y1="238" x2="125" y2="180" />
            <line class="conn-line" x1="48" y1="74" x2="125" y2="132" />
        </svg>

        <!-- Center: RecovryAI -->
        <div class="center">
            <svg viewBox="0 0 1000 1000" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M666.16 319.463C666.16 327.133 672.345 333.35 679.975 333.35H831.937V666.65H679.975C672.345 666.65 666.16 672.868 666.16 680.538V833.3H334.605V680.538C334.605 672.868 328.42 666.65 320.79 666.65H168.827V333.35H320.79C328.42 333.35 334.605 327.133 334.605 319.463V166.7H666.16V319.463ZM500.382 250.025C500.382 388.083 389.051 500 251.716 500C389.051 500 500.382 611.918 500.382 749.975C500.382 611.918 611.714 500 749.048 500C611.714 500 500.382 388.083 500.382 250.025Z" fill="white"/></svg>
        </div>

        <!-- D1: Smart Watch (12 o'clock) -->
        <div class="device d1">
            <div class="device-circle">
                <svg viewBox="0 0 32 32" fill="none">
                    <rect x="7" y="3" width="18" height="26" rx="5" stroke="#1a1a1a" stroke-width="1.8"/>
                    <rect x="10" y="8" width="12" height="16" rx="2.5" fill="#1a1a1a"/>
                    <circle cx="16" cy="16" r="4" fill="white"/>
                    <path d="M16 14v2.5l1.5 1.5" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
                </svg>
                <div class="device-check"><svg viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            </div>
            <div class="device-name">Smart Watch</div>
        </div>

        <!-- D2: Smart Ring (1:30) -->
        <div class="device d2">
            <div class="device-circle">
                <svg viewBox="0 0 32 32" fill="none">
                    <ellipse cx="16" cy="16" rx="10" ry="7" stroke="#1a1a1a" stroke-width="1.8"/>
                    <ellipse cx="16" cy="16" rx="6" ry="3.5" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
                    <circle cx="16" cy="9" r="2" fill="#3EB5A6"/>
                </svg>
                <div class="device-check"><svg viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            </div>
            <div class="device-name">Smart Ring</div>
        </div>

        <!-- D3: BP Cuff (4:30) -->
        <div class="device d3">
            <div class="device-circle">
                <svg viewBox="0 0 32 32" fill="none">
                    <rect x="6" y="10" width="20" height="12" rx="3" stroke="#1a1a1a" stroke-width="1.8"/>
                    <path d="M16 13v6M13 16h6" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M11 10V7a5 5 0 0 1 10 0v3" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                </svg>
                <div class="device-check"><svg viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            </div>
            <div class="device-name">BP Monitor</div>
        </div>

        <!-- D4: Smart Scale (7:30) -->
        <div class="device d4">
            <div class="device-circle">
                <svg viewBox="0 0 32 32" fill="none">
                    <rect x="5" y="18" width="22" height="8" rx="2" stroke="#1a1a1a" stroke-width="1.8"/>
                    <rect x="10" y="21" width="12" height="2" rx="1" fill="#1a1a1a" opacity="0.2"/>
                    <circle cx="16" cy="12" r="6" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
                    <path d="M16 8v4l2.5 1.5" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
                </svg>
                <div class="device-check"><svg viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            </div>
            <div class="device-name">Smart Scale</div>
        </div>

        <!-- D5: Knee Sensor (10:30) -->
        <div class="device d5">
            <div class="device-circle">
                <svg viewBox="0 0 32 32" fill="none">
                    <circle cx="16" cy="16" r="10" stroke="#3EB5A6" stroke-width="1.8"/>
                    <circle cx="16" cy="16" r="5" fill="#3EB5A6" opacity="0.15"/>
                    <circle cx="16" cy="16" r="2.5" fill="#3EB5A6"/>
                    <path d="M16 6V3M16 29V26M6 16H3M29 16H26" stroke="#3EB5A6" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <div class="device-check"><svg viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            </div>
            <div class="device-name">Knee Sensor</div>
        </div>

        <!-- Data particles -->
        <div class="particle d1a"></div><div class="particle d1b"></div>
        <div class="particle d2a"></div><div class="particle d2b"></div>
        <div class="particle d3a"></div><div class="particle d3b"></div>
        <div class="particle d4a"></div><div class="particle d4b"></div>
        <div class="particle d5a"></div><div class="particle d5b"></div>
    </div>

    <!-- Statement -->
    <div class="statement">
        <div class="statement-main" data-drift-editable="headline" data-drift-maxlen="50">Five devices. One safety net.</div>
        <div class="statement-sub" data-drift-editable="subheadline" data-drift-maxlen="140">Every wearable and sensor connects to RecovryAI, forming a continuous monitoring system around your recovery.</div>
    </div>

    <!-- Brand mark -->
    <div class="brand-mark">recovry<span class="dot">.</span>ai</div>
</body>
</html>
