<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Status — Proportional Timeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: #F5F7FA;
            -webkit-font-smoothing: antialiased;
            display: flex; align-items: flex-start; justify-content: center;
            padding-top: 60px;
            user-select: none;
        }

        .container { max-width: 380px; width: 100%; padding: 20px; }

        .card {
            background: white; border: 1.5px solid rgba(0,0,0,0.05);
            border-radius: 16px; overflow: hidden;
        }
        .card-body {
            padding: 32px 28px 24px;
            display: flex; flex-direction: column; align-items: center;
        }

        .card-meta {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; font-weight: 500; letter-spacing: 0.06em;
            color: #33B6B0; margin-bottom: 28px;
        }

        /* ── Orb ── */
        .orb-wrap { position: relative; width: 88px; height: 88px; margin-bottom: 24px; }
        .orb {
            width: 72px; height: 72px; border-radius: 50%;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            animation: breathe 3.5s ease-in-out infinite;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }
        .orb::after {
            content: ''; position: absolute; inset: -12px; border-radius: 50%;
            background: inherit; opacity: 0.08; filter: blur(16px); z-index: -1;
        }
        @keyframes breathe {
            0%,100% { transform: translate(-50%,-50%) scale(1); }
            50% { transform: translate(-50%,-50%) scale(1.06); }
        }

        .status-label {
            font-size: 24px; font-weight: 300; color: #1B1B1A;
            margin-bottom: 6px; transition: all 0.4s ease;
        }
        .status-sub {
            font-size: 13px; font-weight: 300; color: #999;
            text-align: center; line-height: 1.55; max-width: 260px;
            margin-bottom: 28px; transition: all 0.4s ease;
            min-height: 40px;
        }

        /* ── Timeline bar — full 90 days ── */
        .timeline-area { width: 100%; margin-bottom: 8px; position: relative; }
        .timeline-labels {
            display: flex; justify-content: space-between; margin-bottom: 6px;
        }
        .tl-lbl {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; font-weight: 400; color: #ccc; letter-spacing: 0.03em;
        }
        .timeline-track {
            position: relative; width: 100%; height: 20px;
            cursor: pointer; display: flex; align-items: center;
        }
        .tl-rail {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 100%; height: 2px; background: rgba(0,0,0,0.04); border-radius: 1px;
        }
        .tl-fill {
            position: absolute; top: 50%; transform: translateY(-50%);
            height: 2px; border-radius: 1px;
            transition: width 0.3s ease, background 0.4s ease;
        }
        /* Graduation marker at Day 90 */
        .tl-end {
            position: absolute; right: 0; top: 50%; transform: translateY(-50%);
            width: 4px; height: 4px; border-radius: 50%;
            background: rgba(0,0,0,0.06);
        }
        /* Today marker — sits at proportional position */
        .tl-today {
            position: absolute; top: 50%; transform: translate(-50%,-50%);
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(0,0,0,0.1);
            transition: left 0.3s ease;
            z-index: 1;
        }
        /* Active dot — the draggable scrubber */
        .tl-dot {
            position: absolute; top: 50%; transform: translate(-50%,-50%);
            width: 10px; height: 10px; border-radius: 50%;
            transition: left 0.3s ease, background 0.4s ease;
            cursor: grab; z-index: 3;
        }
        .tl-dot:active { cursor: grabbing; transform: translate(-50%,-50%) scale(1.3); }

        /* Floating day label above the dot */
        .tl-day-label {
            position: absolute; top: -18px;
            transform: translateX(-50%);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px; font-weight: 500; letter-spacing: 0.04em;
            white-space: nowrap;
            transition: left 0.3s ease, color 0.3s ease;
            z-index: 4;
        }

        /* Return to today */
        .return-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; color: #33B6B0; cursor: pointer;
            padding: 4px 0; margin-bottom: 20px;
            opacity: 0; transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .return-btn.show { opacity: 1; pointer-events: auto; }
        .return-btn:hover { color: #2a9a8d; }

        /* ── Dimensions ── */
        .dims {
            display: flex; width: 100%; justify-content: space-between;
            padding: 0 4px;
        }
        .dim-wrap {
            display: flex; flex-direction: column; align-items: center;
            gap: 6px; flex: 1;
        }
        .dim-dot {
            width: 12px; height: 12px; border-radius: 50%;
            transition: background 0.4s ease, transform 0.2s ease;
        }
        .dim-wrap:hover .dim-dot { transform: scale(1.25); }
        .dim-name { font-size: 9px; font-weight: 400; color: #bbb; }

        /* ── Footer ── */
        .card-footer {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            padding: 14px 28px; border-top: 1px solid rgba(0,0,0,0.04);
        }
        .rx-box {
            width: 14px; height: 14px; border-radius: 2px; background: #ccc;
            display: flex; align-items: center; justify-content: center;
        }
        .rx-box span { font-size: 6px; font-weight: 700; color: white; }
        .ft { font-size: 10px; color: #bbb; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-body">
            <div class="card-meta" id="meta">DAY 8 OF 90 · RECOVERY STATUS</div>
            <div class="orb-wrap"><div class="orb" id="orb"></div></div>
            <div class="status-label" id="label"></div>
            <div class="status-sub" id="sub"></div>

            <div class="timeline-area">
                <div class="timeline-labels">
                    <span class="tl-lbl">Day 1</span>
                    <span class="tl-lbl">Day 90</span>
                </div>
                <div class="timeline-track" id="track">
                    <div class="tl-rail"></div>
                    <div class="tl-fill" id="fill"></div>
                    <div class="tl-end"></div>
                    <div class="tl-today" id="todayMark"></div>
                    <div class="tl-dot" id="sdot"></div>
                    <div class="tl-day-label" id="dayLabel"></div>
                </div>
            </div>

            <div class="return-btn" id="returnBtn" onclick="goTo(TODAY)">← Return to today</div>

            <div class="dims" id="dims"></div>
        </div>
        <div class="card-footer">
            <div class="rx-box"><span>Rx</span></div><span class="ft">Verified</span>
        </div>
    </div>
</div>

<script>
const SC = {
    excellent: '#33B6B0',
    ontrack:   '#7BADA6',
    watch:     '#B8A07A',
    attention: '#D97706',
    urgent:    '#DC2626'
};

const TODAY = 8;

const data = [
    { day:1, st:'ontrack', label:'On track', sub:'Surgery complete. Recovery is beginning as expected.',
      dims:[{c:'#C4805A',n:'Pain'},{c:'#B8A07A',n:'Sleep'},{c:'#C4805A',n:'Mobility'},{c:'#33B6B0',n:'Meds'},{c:'#B8A07A',n:'Nutrition'}] },
    { day:2, st:'ontrack', label:'On track', sub:'Expected discomfort. Rest and recover.',
      dims:[{c:'#C4805A',n:'Pain'},{c:'#C4805A',n:'Sleep'},{c:'#C45B4A',n:'Mobility'},{c:'#33B6B0',n:'Meds'},{c:'#B8A07A',n:'Nutrition'}] },
    { day:3, st:'ontrack', label:'On track', sub:'Improving. Pain starting to ease.',
      dims:[{c:'#B8A07A',n:'Pain'},{c:'#B8A07A',n:'Sleep'},{c:'#C4805A',n:'Mobility'},{c:'#33B6B0',n:'Meds'},{c:'#7BADA6',n:'Nutrition'}] },
    { day:4, st:'excellent', label:'Excellent', sub:'Recovery is going great. Keep it up.',
      dims:[{c:'#7BADA6',n:'Pain'},{c:'#33B6B0',n:'Sleep'},{c:'#7BADA6',n:'Mobility'},{c:'#33B6B0',n:'Meds'},{c:'#33B6B0',n:'Nutrition'}] },
    { day:5, st:'ontrack', label:'On track', sub:'Slight pain increase is normal around Day 5.',
      dims:[{c:'#B8A07A',n:'Pain'},{c:'#33B6B0',n:'Sleep'},{c:'#7BADA6',n:'Mobility'},{c:'#33B6B0',n:'Meds'},{c:'#33B6B0',n:'Nutrition'}] },
    { day:6, st:'attention', label:'Needs attention', sub:'We\u2019ve noticed some changes. Your care team has been notified.',
      dims:[{c:'#C4805A',n:'Pain'},{c:'#C4805A',n:'Sleep'},{c:'#B8A07A',n:'Mobility'},{c:'#33B6B0',n:'Meds'},{c:'#C4805A',n:'Nutrition'}] },
    { day:7, st:'watch', label:'Watch', sub:'Improving after care team adjustment. Keep monitoring.',
      dims:[{c:'#B8A07A',n:'Pain'},{c:'#B8A07A',n:'Sleep'},{c:'#33B6B0',n:'Mobility'},{c:'#33B6B0',n:'Meds'},{c:'#7BADA6',n:'Nutrition'}] },
    { day:8, st:'ontrack', label:'On track', sub:'Your recovery is progressing as expected.',
      dims:[{c:'#7BADA6',n:'Pain'},{c:'#33B6B0',n:'Sleep'},{c:'#33B6B0',n:'Mobility'},{c:'#33B6B0',n:'Meds'},{c:'#7BADA6',n:'Nutrition'}] }
];

let currentDay = -1;
let dragging = false;

const track = document.getElementById('track');
const fill = document.getElementById('fill');
const sdot = document.getElementById('sdot');
const todayMark = document.getElementById('todayMark');
const dayLabel = document.getElementById('dayLabel');

// Today marker stays fixed at its proportional position
const todayPct = (TODAY / 90) * 100;
todayMark.style.left = todayPct + '%';

function dayToPct(d) { return (d / 90) * 100; }

function pctToDay(p) {
    const raw = Math.round((p / 100) * 90);
    return Math.max(1, Math.min(TODAY, raw));
}

function setDay(d) {
    if (d === currentDay) return;
    currentDay = d;
    const s = data[d - 1];
    const color = SC[s.st];
    const pct = dayToPct(d);

    document.getElementById('meta').textContent = 'DAY ' + d + ' OF 90 \u00B7 RECOVERY STATUS';

    const orb = document.getElementById('orb');
    orb.style.background = color;
    orb.style.boxShadow = '0 0 40px ' + color + '30, 0 0 80px ' + color + '15';

    document.getElementById('label').textContent = s.label;
    document.getElementById('sub').textContent = s.sub;

    fill.style.width = pct + '%';
    fill.style.background = color;
    sdot.style.left = pct + '%';
    sdot.style.background = color;

    // Day label
    dayLabel.style.left = pct + '%';
    dayLabel.textContent = d === TODAY ? 'TODAY' : 'DAY ' + d;
    dayLabel.style.color = d === TODAY ? color : '#999';

    // Show/hide today ghost marker when viewing past
    todayMark.style.opacity = d < TODAY ? '1' : '0';

    document.getElementById('returnBtn').classList.toggle('show', d < TODAY);

    renderDims(s.dims);
}

function renderDims(dims) {
    let h = '';
    dims.forEach(d => {
        h += '<div class="dim-wrap">';
        h += '<div class="dim-dot" style="background:' + d.c + '"></div>';
        h += '<span class="dim-name">' + d.n + '</span>';
        h += '</div>';
    });
    document.getElementById('dims').innerHTML = h;
}

function goTo(d) { setDay(d); }

// Slider interaction
function getDay(e) {
    const rect = track.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const pct = Math.max(0, Math.min(100, (x / rect.width) * 100));
    return pctToDay(pct);
}

track.addEventListener('mousedown', e => { dragging = true; setDay(getDay(e)); });
document.addEventListener('mousemove', e => { if (dragging) setDay(getDay(e)); });
document.addEventListener('mouseup', () => { dragging = false; });
track.addEventListener('touchstart', e => { dragging = true; setDay(getDay(e)); }, { passive: true });
document.addEventListener('touchmove', e => { if (dragging) setDay(getDay(e)); }, { passive: true });
document.addEventListener('touchend', () => { dragging = false; });

setDay(TODAY);
</script>

</body>
</html>
