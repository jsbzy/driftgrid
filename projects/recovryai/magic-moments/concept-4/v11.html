<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Status — Day 55</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: #F5F7FA;
            -webkit-font-smoothing: antialiased;
            display: flex; align-items: flex-start; justify-content: center;
            padding-top: 60px;
            user-select: none;
        }

        .container { max-width: 380px; width: 100%; padding: 20px; }

        .card {
            background: white; border: 1.5px solid rgba(0,0,0,0.05);
            border-radius: 16px; overflow: hidden;
        }
        .card-body {
            padding: 32px 28px 24px;
            display: flex; flex-direction: column; align-items: center;
        }
        .card-meta {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; font-weight: 500; letter-spacing: 0.06em;
            color: #33B6B0; margin-bottom: 28px;
        }

        .orb-wrap { position: relative; width: 88px; height: 88px; margin-bottom: 24px; }
        .orb {
            width: 72px; height: 72px; border-radius: 50%;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            animation: breathe 3.5s ease-in-out infinite;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }
        .orb::after {
            content: ''; position: absolute; inset: -12px; border-radius: 50%;
            background: inherit; opacity: 0.08; filter: blur(16px); z-index: -1;
        }
        @keyframes breathe {
            0%,100% { transform: translate(-50%,-50%) scale(1); }
            50% { transform: translate(-50%,-50%) scale(1.06); }
        }

        .status-label {
            font-size: 24px; font-weight: 300; color: #1B1B1A;
            margin-bottom: 6px; transition: all 0.4s ease;
        }
        .status-sub {
            font-size: 13px; font-weight: 300; color: #999;
            text-align: center; line-height: 1.55; max-width: 260px;
            margin-bottom: 28px; transition: all 0.4s ease;
            min-height: 40px;
        }

        .tl-area { width: 100%; margin-bottom: 8px; position: relative; }
        .tl-labels { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .tl-lbl {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; font-weight: 400; color: #ccc; letter-spacing: 0.03em;
        }
        .tl-track {
            position: relative; width: 100%; height: 20px;
            cursor: pointer; display: flex; align-items: center;
        }
        .tl-rail-future {
            position: absolute; top: 50%; transform: translateY(-50%);
            left: 50%; width: 50%; height: 2px;
            background: rgba(0,0,0,0.03); border-radius: 0 1px 1px 0;
        }
        .tl-history {
            position: absolute; top: 50%; transform: translateY(-50%);
            left: 0; width: 50%; height: 4px;
            border-radius: 2px;
        }
        .tl-fade {
            position: absolute; top: 50%; transform: translateY(-50%);
            height: 4px;
            background: rgba(255,255,255,0.6);
            pointer-events: none;
            transition: left 0.15s ease, width 0.15s ease, opacity 0.3s ease;
            z-index: 1;
        }
        .tl-center {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
            width: 1px; height: 12px; background: rgba(0,0,0,0.06);
            z-index: 1;
        }
        .tl-start {
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 4px; height: 4px; border-radius: 50%; background: rgba(0,0,0,0.06);
        }
        .tl-end {
            position: absolute; right: 0; top: 50%; transform: translateY(-50%);
            width: 4px; height: 4px; border-radius: 50%; background: rgba(0,0,0,0.06);
        }
        .tl-ghost {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(0,0,0,0.1);
            opacity: 0; transition: opacity 0.3s ease;
            z-index: 2;
        }
        .tl-ghost.show { opacity: 1; }
        .tl-dot {
            position: absolute; top: 50%; transform: translate(-50%,-50%);
            width: 10px; height: 10px; border-radius: 50%;
            transition: left 0.15s ease, background 0.4s ease;
            cursor: grab; z-index: 3;
        }
        .tl-dot:active { cursor: grabbing; transform: translate(-50%,-50%) scale(1.3); }
        .tl-float {
            position: absolute; top: -18px; transform: translateX(-50%);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px; font-weight: 500; letter-spacing: 0.04em;
            white-space: nowrap; z-index: 4;
            transition: left 0.15s ease, color 0.3s ease;
        }

        .return-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; color: #33B6B0; cursor: pointer;
            padding: 4px 0; margin-bottom: 20px;
            opacity: 0; transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .return-btn.show { opacity: 1; pointer-events: auto; }
        .return-btn:hover { color: #2a9a8d; }

        .dims {
            display: flex; width: 100%; justify-content: space-between; padding: 0 4px;
        }
        .dim-wrap {
            display: flex; flex-direction: column; align-items: center;
            gap: 6px; flex: 1;
        }
        .dim-dot {
            width: 12px; height: 12px; border-radius: 50%;
            transition: background 0.4s ease, transform 0.2s ease;
        }
        .dim-wrap:hover .dim-dot { transform: scale(1.25); }
        .dim-val {
            position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; font-weight: 500; color: #999;
            opacity: 0; transition: opacity 0.2s ease;
            pointer-events: none;
        }
        .dim-wrap:hover .dim-val { opacity: 1; }
        .dim-wrap { position: relative; }
        .dim-name { font-size: 9px; font-weight: 400; color: #bbb; }

        .card-footer {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            padding: 14px 28px; border-top: 1px solid rgba(0,0,0,0.04);
        }
        .rx-box {
            width: 14px; height: 14px; border-radius: 2px; background: #ccc;
            display: flex; align-items: center; justify-content: center;
        }
        .rx-box span { font-size: 6px; font-weight: 700; color: white; }
        .ft { font-size: 10px; color: #bbb; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-body">
            <div class="card-meta" id="meta">DAY 55 OF 90 · RECOVERY STATUS</div>
            <div class="orb-wrap"><div class="orb" id="orb"></div></div>
            <div class="status-label" id="label"></div>
            <div class="status-sub" id="sub"></div>

            <div class="tl-area">
                <div class="tl-labels">
                    <span class="tl-lbl">Day 1</span>
                    <span class="tl-lbl">Day 90</span>
                </div>
                <div class="tl-track" id="track">
                    <div class="tl-history" id="history"></div>
                    <div class="tl-fade" id="fade"></div>
                    <div class="tl-rail-future"></div>
                    <div class="tl-start"></div>
                    <div class="tl-center"></div>
                    <div class="tl-end"></div>
                    <div class="tl-ghost" id="ghost"></div>
                    <div class="tl-dot" id="sdot"></div>
                    <div class="tl-float" id="floatLabel"></div>
                </div>
            </div>

            <div class="return-btn" id="returnBtn" onclick="goTo(TODAY)">Return to today →</div>
            <div class="dims" id="dims"></div>
        </div>
        <div class="card-footer">
            <div class="rx-box"><span>Rx</span></div><span class="ft">Verified</span>
        </div>
    </div>
</div>

<script>
const SC = {
    excellent: '#33B6B0',
    ontrack:   '#7BADA6',
    watch:     '#B8A07A',
    attention: '#D97706',
    urgent:    '#DC2626'
};

const TODAY = 55;

// 55 days of simulated recovery data — a realistic story
const data = [];
(function buildData() {
    // Phase 1: Early recovery (Days 1-14) — rough start, stabilizing
    const phase1 = [
        'ontrack','ontrack','ontrack','excellent','ontrack',  // 1-5
        'attention','watch','ontrack','ontrack','ontrack',     // 6-10
        'ontrack','excellent','excellent','ontrack'             // 11-14
    ];
    // Phase 2: Active healing (Days 15-35) — mostly smooth, one blip
    const phase2 = [
        'ontrack','ontrack','excellent','excellent','ontrack',  // 15-19
        'ontrack','ontrack','ontrack','watch','attention',       // 20-24
        'watch','ontrack','ontrack','excellent','ontrack',       // 25-29
        'ontrack','ontrack','excellent','excellent','ontrack',   // 30-34
        'ontrack'                                                 // 35
    ];
    // Phase 3: Strengthening (Days 36-55) — strong, steady improvement
    const phase3 = [
        'excellent','excellent','ontrack','ontrack','ontrack',  // 36-40
        'excellent','excellent','excellent','ontrack','watch',   // 41-45
        'ontrack','ontrack','excellent','excellent','excellent', // 46-50
        'excellent','ontrack','ontrack','excellent','excellent'  // 51-55
    ];

    const all = [...phase1, ...phase2, ...phase3];

    const subs = {
        excellent: ['Recovery is going great.','Ahead of expectations.','Strong progress today.','Everything looks excellent.','Keep it up \u2014 you\u2019re doing great.'],
        ontrack:   ['Progressing as expected.','Recovery on course.','Normal progress for this stage.','Steady recovery.','Things are looking good.'],
        watch:     ['A couple things to monitor.','Keeping an eye on a few areas.','Slightly off baseline \u2014 monitoring.','Minor changes noted.'],
        attention: ['We\u2019ve flagged some changes. Care team notified.','Your care team has been contacted.','Some dimensions need review.']
    };

    const labels = { excellent:'Excellent', ontrack:'On track', watch:'Watch', attention:'Needs attention', urgent:'Contact your doctor' };

    // Color-to-value map
    const colorVal = {'#33B6B0':1,'#7BADA6':2,'#B8A07A':3,'#C4805A':4,'#C45B4A':5};

    // Dimension color generator based on status
    function dimColors(st, day) {
        const seed = day * 7;
        const palettes = {
            excellent: [['#33B6B0','#7BADA6'],['#33B6B0','#7BADA6'],['#33B6B0','#7BADA6'],['#33B6B0'],['#33B6B0','#7BADA6']],
            ontrack:   [['#7BADA6','#B8A07A'],['#33B6B0','#7BADA6'],['#33B6B0','#7BADA6'],['#33B6B0'],['#7BADA6','#33B6B0']],
            watch:     [['#B8A07A','#C4805A'],['#B8A07A','#7BADA6'],['#7BADA6','#B8A07A'],['#33B6B0'],['#7BADA6','#B8A07A']],
            attention: [['#C4805A','#C45B4A'],['#C4805A','#B8A07A'],['#B8A07A','#C4805A'],['#33B6B0','#7BADA6'],['#C4805A','#B8A07A']]
        };
        const p = palettes[st] || palettes.ontrack;
        return ['Pain','Sleep','Mobility','Meds','Nutrition'].map((n,i) => {
            const opts = p[i];
            const c = opts[(seed + i) % opts.length];
            return { c: c, n: n, v: colorVal[c] || 1 };
        });
    }

    for (let i = 0; i < all.length; i++) {
        const st = all[i];
        const day = i + 1;
        const subList = subs[st];
        data.push({
            day: day,
            st: st,
            label: labels[st],
            sub: subList[day % subList.length],
            dims: dimColors(st, day)
        });
    }
})();

let currentDay = -1;
let dragging = false;

const track = document.getElementById('track');
const historyBar = document.getElementById('history');
const fade = document.getElementById('fade');
const sdot = document.getElementById('sdot');
const ghost = document.getElementById('ghost');
const floatLabel = document.getElementById('floatLabel');

// Build gradient
function buildGradient() {
    const stops = data.map((d, i) => {
        const pct = (i / (TODAY - 1)) * 100;
        return SC[d.st] + ' ' + pct + '%';
    });
    historyBar.style.background = 'linear-gradient(to right, ' + stops.join(', ') + ')';
}
buildGradient();

function dayToPct(d) {
    if (TODAY === 1) return 50;
    return ((d - 1) / (TODAY - 1)) * 50;
}

function pctToDay(pct) {
    const clamped = Math.max(0, Math.min(50, pct));
    if (TODAY === 1) return 1;
    return Math.max(1, Math.min(TODAY, Math.round(1 + (clamped / 50) * (TODAY - 1))));
}

function setDay(d) {
    if (d === currentDay) return;
    currentDay = d;
    const s = data[d - 1];
    const color = SC[s.st];
    const pct = dayToPct(d);

    document.getElementById('meta').textContent = 'DAY ' + d + ' OF 90 \u00B7 RECOVERY STATUS';

    const orb = document.getElementById('orb');
    orb.style.background = color;
    orb.style.boxShadow = '0 0 40px ' + color + '30, 0 0 80px ' + color + '15';

    document.getElementById('label').textContent = s.label;
    document.getElementById('sub').textContent = s.sub;

    sdot.style.left = pct + '%';
    sdot.style.background = color;

    floatLabel.style.left = pct + '%';
    floatLabel.textContent = d === TODAY ? 'TODAY' : 'DAY ' + d;
    floatLabel.style.color = d === TODAY ? color : '#999';

    if (d < TODAY) {
        fade.style.left = pct + '%';
        fade.style.width = (50 - pct) + '%';
        fade.style.opacity = '1';
    } else {
        fade.style.opacity = '0';
        fade.style.width = '0%';
    }

    ghost.classList.toggle('show', d < TODAY);
    document.getElementById('returnBtn').classList.toggle('show', d < TODAY);

    renderDims(s.dims);
}

function renderDims(dims) {
    let h = '';
    dims.forEach(d => {
        h += '<div class="dim-wrap">';
        h += '<div class="dim-dot" style="background:' + d.c + '"></div>';
        h += '<span class="dim-val">' + d.v + '</span>';
        h += '<span class="dim-name">' + d.n + '</span>';
        h += '</div>';
    });
    document.getElementById('dims').innerHTML = h;
}

function goTo(d) { setDay(d); }

function getDay(e) {
    const rect = track.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const pct = (x / rect.width) * 100;
    return pctToDay(pct);
}

track.addEventListener('mousedown', e => { dragging = true; setDay(getDay(e)); });
document.addEventListener('mousemove', e => { if (dragging) setDay(getDay(e)); });
document.addEventListener('mouseup', () => { dragging = false; });
track.addEventListener('touchstart', e => { dragging = true; setDay(getDay(e)); }, { passive: true });
document.addEventListener('touchmove', e => { if (dragging) setDay(getDay(e)); }, { passive: true });
document.addEventListener('touchend', () => { dragging = false; });

setDay(TODAY);
</script>

</body>
</html>
