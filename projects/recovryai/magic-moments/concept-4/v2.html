<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Status — Expandable Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: #F5F7FA;
            -webkit-font-smoothing: antialiased;
            display: flex; align-items: flex-start; justify-content: center;
            padding-top: 48px;
        }

        .container { max-width: 380px; width: 100%; padding: 20px; }

        /* ── VCA context ── */
        .vca-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .vca-avatar {
            width: 24px; height: 24px; border-radius: 12px;
            background: rgba(51,182,176,0.12);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .vca-avatar span { font-size: 7px; font-weight: 700; color: #33B6B0; }
        .vca-meta { font-size: 12px; color: #999; font-weight: 300; }
        .vca-meta strong { font-weight: 500; color: #777; }
        .vca-body {
            margin-left: 32px; margin-bottom: 12px;
            font-size: 14px; font-weight: 300; color: #666; line-height: 1.5;
        }

        /* ── Card ── */
        .card {
            background: white; border: 1.5px solid rgba(0,0,0,0.05);
            border-radius: 16px; overflow: hidden;
            transition: box-shadow 0.3s ease;
        }
        .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.04); }

        /* Layer 1 — compact row */
        .compact {
            display: flex; align-items: center; padding: 16px 20px; gap: 10px; cursor: pointer;
        }
        .s-dot {
            width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }
        .s-dot.green  { background: #33B6B0; box-shadow: 0 0 8px rgba(51,182,176,0.3); }
        .s-dot.yellow { background: #D97706; box-shadow: 0 0 8px rgba(217,119,6,0.3); }
        .s-dot.red    { background: #DC2626; box-shadow: 0 0 8px rgba(220,38,38,0.3); }
        .c-text { flex: 1; display: flex; align-items: baseline; gap: 6px; }
        .c-label { font-size: 15px; font-weight: 500; color: #1B1B1A; }
        .c-sep { font-size: 12px; color: #ccc; }
        .c-day { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #bbb; letter-spacing: 0.03em; }
        .chev {
            width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s ease; flex-shrink: 0;
        }
        .chev.flip { transform: rotate(180deg); }

        /* Layer 2 — dimensions */
        .l2 {
            max-height: 0; opacity: 0; overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
        }
        .l2.open { max-height: 400px; opacity: 1; }
        .l2-inner { padding: 0 20px 16px; }

        .prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .prog-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; color: #bbb; letter-spacing: 0.03em; white-space: nowrap;
        }
        .prog-bar { flex: 1; height: 2px; background: rgba(0,0,0,0.04); border-radius: 1px; }
        .prog-fill { height: 100%; border-radius: 1px; transition: background 0.4s ease; }

        .d-row { display: flex; align-items: center; padding: 7px 0; gap: 10px; }
        .d-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: background 0.3s ease; }
        .d-name { font-size: 13px; font-weight: 400; color: #555; flex: 1; }
        .d-val { font-size: 13px; font-weight: 300; color: #999; }

        .recent-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 12px 0 4px; margin-top: 8px;
            border-top: 1px solid rgba(0,0,0,0.04); cursor: pointer;
        }
        .recent-btn span { font-size: 11px; color: #ccc; transition: color 0.2s ease; }
        .recent-btn:hover span { color: #999; }
        .mini-chev { transition: transform 0.3s ease; }
        .mini-chev.flip { transform: rotate(180deg); }

        /* Layer 3 — timeline */
        .l3 {
            max-height: 0; opacity: 0; overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease 0.05s;
        }
        .l3.open { max-height: 500px; opacity: 1; }
        .l3-inner { padding: 8px 0 4px; }

        .t-row { display: flex; align-items: center; padding: 8px 0; gap: 10px; }
        .t-day {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px; color: #bbb; width: 48px; flex-shrink: 0; letter-spacing: 0.02em;
        }
        .t-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .t-dims { display: flex; gap: 3px; flex-shrink: 0; }
        .t-mini { width: 5px; height: 5px; border-radius: 50%; }
        .t-label { font-size: 11px; font-weight: 300; color: #bbb; flex: 1; }
        .t-row.today .t-day { color: #555; font-weight: 500; }
        .t-row.today .t-label { color: #777; font-weight: 400; }

        /* Footer */
        .card-footer {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            padding: 12px 20px; border-top: 1px solid rgba(0,0,0,0.04);
        }
        .rx-box {
            width: 14px; height: 14px; border-radius: 2px; background: #ccc;
            display: flex; align-items: center; justify-content: center;
        }
        .rx-box span { font-size: 6px; font-weight: 700; color: white; }
        .ft { font-size: 10px; color: #bbb; }

        /* Controls */
        .state-toggle { position: fixed; top: 20px; right: 20px; display: flex; gap: 6px; }
        .state-btn {
            font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #999;
            background: none; border: 1px solid #ddd; padding: 5px 10px; border-radius: 5px;
            cursor: pointer; transition: all 0.2s ease;
        }
        .state-btn:hover { border-color: #aaa; color: #666; }
        .state-btn.active { border-color: #888; color: #555; background: rgba(0,0,0,0.02); }
        .concept-label {
            position: fixed; top: 20px; left: 20px;
            font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #ccc; letter-spacing: 0.04em;
        }
    </style>
</head>
<body>

<div class="concept-label">CONCEPT A · EXPANDABLE PORTAL</div>

<div class="container">
    <div class="vca-row">
        <div class="vca-avatar"><span>Rx</span></div>
        <div class="vca-meta"><strong>recovry.ai</strong> · 8:04 AM</div>
    </div>
    <div class="vca-body">Here's your morning update.</div>

    <div class="card" id="card">
        <!-- Layer 1 -->
        <div class="compact" onclick="toggleL2()">
            <div class="s-dot green" id="sDot"></div>
            <div class="c-text">
                <span class="c-label" id="cLabel" data-drift-editable="status-label" data-drift-maxlen="30">On track</span>
                <span class="c-sep">&middot;</span>
                <span class="c-day">Day 8</span>
            </div>
            <div class="chev" id="chev1">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="#ccc" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
        </div>

        <!-- Layer 2 -->
        <div class="l2" id="l2">
            <div class="l2-inner">
                <div class="prog-row">
                    <span class="prog-label">DAY 8 OF 90</span>
                    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:8.9%;background:#33B6B0;"></div></div>
                </div>
                <div id="dimArea"></div>
                <div class="recent-btn" onclick="toggleL3(event)">
                    <span>Recent days</span>
                    <div class="mini-chev" id="chev3">
                        <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="#ccc" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                </div>
                <div class="l3" id="l3"><div class="l3-inner" id="tlArea"></div></div>
            </div>
        </div>

        <div class="card-footer" id="footer" style="display:none;">
            <div class="rx-box"><span>Rx</span></div><span class="ft">Verified</span>
        </div>
    </div>
</div>

<div class="state-toggle">
    <button class="state-btn active" onclick="setState('green',this)">Green</button>
    <button class="state-btn" onclick="setState('yellow',this)">Yellow</button>
    <button class="state-btn" onclick="setState('red',this)">Red</button>
</div>

<script>
const SC = { green:'#33B6B0', yellow:'#D97706', red:'#DC2626' };
const names = ['Pain','Sleep','Mobility','Meds','Appetite'];

const today = {
    green:  { label:'On track',           dims:[{c:'#7BADA6',v:'Mild'},{c:'#33B6B0',v:'Good'},{c:'#33B6B0',v:'Good'},{c:'#33B6B0',v:'On track'},{c:'#7BADA6',v:'Fair'}] },
    yellow: { label:'Needs attention',     dims:[{c:'#C4805A',v:'Significant'},{c:'#B8A07A',v:'Fair'},{c:'#B8A07A',v:'Limited'},{c:'#33B6B0',v:'On track'},{c:'#C4805A',v:'Low'}] },
    red:    { label:'Contact your doctor', dims:[{c:'#C45B4A',v:'High'},{c:'#C45B4A',v:'Very poor'},{c:'#C4805A',v:'Limited'},{c:'#B8A07A',v:'Missed'},{c:'#C4805A',v:'Low'}] }
};

const hist = [
    { day:7, label:'On track',        st:'green',  dc:['#B8A07A','#B8A07A','#33B6B0','#33B6B0','#7BADA6'] },
    { day:6, label:'Needs attention',  st:'yellow', dc:['#C4805A','#C4805A','#B8A07A','#33B6B0','#C4805A'] },
    { day:5, label:'On track',        st:'green',  dc:['#B8A07A','#33B6B0','#7BADA6','#33B6B0','#33B6B0'] },
    { day:4, label:'On track',        st:'green',  dc:['#7BADA6','#33B6B0','#7BADA6','#33B6B0','#33B6B0'] }
];

let l2Open=false, l3Open=false, cur='green';

function toggleL2(){
    l2Open=!l2Open;
    document.getElementById('l2').classList.toggle('open',l2Open);
    document.getElementById('chev1').classList.toggle('flip',l2Open);
    document.getElementById('footer').style.display=l2Open?'':'none';
    if(!l2Open){ l3Open=false; document.getElementById('l3').classList.remove('open'); document.getElementById('chev3').classList.remove('flip'); }
}
function toggleL3(e){
    e.stopPropagation();
    l3Open=!l3Open;
    document.getElementById('l3').classList.toggle('open',l3Open);
    document.getElementById('chev3').classList.toggle('flip',l3Open);
}

function renderDims(state){
    const d=today[state].dims;
    let h='';
    d.forEach((dim,i)=>{
        h+='<div class="d-row"><div class="d-dot" style="background:'+dim.c+'"></div><span class="d-name">'+names[i]+'</span><span class="d-val">'+dim.v+'</span></div>';
    });
    document.getElementById('dimArea').innerHTML=h;
}

function renderTL(state){
    const d=today[state].dims;
    let h='<div class="t-row today"><span class="t-day">Today</span><div class="t-dot" style="background:'+SC[state]+'"></div><div class="t-dims">';
    d.forEach(dim=>{ h+='<div class="t-mini" style="background:'+dim.c+'"></div>'; });
    h+='</div><span class="t-label">'+today[state].label+'</span></div>';
    hist.forEach(r=>{
        h+='<div class="t-row"><span class="t-day">Day '+r.day+'</span><div class="t-dot" style="background:'+SC[r.st]+'"></div><div class="t-dims">';
        r.dc.forEach(c=>{ h+='<div class="t-mini" style="background:'+c+'"></div>'; });
        h+='</div><span class="t-label">'+r.label+'</span></div>';
    });
    document.getElementById('tlArea').innerHTML=h;
}

function setState(state,btn){
    cur=state;
    document.getElementById('sDot').className='s-dot '+state;
    document.getElementById('cLabel').textContent=today[state].label;
    document.getElementById('progFill').style.background=SC[state];
    renderDims(state);
    renderTL(state);
    document.querySelectorAll('.state-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
}

renderDims('green');
renderTL('green');
</script>

</body>
</html>
