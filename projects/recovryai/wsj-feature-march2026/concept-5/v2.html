<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSJ Feature — Twitter Bold Statement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cormorant+Garamond:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        body {
            width: 1200px;
            height: 675px;
            background: #111110;
            font-family: 'IBM Plex Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* Grain overlay */
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .content {
            position: absolute;
            inset: 0;
            padding: 48px 80px;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* Top: masthead with rules */
        .top-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 12px;
        }
        .top-rule {
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }
        .wsj-masthead {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 22px;
            color: rgba(255,255,255,0.7);
            line-height: 1;
            white-space: nowrap;
        }
        .meta-line {
            text-align: center;
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            margin-bottom: 40px;
        }
        .meta-line .teal {
            color: #3EB5A6;
        }

        /* Hero: headline fills the space */
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .headline {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 72px;
            line-height: 1.02;
            color: #FFFFFF;
            letter-spacing: -0.025em;
            max-width: 900px;
        }
        .headline .teal {
            color: #3EB5A6;
        }

        /* Bottom: featured line + logo */
        .bottom-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }
        .featured-text {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255,255,255,0.3);
        }
        .featured-text strong {
            color: #3EB5A6;
            font-weight: 500;
        }
        .logo img {
            height: 20px;
            width: auto;
            display: block;
            opacity: 0.5;
        }

        @media print {
            html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
<div class="content">
    <div class="top-section">
        <div class="top-rule"></div>
        <div class="wsj-masthead" data-drift-editable="wsj-nameplate" data-drift-maxlen="40">The Wall Street Journal</div>
        <div class="top-rule"></div>
    </div>
    <div class="meta-line"><span class="teal">WSJ PRO</span> &nbsp;&middot;&nbsp; EXCLUSIVE &nbsp;&middot;&nbsp; MARCH 23, 2026</div>

    <div class="hero">
        <h1 class="headline" data-drift-editable="headline" data-drift-maxlen="80">Startups Are Pushing <span class="teal">AI</span> Into Patient Care</h1>
    </div>

    <div class="bottom-row">
        <div class="featured-text"><strong>RecovryAI</strong> featured in The Wall Street Journal</div>
        <div class="logo"><img src="../../brand/logos/logo-color-dark.svg" alt="RecovryAI"></div>
    </div>
</div>
</body>
</html>
