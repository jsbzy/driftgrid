<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSJ Feature — Dark Cinematic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        body {
            width: 1200px;
            height: 627px;
            background: #111110;
            font-family: 'IBM Plex Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* Subtle grain */
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .content {
            position: absolute;
            inset: 0;
            padding: 56px 88px;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* Top: WSJ masthead centered */
        .masthead-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-bottom: 16px;
        }
        .masthead-rule {
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }
        .wsj-masthead {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 28px;
            color: rgba(255,255,255,0.9);
            line-height: 1;
            white-space: nowrap;
        }

        .meta-row {
            text-align: center;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 48px;
        }
        .meta-row .teal {
            color: #3EB5A6;
        }

        /* Center: headline as hero */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .headline {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 56px;
            line-height: 1.08;
            color: #FFFFFF;
            letter-spacing: -0.02em;
            margin-bottom: 32px;
            max-width: 820px;
        }

        .quote {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 400;
            font-size: 20px;
            line-height: 1.5;
            color: rgba(255,255,255,0.5);
            max-width: 680px;
            text-align: center;
            padding: 0 40px;
            position: relative;
        }
        .quote::before {
            content: '';
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: #3EB5A6;
        }
        .quote em {
            font-style: italic;
            color: #3EB5A6;
        }

        /* Bottom: attribution + logo */
        .bottom-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }
        .attribution {
            font-size: 12px;
            color: rgba(255,255,255,0.35);
        }
        .attribution strong {
            color: rgba(255,255,255,0.6);
            font-weight: 500;
        }
        .logo img {
            height: 20px;
            width: auto;
            display: block;
            opacity: 0.6;
        }

        @media print {
            html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
<div class="content">
    <div class="masthead-row">
        <div class="masthead-rule"></div>
        <div class="wsj-masthead" data-drift-editable="wsj-nameplate" data-drift-maxlen="40">The Wall Street Journal</div>
        <div class="masthead-rule"></div>
    </div>
    <div class="meta-row"><span class="teal">WSJ PRO</span> &nbsp;&middot;&nbsp; EXCLUSIVE &nbsp;&middot;&nbsp; MARCH 23, 2026</div>

    <div class="hero">
        <h1 class="headline" data-drift-editable="headline" data-drift-maxlen="80">Startups Are Pushing AI<br>Into Patient Care</h1>
        <div class="quote" data-drift-editable="quote" data-drift-maxlen="200">&ldquo;The regulatory hurdle is difficult and it&rsquo;s going to be difficult for anyone to <em>compete against</em>.&rdquo;</div>
    </div>

    <div class="bottom-row">
        <div class="attribution">By <strong>Brian Gormley</strong> &nbsp;&middot;&nbsp; Scott Walchek, CEO &amp; Co-Founder, RecovryAI</div>
        <div class="logo"><img src="../../brand/logos/logo-color-dark.svg" alt="RecovryAI"></div>
    </div>
</div>
</body>
</html>
