<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSJ Feature — Pull Quote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        body {
            width: 1200px;
            height: 627px;
            background: #FAFAF7;
            font-family: 'IBM Plex Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        .content {
            position: absolute;
            inset: 0;
            padding: 64px 96px;
            display: flex;
            flex-direction: column;
        }

        /* Top: thin rule + WSJ attribution */
        .top-rule {
            height: 1px;
            background: #1a1a1a;
            margin-bottom: 20px;
        }
        .top-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
        }
        .wsj-stamp {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 20px;
            color: #1a1a1a;
            line-height: 1;
        }
        .top-tags {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #aaa;
        }
        .top-tags .teal {
            color: #3EB5A6;
            font-weight: 600;
        }

        /* Quote — the hero moment */
        .quote-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 48px;
            border-left: 3px solid #3EB5A6;
        }

        .open-quote {
            font-family: 'Cormorant Garamond', serif;
            font-size: 80px;
            font-weight: 700;
            color: #3EB5A6;
            line-height: 0.6;
            margin-bottom: 8px;
            margin-left: -4px;
        }

        .quote-text {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            font-size: 36px;
            line-height: 1.3;
            color: #1a1a1a;
            margin-bottom: 32px;
            max-width: 840px;
        }
        .quote-text em {
            font-style: normal;
            color: #3EB5A6;
            font-weight: 600;
        }

        .attr-row {
            display: flex;
            align-items: baseline;
            gap: 16px;
        }
        .attr-name {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: 0.01em;
        }
        .attr-title {
            font-size: 12px;
            font-weight: 400;
            color: #999;
        }

        /* Bottom: rule + logo */
        .bottom-rule {
            height: 1px;
            background: rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .bottom-label {
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #bbb;
        }
        .logo img {
            height: 20px;
            width: auto;
            display: block;
            opacity: 0.6;
        }

        @media print {
            html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
<div class="content">
    <div class="top-rule"></div>
    <div class="top-meta">
        <div class="wsj-stamp" data-drift-editable="wsj-nameplate" data-drift-maxlen="40">The Wall Street Journal</div>
        <div class="top-tags"><span class="teal">WSJ PRO</span> &nbsp;&middot;&nbsp; EXCLUSIVE &nbsp;&middot;&nbsp; MARCH 23, 2026</div>
    </div>

    <div class="quote-area">
        <div class="open-quote">&ldquo;</div>
        <div class="quote-text" data-drift-editable="quote" data-drift-maxlen="300">The <em>regulatory hurdle</em> is difficult and it&rsquo;s going to be difficult for anyone to <em>compete against</em>.</div>
        <div class="attr-row">
            <span class="attr-name" data-drift-editable="attribution-name" data-drift-maxlen="60">Scott Walchek</span>
            <span class="attr-title" data-drift-editable="attribution-title" data-drift-maxlen="120">CEO &amp; Co-Founder, RecovryAI</span>
        </div>
    </div>

    <div class="bottom-rule"></div>
    <div class="bottom-row">
        <span class="bottom-label">As quoted in The Wall Street Journal</span>
        <div class="logo"><img src="../../brand/logos/logo-color-light.svg" alt="RecovryAI"></div>
    </div>
</div>
</body>
</html>
