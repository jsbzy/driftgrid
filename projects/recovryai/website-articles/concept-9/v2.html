<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Supervision Gap — Simple Timeline v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f5;
            --bg-light: #e8e8e8;
            --teal: #3EB5A6;
            --text: #1a1a1a;
            --text-dim: #666;
            --text-mid: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        body {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 60px;
        }

        .diagram-wrap {
            max-width: 660px;
            width: 100%;
        }

        .diagram-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            text-align: center;
        }

        /* The bar */
        .journey {
            display: flex;
            align-items: stretch;
            height: 52px;
            margin-bottom: 0.6rem;
        }

        .phase {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phase-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.46rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .phase--preop {
            flex: 0 0 12%;
            background: var(--bg-light);
            border-radius: 3px 0 0 3px;
        }
        .phase--preop .phase-label { color: var(--text-dim); }

        .phase--surgery {
            flex: 0 0 18%;
            background: var(--bg-light);
            border-left: 1px solid rgba(0,0,0,0.06);
        }
        .phase--surgery .phase-label { color: var(--text-dim); }

        .phase--inpatient {
            flex: 0 0 10%;
            background: var(--bg-light);
            border-left: 1px solid rgba(0,0,0,0.06);
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 50%, rgba(0,0,0,0.3) 100%);
            mask-image: linear-gradient(to right, rgba(0,0,0,1) 50%, rgba(0,0,0,0.3) 100%);
        }

        .phase--gap {
            flex: 1;
            background: rgba(62, 181, 166, 0.06);
            border-left: 2px solid var(--teal);
            border-right: 2px solid var(--teal);
            position: relative;
        }
        .phase--gap .phase-label {
            color: var(--teal);
            font-size: 0.5rem;
            letter-spacing: 0.12em;
        }

        .phase--followup {
            flex: 0 0 10%;
            background: var(--bg-light);
            border-radius: 0 3px 3px 0;
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 50%, rgba(0,0,0,0.3) 100%);
            mask-image: linear-gradient(to left, rgba(0,0,0,1) 50%, rgba(0,0,0,0.3) 100%);
        }

        /* Phase labels below */
        .phase-names {
            display: flex;
            margin-bottom: 1.75rem;
        }

        .phase-name {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.42rem;
            color: var(--text-dim);
            text-align: center;
            letter-spacing: 0.04em;
        }

        .phase-name--preop { flex: 0 0 12%; }
        .phase-name--surgery { flex: 0 0 18%; }
        .phase-name--inpatient { flex: 0 0 10%; }
        .phase-name--gap { flex: 1; color: var(--teal); font-weight: 500; }
        .phase-name--followup { flex: 0 0 10%; }

        /* Annotation */
        .annotation {
            display: flex;
            gap: 2rem;
            justify-content: center;
        }

        .annotation-item {
            text-align: center;
        }

        .annotation-line {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.42rem;
            letter-spacing: 0.04em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .annotation-line--supervised {
            border-bottom: 2px solid var(--bg-light);
            padding-bottom: 0.3rem;
            margin-bottom: 0.2rem;
        }

        .annotation-line--unsupervised {
            border-bottom: 2px solid var(--teal);
            padding-bottom: 0.3rem;
            margin-bottom: 0.2rem;
            color: var(--teal);
        }

        .annotation-detail {
            font-size: 0.4rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="diagram-wrap">
        <div class="diagram-title">The Interval Neither Lane Reaches</div>

        <div class="journey">
            <div class="phase phase--preop">
                <span class="phase-label">Pre-Op</span>
            </div>
            <div class="phase phase--surgery">
                <span class="phase-label">Surgery</span>
            </div>
            <div class="phase phase--inpatient"></div>
            <div class="phase phase--gap">
                <span class="phase-label">Recovery at Home</span>
            </div>
            <div class="phase phase--followup"></div>
        </div>

        <div class="phase-names">
            <div class="phase-name phase-name--preop"></div>
            <div class="phase-name phase-name--surgery"></div>
            <div class="phase-name phase-name--inpatient">Discharge</div>
            <div class="phase-name phase-name--gap">Days to weeks &mdash; unsupervised</div>
            <div class="phase-name phase-name--followup">Follow-Up</div>
        </div>

        <div class="annotation">
            <div class="annotation-item">
                <div class="annotation-line annotation-line--supervised">Clinician Present</div>
                <div class="annotation-detail">~250 min</div>
            </div>
            <div class="annotation-item">
                <div class="annotation-line annotation-line--unsupervised">No Clinical Supervision</div>
                <div class="annotation-detail">~150 min &middot; 40% of the episode</div>
            </div>
            <div class="annotation-item">
                <div class="annotation-line annotation-line--supervised">Clinician Present</div>
                <div class="annotation-detail">Follow-up visit</div>
            </div>
        </div>
    </div>
</body>
</html>
