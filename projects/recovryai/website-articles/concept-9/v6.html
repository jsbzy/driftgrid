<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clinical Supervision Gap — v6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f5;
            --bg-light: #e8e8e8;
            --teal: #3EB5A6;
            --text: #1a1a1a;
            --text-dim: #666;
            --text-mid: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        body {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 60px;
        }

        .diagram-wrap {
            max-width: 660px;
            width: 100%;
        }

        .diagram-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            text-align: center;
        }

        /* Bar row */
        .bar-row {
            display: flex;
            height: 48px;
            position: relative;
        }

        /* Tiny slivers */
        .sliver {
            background: var(--bg-light);
            position: relative;
        }

        .sliver--preop {
            flex: 0 0 3.5%;
            border-radius: 3px 0 0 3px;
        }

        .sliver--surgery {
            flex: 0 0 4%;
            border-left: 1px solid rgba(0,0,0,0.06);
        }

        .sliver--discharge {
            flex: 0 0 3%;
            border-left: 1px solid rgba(0,0,0,0.06);
        }

        .sliver--followup {
            flex: 0 0 3%;
            border-radius: 0 3px 3px 0;
        }

        /* Gap — dominates */
        .gap {
            flex: 1;
            background: rgba(62, 181, 166, 0.06);
            border-left: 2px solid var(--teal);
            border-right: 2px solid var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gap-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.48rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--teal);
        }

        /* Callouts — lines dropping down from slivers */
        .callouts {
            display: flex;
            position: relative;
            height: 48px;
            margin-top: 0;
        }

        .callout {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .callout-line {
            width: 1px;
            height: 16px;
            background: var(--bg-light);
        }

        .callout-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.38rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-dim);
            white-space: nowrap;
            margin-top: 4px;
        }

        /* Left cluster — staggered callouts for Pre-Op, Surgery, Discharge */
        .callout--preop {
            left: 1.75%;
        }

        .callout--surgery {
            left: 5.5%;
        }
        .callout--surgery .callout-line { height: 28px; }

        .callout--discharge {
            left: 9%;
        }
        .callout--discharge .callout-line { height: 40px; }

        /* Right callout for Follow-Up */
        .callout--followup {
            right: 1.5%;
        }

        /* Descriptors row */
        .descriptors {
            display: flex;
            margin-top: 0.35rem;
            padding-top: 0;
        }

        /* Left supervised block aligns with the 3 slivers */
        .desc-left {
            flex: 0 0 10.5%;
        }

        .desc-gap {
            flex: 1;
        }

        .desc-right {
            flex: 0 0 3%;
        }

        .desc-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.36rem;
            font-weight: 400;
            color: var(--text-dim);
            text-align: center;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .desc-gap .desc-text {
            color: var(--teal);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="diagram-wrap">
        <div class="diagram-title">The Clinical Supervision Gap</div>

        <!-- Bar -->
        <div class="bar-row">
            <div class="sliver sliver--preop"></div>
            <div class="sliver sliver--surgery"></div>
            <div class="sliver sliver--discharge"></div>
            <div class="gap"><span class="gap-label">Recovery at Home</span></div>
            <div class="sliver sliver--followup"></div>
        </div>

        <!-- Callout lines + labels -->
        <div class="callouts">
            <div class="callout callout--preop">
                <div class="callout-line"></div>
                <span class="callout-label">Pre-Op</span>
            </div>
            <div class="callout callout--surgery">
                <div class="callout-line"></div>
                <span class="callout-label">Surgery</span>
            </div>
            <div class="callout callout--discharge">
                <div class="callout-line"></div>
                <span class="callout-label">Discharge</span>
            </div>
            <div class="callout callout--followup">
                <div class="callout-line"></div>
                <span class="callout-label">Follow-Up</span>
            </div>
        </div>
    </div>
</body>
</html>
