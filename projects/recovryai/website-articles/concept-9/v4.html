<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clinical Supervision Gap — v4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f5;
            --bg-light: #e8e8e8;
            --teal: #3EB5A6;
            --text: #1a1a1a;
            --text-dim: #666;
            --text-mid: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        body {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 60px;
        }

        .diagram-wrap {
            max-width: 660px;
            width: 100%;
        }

        .diagram-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 1.75rem;
            text-align: center;
        }

        /* Shared flex columns */
        .row { display: flex; }
        .col--phase { flex: 0 0 10%; }
        .col--gap { flex: 1; }

        /* The bar */
        .journey {
            height: 48px;
            margin-bottom: 0.5rem;
        }

        .phase {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .phase-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.44rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .phase--preop {
            background: var(--bg-light);
            border-radius: 3px 0 0 3px;
        }

        .phase--surgery {
            background: var(--bg-light);
            border-left: 1px solid rgba(0,0,0,0.06);
        }

        .phase--discharge {
            background: var(--bg-light);
            border-left: 1px solid rgba(0,0,0,0.06);
        }

        .phase--gap {
            background: rgba(62, 181, 166, 0.06);
            border-left: 2px solid var(--teal);
            border-right: 2px solid var(--teal);
        }
        .phase--gap .phase-label {
            color: var(--teal);
            font-size: 0.48rem;
            letter-spacing: 0.12em;
        }

        .phase--followup {
            background: var(--bg-light);
            border-radius: 0 3px 3px 0;
        }

        /* Descriptors — 1-liners under relevant sections */
        .descriptors {
            padding-top: 0.15rem;
            overflow: visible;
        }

        .desc-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.38rem;
            font-weight: 400;
            color: var(--text-dim);
            text-align: center;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Supervised spans 3 phase columns */
        .col--supervised {
            flex: 0 0 30%;
        }

        .col--gap .desc-text {
            color: var(--teal);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="diagram-wrap">
        <div class="diagram-title">The Clinical Supervision Gap</div>

        <!-- Bar -->
        <div class="row journey">
            <div class="col--phase">
                <div class="phase phase--preop"><span class="phase-label">Pre-Op</span></div>
            </div>
            <div class="col--phase">
                <div class="phase phase--surgery"><span class="phase-label">Surgery</span></div>
            </div>
            <div class="col--phase">
                <div class="phase phase--discharge"><span class="phase-label">Discharge</span></div>
            </div>
            <div class="col--gap">
                <div class="phase phase--gap"><span class="phase-label">Recovery at Home</span></div>
            </div>
            <div class="col--phase">
                <div class="phase phase--followup"><span class="phase-label">Follow-Up</span></div>
            </div>
        </div>

        <!-- Descriptors — 1-liners -->
        <div class="row descriptors">
            <div class="col--supervised">
                <div class="desc-text">~4 hrs supervised</div>
            </div>
            <div class="col--gap">
                <div class="desc-text">Days to weeks unsupervised</div>
            </div>
            <div class="col--phase">
                <div class="desc-text">~1 hr supervised</div>
            </div>
        </div>
    </div>
</body>
</html>
