<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clinical Supervision Gap — v3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f5;
            --bg-light: #e8e8e8;
            --teal: #3EB5A6;
            --text: #1a1a1a;
            --text-dim: #666;
            --text-mid: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        body {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 60px;
        }

        .diagram-wrap {
            max-width: 660px;
            width: 100%;
        }

        .diagram-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            text-align: center;
        }

        /* Shared flex columns */
        .row { display: flex; }
        .col--supervised { flex: 0 0 40%; }
        .col--gap { flex: 1; }
        .col--followup { flex: 0 0 12%; }

        /* The bar */
        .journey {
            height: 52px;
            margin-bottom: 0.6rem;
        }

        .journey .col--supervised {
            display: flex;
        }

        .phase {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phase-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.46rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .phase--preop {
            flex: 1;
            background: var(--bg-light);
            border-radius: 3px 0 0 3px;
        }
        .phase--preop .phase-label { color: var(--text-dim); }

        .phase--surgery {
            flex: 1.5;
            background: var(--bg-light);
            border-left: 1px solid rgba(0,0,0,0.06);
        }
        .phase--surgery .phase-label { color: var(--text-dim); }

        .phase--fade {
            flex: 0.6;
            background: var(--bg-light);
            border-left: 1px solid rgba(0,0,0,0.06);
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 40%, rgba(0,0,0,0.2) 100%);
            mask-image: linear-gradient(to right, rgba(0,0,0,1) 40%, rgba(0,0,0,0.2) 100%);
        }

        .phase--gap {
            height: 100%;
            background: rgba(62, 181, 166, 0.06);
            border-left: 2px solid var(--teal);
            border-right: 2px solid var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .phase--gap .phase-label {
            color: var(--teal);
            font-size: 0.5rem;
            letter-spacing: 0.12em;
        }

        .phase--followup {
            height: 100%;
            background: var(--bg-light);
            border-radius: 0 3px 3px 0;
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 40%, rgba(0,0,0,0.2) 100%);
            mask-image: linear-gradient(to left, rgba(0,0,0,1) 40%, rgba(0,0,0,0.2) 100%);
        }

        /* Labels below bar — same columns */
        .labels {
            margin-bottom: 1.75rem;
        }

        .label-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.42rem;
            color: var(--text-dim);
            text-align: center;
            letter-spacing: 0.04em;
        }

        .col--gap .label-text {
            color: var(--teal);
            font-weight: 500;
        }

        /* Annotations — same columns */
        .annotations .col--supervised,
        .annotations .col--gap,
        .annotations .col--followup {
            text-align: center;
        }

        .anno-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.42rem;
            letter-spacing: 0.04em;
            color: var(--text-dim);
            text-transform: uppercase;
            padding-bottom: 0.3rem;
            margin-bottom: 0.25rem;
            display: inline-block;
        }

        .anno-label--gray { border-bottom: 2px solid var(--bg-light); }
        .anno-label--teal { border-bottom: 2px solid var(--teal); color: var(--teal); }

        .anno-detail {
            font-size: 0.4rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="diagram-wrap">
        <div class="diagram-title">The Clinical Supervision Gap</div>

        <!-- Bar -->
        <div class="row journey">
            <div class="col--supervised" style="display:flex;">
                <div class="phase phase--preop"><span class="phase-label">Pre-Op</span></div>
                <div class="phase phase--surgery"><span class="phase-label">Surgery</span></div>
                <div class="phase phase--fade"></div>
            </div>
            <div class="col--gap">
                <div class="phase--gap"><span class="phase-label">Recovery at Home</span></div>
            </div>
            <div class="col--followup">
                <div class="phase--followup"></div>
            </div>
        </div>

        <!-- Labels -->
        <div class="row labels">
            <div class="col--supervised">
                <div class="label-text">Discharge &darr;</div>
            </div>
            <div class="col--gap">
                <div class="label-text">Days to weeks &mdash; unsupervised</div>
            </div>
            <div class="col--followup">
                <div class="label-text">Follow-Up</div>
            </div>
        </div>

        <!-- Annotations -->
        <div class="row annotations">
            <div class="col--supervised">
                <div class="anno-label anno-label--gray">Clinician Present</div>
                <div class="anno-detail">~250 min</div>
            </div>
            <div class="col--gap">
                <div class="anno-label anno-label--teal">No Clinical Supervision</div>
                <div class="anno-detail">~150 min &middot; 40% of the episode</div>
            </div>
            <div class="col--followup">
                <div class="anno-label anno-label--gray">Clinician Present</div>
                <div class="anno-detail">Follow-up visit</div>
            </div>
        </div>
    </div>
</body>
</html>
