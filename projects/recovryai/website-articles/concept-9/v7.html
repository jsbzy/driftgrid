<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clinical Supervision Gap — v7</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f5;
            --bg-light: #e8e8e8;
            --teal: #3EB5A6;
            --text: #1a1a1a;
            --text-dim: #666;
            --text-mid: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        body {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 60px;
        }

        .diagram-wrap {
            max-width: 660px;
            width: 100%;
        }

        .diagram-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            text-align: center;
        }

        /* Labels above the bar — flanking left and right */
        .top-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .top-label-group {
            display: flex;
            gap: 0.75rem;
        }

        .top-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.36rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-dim);
            position: relative;
            padding-bottom: 4px;
        }

        .top-label::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 1px;
            height: 4px;
            background: var(--bg-light);
        }

        /* Bar */
        .bar-row {
            display: flex;
            height: 52px;
        }

        .sliver-left {
            flex: 0 0 2%;
            background: var(--bg-light);
            border-radius: 3px 0 0 3px;
            position: relative;
        }

        .sliver-left::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(0,0,0,0.04);
        }

        .sliver-right {
            flex: 0 0 2%;
            background: var(--bg-light);
            border-radius: 0 3px 3px 0;
            position: relative;
        }

        .sliver-right::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(0,0,0,0.04);
        }

        .gap {
            flex: 1;
            background: rgba(62, 181, 166, 0.06);
            border-left: 2px solid var(--teal);
            border-right: 2px solid var(--teal);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gap-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.48rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--teal);
        }

        /* Bottom descriptors */
        .descriptors {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
        }

        .desc-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.36rem;
            font-weight: 400;
            color: var(--text-dim);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .desc-text--teal {
            color: var(--teal);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="diagram-wrap">
        <div class="diagram-title">The Clinical Supervision Gap</div>

        <!-- Labels above the bar -->
        <div class="top-labels">
            <div class="top-label-group">
                <span class="top-label">Pre-Op</span>
                <span class="top-label">Surgery</span>
                <span class="top-label">Discharge</span>
            </div>
            <div class="top-label-group">
                <span class="top-label">Follow-Up</span>
            </div>
        </div>

        <!-- Bar — extreme proportions -->
        <div class="bar-row">
            <div class="sliver-left"></div>
            <div class="gap"><span class="gap-label">Recovery at Home</span></div>
            <div class="sliver-right"></div>
        </div>

        <!-- Bottom descriptors -->
        <div class="descriptors">
            <span class="desc-text">~4 hrs supervised</span>
            <span class="desc-text desc-text--teal">Days to weeks — unsupervised</span>
            <span class="desc-text">~1 hr supervised</span>
        </div>
    </div>
</body>
</html>
