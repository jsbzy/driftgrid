<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriftGrid Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #ffffff;
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            text-align: center;
            padding: 0 2rem;
        }
        .eyebrow {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 64px;
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.035em;
            margin-bottom: 24px;
        }
        h1 span {
            color: #2563eb;
        }
        .subtitle {
            font-size: 18px;
            font-weight: 400;
            color: #6b7280;
            line-height: 1.7;
            max-width: 520px;
            margin: 0 auto 48px;
        }
        .actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .cta {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: #2563eb;
            border: none;
            border-radius: 100px;
            padding: 14px 32px;
            cursor: pointer;
            letter-spacing: 0.01em;
        }
        .cta-ghost {
            font-size: 14px;
            font-weight: 500;
            color: #6b7280;
            background: none;
            border: none;
            cursor: pointer;
            padding: 14px 8px;
        }
        .cta-ghost:hover { color: #111; }
        .grid-hint {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #d1d5db;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="eyebrow">Version 2 — bolder direction</div>
        <h1 data-drift-editable="headline" data-drift-maxlen="60">Drift around the grid.<br>Find your <span>selects</span>.</h1>
        <p class="subtitle" data-drift-editable="subtitle" data-drift-maxlen="120">Concepts across. Versions down. Star your picks and present them. This version explores a bolder headline with accent color.</p>
        <div class="actions">
            <button class="cta" data-drift-editable="cta" data-drift-maxlen="30">Try DriftGrid</button>
            <button class="cta-ghost" data-drift-editable="cta2" data-drift-maxlen="30">View on GitHub &rarr;</button>
        </div>
    </div>
    <div class="grid-hint">Press Escape to return to the grid</div>
</body>
</html>
