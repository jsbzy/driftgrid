<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriftGrid Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #ffffff;
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            text-align: center;
            padding: 0 2rem;
        }
        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #2563eb;
            border: 1px solid #2563eb;
            border-radius: 100px;
            padding: 6px 16px;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 56px;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 20px;
            font-weight: 400;
            color: #6b7280;
            line-height: 1.6;
            max-width: 560px;
            margin: 0 auto 40px;
        }
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            background: #111;
            border: none;
            border-radius: 8px;
            padding: 14px 28px;
            cursor: pointer;
            letter-spacing: 0.01em;
        }
        .cta-secondary {
            background: transparent;
            color: #111;
            border: 1px solid #e5e7eb;
            margin-left: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Welcome to DriftGrid</div>
        <h1 data-drift-editable="headline" data-drift-maxlen="60">Design iteration,<br>visualized</h1>
        <p class="subtitle" data-drift-editable="subtitle" data-drift-maxlen="120">Version everything. Compare anything. Present to clients. This is a demo project to help you explore the grid.</p>
        <div>
            <button class="cta" data-drift-editable="cta" data-drift-maxlen="30">Get Started</button>
            <button class="cta cta-secondary" data-drift-editable="cta2" data-drift-maxlen="30">Learn More</button>
        </div>
    </div>
</body>
</html>
