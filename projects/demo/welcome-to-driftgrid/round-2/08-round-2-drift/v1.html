<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DriftGrid — Drift to Round 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body {
    background: #0a0a0a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: rgba(255, 255, 255, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 88px 80px 80px;
  }

  /* Chrome with round counter */
  .chrome-label {
    position: fixed;
    top: 24px;
    right: 32px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .round-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 0.08em;
    position: relative;
    overflow: hidden;
    min-width: 28px;
    animation: roundFlip 13s ease-in-out infinite;
  }
  @keyframes roundFlip {
    0%, 22%    { color: rgba(255, 255, 255, 0.5); border-color: rgba(255, 255, 255, 0.2); transform: scale(1); }
    27%        { transform: scale(1.15); color: rgba(139, 92, 246, 0.95); border-color: rgba(139, 92, 246, 0.6); }
    32%, 94%   { transform: scale(1); color: rgba(139, 92, 246, 0.95); border-color: rgba(139, 92, 246, 0.6); }
    97%, 100%  { color: rgba(255, 255, 255, 0.5); border-color: rgba(255, 255, 255, 0.2); transform: scale(1); }
  }
  .round-number::before {
    content: 'R1';
    animation: roundText 13s ease-in-out infinite;
  }
  @keyframes roundText {
    0%, 24%    { content: 'R1'; }
    28%, 100%  { content: 'R2'; }
  }

  .chrome-zoom {
    position: fixed;
    bottom: 24px;
    left: 32px;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.25);
    text-transform: uppercase;
  }

  /* Hero */
  .hero {
    text-align: center;
    margin-bottom: 40px;
  }
  .hero h1 {
    font-size: 48px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 18px;
    color: rgba(255, 255, 255, 0.95);
  }
  .hero p {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 0.01em;
    line-height: 1.6;
  }

  /* Stage */
  .stage {
    position: relative;
    width: 1680px;
    height: 620px;
    margin: 0 auto;
  }

  /* Drift to R2 button — top of stage, appears early */
  .drift-btn {
    position: absolute;
    left: 50%;
    top: 40px;
    transform: translateX(-50%) translateY(-10px);
    padding: 13px 26px;
    background: rgba(139, 92, 246, 0.92);
    color: rgba(10, 10, 10, 0.95);
    border-radius: 6px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 12px 32px rgba(139, 92, 246, 0.3);
    opacity: 0;
    cursor: pointer;
    animation: driftBtn 13s ease-out infinite;
  }
  @keyframes driftBtn {
    0%, 6%     { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    12%        { opacity: 1; transform: translateX(-50%) translateY(0); }
    22%        { transform: translateX(-50%) translateY(0) scale(1); }
    24%        { transform: translateX(-50%) translateY(0) scale(0.96); box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4); }
    26%        { transform: translateX(-50%) translateY(0) scale(1); }
    34%, 94%   { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    100%       { opacity: 0; }
  }
  .drift-btn .arrow { font-size: 14px; line-height: 0.9; }

  /* Row of 5 cards */
  .row-container {
    position: absolute;
    left: 50%;
    top: 180px;
    transform: translateX(-50%);
    display: flex;
    gap: 56px;
  }
  .card {
    width: 220px;
    height: 124px;
    background: #141414;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 2px rgba(234, 179, 80, 0.35);
    flex-shrink: 0;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.03), transparent 60%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
  }
  .vlabel {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.35);
    font-weight: 500;
    z-index: 2;
    animation: vlabelSwap 13s ease-out infinite;
  }
  @keyframes vlabelSwap { 0%, 62% { content: attr(data-old); } 70%, 100% { content: attr(data-new); } }
  .vlabel::before {
    content: attr(data-label);
  }

  .card.dark-code::after {
    content: '';
    position: absolute;
    inset: 16px;
    background:
      linear-gradient(180deg, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 26px);
    border-radius: 3px;
  }
  .card.light-clean { background: #f5f5f5; }
  .card.light-clean::before { display: none; }
  .card.light-clean::after {
    content: '';
    position: absolute;
    left: 16px; right: 16px; top: 22px;
    height: 5px;
    background: #1a1a1a;
    border-radius: 1px;
    box-shadow: 0 13px 0 rgba(0,0,0,0.6), 0 26px 0 rgba(0,0,0,0.2);
  }
  .card.light-clean .vlabel { color: rgba(0,0,0,0.35); }
  .card.violet-bold {
    background: linear-gradient(135deg, #2a1757 0%, #0a0a0a 100%);
  }
  .card.violet-bold::after {
    content: '';
    position: absolute;
    inset: 18px;
    background: linear-gradient(180deg, rgba(139,92,246,0.4), transparent 60%);
    border-radius: 3px;
  }
  .card.new-concept { background: #1a1410; }
  .card.new-concept::after {
    content: '';
    position: absolute;
    inset: 14px 20px;
    background:
      linear-gradient(90deg, rgba(244, 232, 210, 0.85) 0%, rgba(244, 232, 210, 0.85) 62%, transparent 62%);
    background-size: 100% 12px;
    background-position: 0 0;
    background-repeat: no-repeat;
  }

  /* Comment badges (inherited state — already visible) */
  .comment-badge {
    position: absolute;
    top: -6px;
    left: -6px;
    min-width: 22px;
    height: 22px;
    padding: 0 6px;
    border-radius: 11px;
    background: rgba(34, 211, 238, 0.95);
    color: rgba(10, 10, 10, 0.95);
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    box-shadow: 0 4px 14px rgba(34, 211, 238, 0.4);
    z-index: 5;
    animation: badgeFade 13s ease-out infinite;
  }
  .comment-badge::before { content: '💬'; font-size: 10px; }
  @keyframes badgeFade {
    0%, 52%   { opacity: 1; transform: scale(1); }
    58%       { opacity: 1; transform: scale(1.1); filter: brightness(1.3); }
    65%, 75%  { opacity: 0; transform: scale(0.8); filter: brightness(1); }
    78%, 94%  { opacity: 0; }
    97%, 100% { opacity: 1; transform: scale(1); }
  }
  .card-star {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 16px;
    height: 16px;
    z-index: 4;
  }
  .card-star svg { width: 100%; height: 100%; fill: #facc15; stroke: #facc15; }

  /* Generating overlay on each card (parallel agent work) */
  .gen-overlay {
    position: absolute;
    inset: 0;
    opacity: 0;
    z-index: 6;
    background:
      linear-gradient(180deg, rgba(139, 92, 246, 0.08) 0%, rgba(10, 10, 10, 0.3) 100%);
    border-radius: 8px;
    overflow: hidden;
    animation: genShow 13s ease-in-out infinite;
  }
  @keyframes genShow {
    0%, 42%   { opacity: 0; }
    48%, 66%  { opacity: 1; }
    72%, 100% { opacity: 0; }
  }
  .gen-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(139, 92, 246, 0.2) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139, 92, 246, 0.2) 1px, transparent 1px);
    background-size: 18px 18px;
    animation: gridDrift 2s linear infinite;
    mask-image: radial-gradient(ellipse at center, black 40%, transparent 85%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 85%);
  }
  @keyframes gridDrift { to { background-position: 18px 18px; } }
  .gen-overlay::after {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.95), transparent);
    box-shadow: 0 0 10px rgba(139, 92, 246, 0.7);
    animation: scanSweep 13s ease-in-out infinite;
  }
  @keyframes scanSweep {
    0%, 44%   { top: 0; opacity: 0; }
    50%       { top: 0; opacity: 1; }
    64%       { top: 100%; opacity: 1; }
    68%, 100% { top: 0; opacity: 0; }
  }
  .gen-spinner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 18px;
    height: 18px;
    border: 2px solid rgba(139, 92, 246, 0.25);
    border-top-color: rgba(139, 92, 246, 0.95);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

  /* Send all button — appears after drift button is clicked */
  .send-all-btn {
    position: absolute;
    left: 50%;
    top: 442px;
    transform: translateX(-50%) translateY(20px);
    padding: 14px 32px;
    background: rgba(255, 255, 255, 0.92);
    color: rgba(10, 10, 10, 0.95);
    border-radius: 6px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 12px 32px rgba(255, 255, 255, 0.08);
    opacity: 0;
    cursor: pointer;
    animation: sendBtnIn 13s ease-out infinite;
  }
  @keyframes sendBtnIn {
    0%, 32%    { opacity: 0; transform: translateX(-50%) translateY(20px); }
    38%        { opacity: 1; transform: translateX(-50%) translateY(0); }
    42%        { transform: translateX(-50%) translateY(0) scale(1); }
    44%        { transform: translateX(-50%) translateY(0) scale(0.96); box-shadow: 0 4px 16px rgba(255, 255, 255, 0.15); }
    46%        { transform: translateX(-50%) translateY(0) scale(1); }
    52%, 94%   { opacity: 0; transform: translateX(-50%) translateY(20px); }
    100%       { opacity: 0; }
  }
  .send-all-btn .icon {
    width: 12px;
    height: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .send-count {
    font-size: 10px;
    padding: 2px 7px;
    background: rgba(10, 10, 10, 0.12);
    border-radius: 3px;
    margin-left: 4px;
  }

  /* Done confirmation */
  .done-conf {
    position: absolute;
    left: 50%;
    top: 442px;
    transform: translateX(-50%);
    padding: 13px 26px;
    background: rgba(74, 222, 128, 0.12);
    border: 1px solid rgba(74, 222, 128, 0.4);
    color: rgba(140, 235, 180, 0.95);
    border-radius: 6px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: doneIn 13s ease-out infinite;
  }
  @keyframes doneIn {
    0%, 74%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
    80%, 94%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    97%, 100% { opacity: 0; }
  }
  .done-conf .check-circle {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: rgba(74, 222, 128, 0.9);
    color: #0a0a0a;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
  }

</style>
</head>
<body>
  <div class="chrome-label">
    demo-project
    <span class="round-badge"><span class="round-number"></span></span>
  </div>
  <div class="chrome-zoom">selects · 5 starred</div>

  <div class="hero">
    <h1 data-drift-editable>Drift to Round 2</h1>
    <p data-drift-editable>Send every comment to your agent. All concepts drift in parallel.</p>
  </div>

  <div class="stage">

    <!-- Drift to Round 2 button -->
    <div class="drift-btn">
      Drift to Round 2
      <span class="arrow">→</span>
    </div>

    <!-- Row of 5 starred cards with comment badges (inherited from slide 6) -->
    <div class="row-container">
      <div class="card dark-code">
        <span class="vlabel">v4</span>
        <div class="card-star"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg></div>
        <div class="comment-badge">1</div>
        <div class="gen-overlay"><div class="gen-spinner"></div></div>
      </div>
      <div class="card dark-code">
        <span class="vlabel">v3</span>
        <div class="card-star"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg></div>
      </div>
      <div class="card light-clean">
        <span class="vlabel">v2</span>
        <div class="card-star"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg></div>
      </div>
      <div class="card violet-bold">
        <span class="vlabel">v4</span>
        <div class="card-star"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg></div>
        <div class="comment-badge">1</div>
        <div class="gen-overlay"><div class="gen-spinner"></div></div>
      </div>
      <div class="card new-concept">
        <span class="vlabel">v1</span>
        <div class="card-star"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg></div>
      </div>
    </div>

    <!-- Send all comments button -->
    <div class="send-all-btn">
      <span class="icon">↗</span>
      Send all comments
      <span class="send-count">2</span>
    </div>

    <!-- Done confirmation -->
    <div class="done-conf">
      <span class="check-circle">✓</span>
      2 concepts drifted in R2
    </div>

  </div>
</body>
</html>
