<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DriftGrid — Star, Present, Share</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body {
    background: #0a0a0a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: rgba(255, 255, 255, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 88px 80px 80px;
  }

  .chrome-label {
    position: fixed;
    top: 24px;
    right: 32px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
  }
  .chrome-zoom {
    position: fixed;
    bottom: 24px;
    left: 32px;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.25);
    text-transform: uppercase;
  }

  /* Hero */
  .hero {
    text-align: center;
    margin-bottom: 40px;
  }
  .hero h1 {
    font-size: 48px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 18px;
    color: rgba(255, 255, 255, 0.95);
  }
  .hero p {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 0.01em;
    line-height: 1.6;
  }

  /* Stage — fixed size container for absolute-positioned cards */
  .stage {
    position: relative;
    width: 1680px;
    height: 620px;
    margin: 0 auto;
  }

  /* Column labels — positioned absolutely above the first card in each column */
  .col-label {
    position: absolute;
    font-size: 10px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    white-space: nowrap;
    opacity: 1;
    animation: labelFade 13s ease-out infinite;
  }
  @keyframes labelFade {
    0%, 22%   { opacity: 1; }
    32%, 100% { opacity: 0; }
  }

  /* Card slot — absolute positioned wrapper */
  .card-slot {
    position: absolute;
    width: 220px;
    height: 124px;
    transition: none;
  }

  /* Card inner — the visual */
  .card {
    width: 100%;
    height: 100%;
    background: #141414;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.03), transparent 60%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
  }
  .vlabel {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.35);
    font-weight: 500;
    z-index: 2;
  }

  /* Column themes */
  .card.dark-code::after {
    content: '';
    position: absolute;
    inset: 18px;
    background:
      linear-gradient(180deg, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 28px);
    border-radius: 4px;
  }
  .card.light-clean { background: #f5f5f5; }
  .card.light-clean::before { display: none; }
  .card.light-clean::after {
    content: '';
    position: absolute;
    left: 18px; right: 18px; top: 24px;
    height: 6px;
    background: #1a1a1a;
    border-radius: 2px;
    box-shadow: 0 14px 0 rgba(0,0,0,0.6), 0 28px 0 rgba(0,0,0,0.2);
  }
  .card.light-clean .vlabel { color: rgba(0,0,0,0.35); }
  .card.violet-bold {
    background: linear-gradient(135deg, #2a1757 0%, #0a0a0a 100%);
  }
  .card.violet-bold::after {
    content: '';
    position: absolute;
    inset: 20px;
    background: linear-gradient(180deg, rgba(139,92,246,0.4), transparent 60%);
    border-radius: 4px;
  }
  .card.warm-editorial { background: #1a1410; }
  .card.warm-editorial::after {
    content: '';
    position: absolute;
    left: 18px; right: 18px; top: 30px;
    height: 7px;
    background: rgba(234, 179, 80, 0.4);
    border-radius: 2px;
    box-shadow: 0 16px 0 rgba(255,255,255,0.08), 0 30px 0 rgba(255,255,255,0.06);
  }
  .card.new-concept { background: #1a1410; }
  .card.new-concept::after {
    content: '';
    position: absolute;
    inset: 16px 22px;
    background:
      linear-gradient(90deg, rgba(244, 232, 210, 0.85) 0%, rgba(244, 232, 210, 0.85) 62%, transparent 62%),
      linear-gradient(0deg, rgba(234, 179, 80, 0.5) 0px, rgba(234, 179, 80, 0.5) 4px, transparent 4px);
    background-size: 100% 14px, 100% 100%;
    background-position: 0 0, 0 100%;
    background-repeat: no-repeat;
    border-radius: 2px;
  }

  /* Star icon — appears on starred cards */
  .star {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 20px;
    height: 20px;
    opacity: 0;
    z-index: 5;
    pointer-events: none;
    animation: starAppear 13s ease-out infinite;
    filter: drop-shadow(0 0 6px rgba(234, 179, 80, 0.8));
  }
  .star svg { width: 100%; height: 100%; fill: #facc15; stroke: #facc15; }

  @keyframes starAppear {
    0%, 10%   { opacity: 0; transform: scale(0.2); }
    14%       { opacity: 1; transform: scale(1.3); }
    18%, 94%  { opacity: 1; transform: scale(1); }
    96%, 100% { opacity: 0; transform: scale(0.2); }
  }
  .star-2 { animation-delay: 0.1s; }
  .star-3 { animation-delay: 0.2s; }
  .star-4 { animation-delay: 0.3s; }
  .star-5 { animation-delay: 0.4s; }

  /* Starred card slot — gold outline + move to row */
  .card-slot.starred .card {
    box-shadow: 0 0 0 2px rgba(234, 179, 80, 0.6), 0 8px 24px rgba(234, 179, 80, 0.12);
    animation: starredGlow 13s ease-out infinite;
  }
  @keyframes starredGlow {
    0%, 10%   { box-shadow: 0 0 0 0px rgba(234, 179, 80, 0), 0 0 0 rgba(234, 179, 80, 0); }
    18%, 94%  { box-shadow: 0 0 0 2px rgba(234, 179, 80, 0.6), 0 8px 24px rgba(234, 179, 80, 0.12); }
    96%, 100% { box-shadow: 0 0 0 0px rgba(234, 179, 80, 0), 0 0 0 rgba(234, 179, 80, 0); }
  }

  /* Starred cards use a single shared move animation with per-element --dx/--dy.
     Cards that also participate in the swap demo use --dx2/--dy2 for the second position. */
  .card-slot.starred {
    animation: moveToRow 13s cubic-bezier(0.22, 1, 0.36, 1) infinite;
  }
  @keyframes moveToRow {
    0%, 30%    { transform: translate(0, 0); }
    46%, 65%   { transform: translate(var(--dx), var(--dy)); }
    72%, 94%   { transform: translate(var(--dx2, var(--dx)), var(--dy2, var(--dy))); }
    97%, 100%  { transform: translate(0, 0); }
  }

  /* Non-starred cards drop away */
  .card-slot.drop {
    animation: dropAway 13s ease-in infinite;
  }
  @keyframes dropAway {
    0%, 24%    { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    36%, 94%   { opacity: 0; transform: translateY(60px) scale(0.92); filter: blur(4px); }
    97%, 100%  { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  /* Action bar — PRESENT + SHARE buttons below the row */
  .action-bar {
    position: absolute;
    left: 50%;
    top: 432px;
    transform: translateX(-50%) translateY(20px);
    display: flex;
    gap: 16px;
    opacity: 0;
    animation: actionBarAppear 13s ease-out infinite;
  }
  @keyframes actionBarAppear {
    0%, 52%    { opacity: 0; transform: translateX(-50%) translateY(20px); }
    62%, 94%   { opacity: 1; transform: translateX(-50%) translateY(0); }
    97%, 100%  { opacity: 0; transform: translateX(-50%) translateY(20px); }
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
  }
  .btn-primary {
    background: rgba(255, 255, 255, 0.92);
    color: rgba(10, 10, 10, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.92);
    box-shadow: 0 10px 30px rgba(255, 255, 255, 0.06);
  }
  .btn-primary .icon {
    width: 12px;
    height: 12px;
    border-left: 7px solid rgba(10, 10, 10, 0.95);
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-right: none;
  }
  .btn-secondary {
    background: transparent;
    color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.25);
  }
  .btn-secondary .icon {
    width: 12px;
    height: 12px;
    font-size: 14px;
    line-height: 0.9;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.85);
  }
  .btn .kbd {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.08em;
    background: rgba(0, 0, 0, 0.08);
    color: inherit;
    opacity: 0.55;
    border: 1px solid currentColor;
  }
  .btn-primary .kbd { border-color: rgba(10, 10, 10, 0.3); }
  .btn-secondary .kbd { border-color: rgba(255, 255, 255, 0.25); }

  /* Count label above the row */
  .count-label {
    position: absolute;
    left: 50%;
    top: 204px;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(234, 179, 80, 0.85);
    font-weight: 500;
    opacity: 0;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    animation: countAppear 13s ease-out infinite;
  }
  .count-kbd {
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .count-kbd .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border: 1px solid rgba(234, 179, 80, 0.4);
    background: rgba(234, 179, 80, 0.08);
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
    color: rgba(234, 179, 80, 0.95);
    letter-spacing: 0;
  }
  .count-divider {
    opacity: 0.35;
  }
  @keyframes countAppear {
    0%, 44%    { opacity: 0; }
    54%, 94%   { opacity: 1; }
    97%, 100%  { opacity: 0; }
  }
</style>
</head>
<body>
  <div class="chrome-label">demo-project · R1</div>
  <div class="chrome-zoom">overview · 25%</div>

  <div class="hero">
    <h1 data-drift-editable>Star your picks</h1>
    <p data-drift-editable>Mark the winners across concepts. Present or share them as a set.</p>
  </div>

  <div class="stage">

    <!-- Column labels -->
    <div class="col-label" style="left: 80px;  top: 0;">Dark Code</div>
    <div class="col-label" style="left: 400px; top: 0;">Light Clean</div>
    <div class="col-label" style="left: 720px; top: 0;">Violet Bold</div>
    <div class="col-label" style="left: 1040px; top: 0;">Warm Editorial</div>
    <div class="col-label" style="left: 1360px; top: 0;">New Concept</div>

    <!-- ─────── COLUMN 1: Dark Code (2 starred — multi-star per concept) ─────── -->
    <div class="card-slot starred" style="left: 80px; top: 20px; --dx: 98px; --dy: 228px; --dx2: 98px; --dy2: 228px;">
      <div class="card dark-code">
        <span class="vlabel">v4</span>
      </div>
      <div class="star"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg></div>
    </div>
    <div class="card-slot starred" style="left: 80px; top: 160px; --dx: 374px; --dy: 88px; --dx2: 650px; --dy2: 88px;">
      <div class="card dark-code">
        <span class="vlabel">v3</span>
      </div>
      <div class="star star-5"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg></div>
    </div>
    <div class="card-slot drop" style="left: 80px; top: 300px;">
      <div class="card dark-code"><span class="vlabel">v2</span></div>
    </div>
    <div class="card-slot drop" style="left: 80px; top: 440px;">
      <div class="card dark-code"><span class="vlabel">v1</span></div>
    </div>

    <!-- ─────── COLUMN 2: Light Clean ─────── -->
    <div class="card-slot drop" style="left: 400px; top: 20px;">
      <div class="card light-clean"><span class="vlabel">v3</span></div>
    </div>
    <div class="card-slot starred" style="left: 400px; top: 160px; --dx: 330px; --dy: 88px; --dx2: 54px; --dy2: 88px;">
      <div class="card light-clean">
        <span class="vlabel">v2</span>
      </div>
      <div class="star star-2"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg></div>
    </div>
    <div class="card-slot drop" style="left: 400px; top: 300px;">
      <div class="card light-clean"><span class="vlabel">v1</span></div>
    </div>

    <!-- ─────── COLUMN 3: Violet Bold ─────── -->
    <div class="card-slot starred" style="left: 720px; top: 20px; --dx: 286px; --dy: 228px; --dx2: 286px; --dy2: 228px;">
      <div class="card violet-bold">
        <span class="vlabel">v4</span>
      </div>
      <div class="star star-3"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg></div>
    </div>
    <div class="card-slot drop" style="left: 720px; top: 160px;">
      <div class="card violet-bold"><span class="vlabel">v3</span></div>
    </div>
    <div class="card-slot drop" style="left: 720px; top: 300px;">
      <div class="card violet-bold"><span class="vlabel">v2</span></div>
    </div>
    <div class="card-slot drop" style="left: 720px; top: 440px;">
      <div class="card violet-bold"><span class="vlabel">v1</span></div>
    </div>

    <!-- ─────── COLUMN 4: Warm Editorial ─────── -->
    <div class="card-slot drop" style="left: 1040px; top: 20px;">
      <div class="card warm-editorial"><span class="vlabel">v3</span></div>
    </div>
    <div class="card-slot drop" style="left: 1040px; top: 160px;">
      <div class="card warm-editorial"><span class="vlabel">v2</span></div>
    </div>
    <div class="card-slot drop" style="left: 1040px; top: 300px;">
      <div class="card warm-editorial"><span class="vlabel">v1</span></div>
    </div>

    <!-- ─────── COLUMN 5: New Concept ─────── -->
    <div class="card-slot starred" style="left: 1360px; top: 20px; --dx: -78px; --dy: 228px; --dx2: -78px; --dy2: 228px;">
      <div class="card new-concept">
        <span class="vlabel">v1</span>
      </div>
      <div class="star star-4"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg></div>
    </div>

    <!-- Count label (appears with row) -->
    <div class="count-label">
      <span class="count-kbd"><span class="kbd">⌥</span><span class="kbd">←</span><span class="kbd">→</span></span>
      reorder
      <span class="count-divider">·</span>
      ★ 5 selected
    </div>

    <!-- Action bar -->
    <div class="action-bar">
      <button class="btn btn-primary">
        <span class="icon"></span>
        <span>Present</span>
        <span class="kbd">P</span>
      </button>
      <button class="btn btn-secondary">
        <span class="icon">↗</span>
        <span>Share</span>
      </button>
    </div>

  </div>
</body>
</html>
