<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DriftGrid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body {
    background: #0a0a0a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: rgba(255, 255, 255, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px;
    position: relative;
  }

  /* Subtle grid backdrop */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 0.5px, transparent 0.5px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 0.5px, transparent 0.5px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, black 10%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 10%, transparent 70%);
    pointer-events: none;
  }

  /* Main stack — stable, no fade (thumbnail-safe) */
  .stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    z-index: 2;
  }

  /* Logo mark — BIG version */
  .logo-mark {
    width: 140px;
    height: 140px;
    display: block;
    filter: drop-shadow(0 20px 40px rgba(139, 92, 246, 0.2));
  }
  .logo-mark rect {
    transform-origin: center;
  }
  .logo-mark .cell {
    fill: rgba(255, 255, 255, 0.85);
  }
  .logo-mark .cell-drift {
    fill: #8b5cf6;
    animation: driftPulse 3.6s ease-in-out infinite;
  }
  @keyframes driftPulse {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(1.5px, -1.5px); }
  }

  .wordmark {
    font-size: 58px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: rgba(255, 255, 255, 0.96);
    line-height: 1;
  }
  .wordmark .drift { color: rgba(255, 255, 255, 0.96); }
  .wordmark .grid { color: rgba(255, 255, 255, 0.55); }

  .tagline {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.5);
    line-height: 1.5;
    text-align: center;
    max-width: 540px;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: rgba(255, 255, 255, 0.12);
    margin: 12px 0;
  }

  /* Terminal command CTA — the one action: copy the install command */
  .terminal-cta {
    display: flex;
    align-items: center;
    background: #0e0e0e;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 8px;
    padding: 15px 14px 15px 22px;
    gap: 20px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 15px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.06);
    min-width: 440px;
    margin-top: 8px;
    cursor: pointer;
    position: relative;
    animation: ctaBreathe 4.2s ease-in-out infinite;
  }
  @keyframes ctaBreathe {
    0%, 100% { box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.06); }
    50%      { box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.22), 0 0 24px rgba(139, 92, 246, 0.12); }
  }
  .terminal-cta .sigil {
    color: rgba(139, 92, 246, 0.95);
    font-weight: 700;
    margin-right: 2px;
  }
  .terminal-cta .cmd {
    flex: 1;
    color: rgba(255, 255, 255, 0.96);
    font-weight: 500;
    letter-spacing: 0.005em;
    white-space: nowrap;
  }
  .terminal-cta .cmd-cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: rgba(198, 175, 255, 0.9);
    margin-left: 4px;
    vertical-align: text-top;
    animation: ctaBlink 1s steps(2) infinite;
  }
  @keyframes ctaBlink {
    to { opacity: 0; }
  }
  .terminal-cta .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 13px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 4px;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    flex-shrink: 0;
  }
  .terminal-cta .copy-icon {
    width: 11px;
    height: 11px;
    display: inline-block;
    border: 1.2px solid currentColor;
    border-radius: 2px;
    position: relative;
  }
  .terminal-cta .copy-icon::before {
    content: '';
    position: absolute;
    top: -3px;
    left: 2px;
    width: 11px;
    height: 11px;
    border: 1.2px solid currentColor;
    border-radius: 2px;
    background: #0e0e0e;
  }

  /* Bottom meta */
  .meta {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255, 255, 255, 0.22);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .meta .bullet {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
  }
</style>
</head>
<body>
  <div class="stack">
    <svg class="logo-mark" viewBox="0 0 32 32" fill="none">
      <rect class="cell"       x="3"    y="3"    width="11" height="11" rx="1.5"/>
      <rect class="cell-drift" x="19.5" y="1.5"  width="11" height="11" rx="1.5"/>
      <rect class="cell"       x="3"    y="18"   width="11" height="11" rx="1.5"/>
      <rect class="cell"       x="18"   y="18"   width="11" height="11" rx="1.5"/>
    </svg>

    <div class="wordmark">
      <span class="drift">drift</span><span class="grid">grid</span>
    </div>

    <div class="tagline">
      Rapid design iteration for you and your agent.
    </div>

    <div class="divider"></div>

    <div class="terminal-cta">
      <span class="sigil">$</span>
      <span class="cmd">npx driftgrid init<span class="cmd-cursor"></span></span>
      <span class="copy-btn"><span class="copy-icon"></span>copy</span>
    </div>
  </div>

  <div class="meta">
    <span>open source</span>
    <span class="bullet"></span>
    <span>mit license</span>
    <span class="bullet"></span>
    <span>byo agent</span>
    <span class="bullet"></span>
    <span>github →</span>
  </div>
</body>
</html>
