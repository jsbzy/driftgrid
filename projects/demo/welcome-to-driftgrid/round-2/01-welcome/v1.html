<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DriftGrid — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body {
    background: #0a0a0a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: rgba(255, 255, 255, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 96px 120px 80px;
  }

  /* Chrome */
  .chrome-label {
    position: fixed;
    top: 24px;
    right: 32px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
  }
  .chrome-zoom {
    position: fixed;
    bottom: 24px;
    left: 32px;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.25);
    text-transform: uppercase;
  }

  /* DriftGrid logo (top-left) */
  .brand {
    position: fixed;
    top: 24px;
    left: 32px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
  .brand-wordmark {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: rgba(255, 255, 255, 0.6);
    text-transform: lowercase;
  }

  /* Hero copy */
  .hero {
    text-align: center;
    margin-bottom: 72px;
  }
  .hero .tagline {
    display: block;
    font-size: 17px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.72);
    line-height: 1.55;
    letter-spacing: 0.005em;
    max-width: none;
    margin: 22px auto 0;
    white-space: nowrap;
  }
  .hero h1 {
    font-size: 48px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 20px;
    color: rgba(255, 255, 255, 0.95);
  }
  .hero p {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 0.01em;
    line-height: 1.7;
    display: flex;
    gap: 14px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .hero p .sentence { display: inline-flex; align-items: center; gap: 8px; }
  .hero p .sentence + .sentence { margin-left: 12px; }
  .hero p .kbd-inline {
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .hero p .kbd-inline .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 22px;
    padding: 0 7px;
    border: 1px solid rgba(139, 92, 246, 0.45);
    background: rgba(139, 92, 246, 0.1);
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    color: rgba(198, 175, 255, 0.95);
  }

  /* Stage */
  .stage {
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  .grid {
    display: flex;
    gap: 44px;
    align-items: flex-start;
  }
  .column {
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
  }
  .column-label {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
    white-space: nowrap;
  }
  .card {
    position: relative;
    width: 220px;
    height: 124px;
    background: #141414;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.03), transparent 60%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
  }
  .card .vlabel {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.3);
    font-weight: 500;
  }

  /* Column themes */
  .col-1 .card::after {
    content: '';
    position: absolute;
    inset: 18px;
    background:
      linear-gradient(180deg, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 28px);
    border-radius: 4px;
  }
  .col-2 .card { background: #f5f5f5; }
  .col-2 .card::before { display: none; }
  .col-2 .card::after {
    content: '';
    position: absolute;
    left: 18px; right: 18px; top: 24px;
    height: 6px;
    background: #1a1a1a;
    border-radius: 2px;
    box-shadow:
      0 14px 0 rgba(0,0,0,0.6),
      0 28px 0 rgba(0,0,0,0.2);
  }
  .col-2 .card .vlabel { color: rgba(0,0,0,0.35); }
  .col-3 .card {
    background: linear-gradient(135deg, #2a1757 0%, #0a0a0a 100%);
  }
  .col-3 .card::after {
    content: '';
    position: absolute;
    inset: 20px;
    background: linear-gradient(180deg, rgba(139,92,246,0.35), transparent 60%);
    border-radius: 4px;
  }
  .col-4 .card {
    background: #1a1410;
  }
  .col-4 .card::after {
    content: '';
    position: absolute;
    left: 18px; right: 18px; top: 30px;
    height: 7px;
    background: rgba(234, 179, 80, 0.4);
    border-radius: 2px;
    box-shadow:
      0 15px 0 rgba(255,255,255,0.08),
      0 28px 0 rgba(255,255,255,0.06);
  }

  /* NEW DRIFTED CARD — animates in at top of col-1 */
  .card.new-drift {
    width: 220px;
    border: 1.5px dashed rgba(139, 92, 246, 0.7);
    background: rgba(139, 92, 246, 0.04);
    transform-origin: bottom center;
    animation: driftIn 13s ease-out infinite;
    opacity: 0;
  }
  .card.new-drift::before { display: none; }
  .card.new-drift::after {
    /* Start invisible, then fill in after the slide-in */
    content: '';
    position: absolute;
    inset: 18px;
    background:
      linear-gradient(180deg, rgba(139, 92, 246, 0.25) 0%, transparent 50%),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0 2px, transparent 2px 28px);
    border-radius: 4px;
    opacity: 0;
    animation: driftFill 13s ease-out infinite;
  }
  .card.new-drift .vlabel {
    opacity: 0;
    color: rgba(139, 92, 246, 0.8);
    animation: driftFill 13s ease-out infinite;
  }

  /* Static preview: add .static to body to freeze at hold state for review screenshots */
  body.static .card.new-drift,
  body.static .col-new .card.empty { opacity: 1 !important; animation: none !important; transform: none !important; }
  body.static .new-col-slot { width: 220px !important; margin-left: 0 !important; animation: none !important; }
  body.static .new-col-slot .col-new { opacity: 1 !important; animation: none !important; }
  body.static .card.new-drift { border-style: solid !important; border-color: rgba(255,255,255,0.08) !important; background: #141414 !important; }
  body.static .card.new-drift::after { opacity: 1 !important; animation: none !important; }
  body.static .card.new-drift .vlabel { opacity: 1 !important; animation: none !important; }

  /* "new version" / "new concept" tags — persist through both empty and filled states */
  .new-tag {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 3px;
    white-space: nowrap;
    z-index: 5;
  }
  .card.new-drift .new-tag {
    background: rgba(139, 92, 246, 0.2);
    border: 1px solid rgba(139, 92, 246, 0.45);
    color: rgba(210, 190, 255, 0.96);
  }
  .col-new .card.empty .new-tag {
    background: rgba(74, 222, 128, 0.16);
    border: 1px solid rgba(74, 222, 128, 0.42);
    color: rgba(150, 240, 185, 0.96);
  }

  /* Col-1 cards push-down: stack slides down first to make room at the top */
  .col-1 .card-stack {
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: stackPush 13s ease-out infinite;
  }
  @keyframes stackPush {
    0%, 6%     { transform: translateY(-140px); }  /* before drift — stack is packed at top */
    14%, 100%  { transform: translateY(0); }       /* after drift — stack sits below new card */
  }

  /* Drift-up animation: card grows upward from its bottom edge (like drift-right grows sideways) */
  @keyframes driftIn {
    0%, 13%   { opacity: 0; transform: scaleY(0); border-style: dashed; border-color: rgba(139, 92, 246, 0.7); background: rgba(139, 92, 246, 0.04); }
    15%       { opacity: 1; transform: scaleY(0.1); border-style: dashed; border-color: rgba(139, 92, 246, 0.7); background: rgba(139, 92, 246, 0.04); }
    20%       { opacity: 1; transform: scaleY(1); border-style: dashed; border-color: rgba(139, 92, 246, 0.7); background: rgba(139, 92, 246, 0.04); }
    28%       { opacity: 1; transform: scaleY(1); border-style: dashed; border-color: rgba(139, 92, 246, 0.7); background: rgba(139, 92, 246, 0.04); }
    32%       { opacity: 1; transform: scaleY(1); border-style: solid; border-color: rgba(255, 255, 255, 0.08); background: #141414; }
    92%       { opacity: 1; transform: scaleY(1); border-style: solid; border-color: rgba(255, 255, 255, 0.08); background: #141414; }
    96%, 100% { opacity: 0; transform: scaleY(0); }
  }
  @keyframes driftFill {
    0%, 26%  { opacity: 0; }
    34%      { opacity: 1; }
    92%      { opacity: 1; }
    96%, 100% { opacity: 0; }
  }

  /* NEW BRANCHED COLUMN SLOT — collapses cleanly when hidden */
  .new-col-slot {
    position: relative;
    width: 0;
    margin-left: -44px;  /* cancel the flex gap while hidden */
    overflow: visible;
    animation: branchSlot 13s ease-out infinite;
  }
  @keyframes branchSlot {
    0%, 35%     { width: 0; margin-left: -44px; }
    44%, 92%    { width: 220px; margin-left: 0; }
    96%, 100%   { width: 0; margin-left: -44px; }
  }
  .new-col-slot .col-new {
    width: 220px;
    opacity: 0;
    animation: branchOpacity 13s ease-out infinite;
  }
  @keyframes branchOpacity {
    0%, 38%     { opacity: 0; }
    48%, 92%    { opacity: 1; }
    96%, 100%   { opacity: 0; }
  }
  .col-new .card {
    background: #111a14;
  }
  .col-new .card::after {
    content: '';
    position: absolute;
    inset: 18px;
    background:
      linear-gradient(180deg, rgba(74, 222, 128, 0.22) 0%, transparent 50%),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0 2px, transparent 2px 28px);
    border-radius: 4px;
    opacity: 0;
    animation: branchContentFill 13s ease-out infinite;
  }
  @keyframes branchContentFill {
    0%, 55%     { opacity: 0; }
    63%, 92%    { opacity: 1; }
    96%, 100%   { opacity: 0; }
  }
  .col-new .card.empty {
    border: 1.5px dashed rgba(74, 222, 128, 0.7);
    background: rgba(74, 222, 128, 0.04);
    animation: branchCardMorph 13s ease-out infinite;
  }
  @keyframes branchCardMorph {
    0%, 48%     { border-style: dashed; border-color: rgba(74, 222, 128, 0.7); background: rgba(74, 222, 128, 0.04); }
    58%         { border-style: dashed; border-color: rgba(74, 222, 128, 0.7); background: rgba(74, 222, 128, 0.04); }
    64%, 92%    { border-style: solid; border-color: rgba(255, 255, 255, 0.08); background: #111a14; }
    96%, 100%   { border-style: dashed; border-color: rgba(74, 222, 128, 0.7); background: rgba(74, 222, 128, 0.04); }
  }

  /* Action hints */
  .hint {
    position: absolute;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    color: rgba(139, 92, 246, 0.85);
    opacity: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hint .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border: 1px solid rgba(139, 92, 246, 0.5);
    background: rgba(139, 92, 246, 0.08);
    border-radius: 4px;
    font-size: 10px;
    color: rgba(139, 92, 246, 0.95);
  }
  .hint-drift {
    top: -36px;
    left: 50%;
    transform: translateX(-50%);
    animation: hintDrift 13s ease-out infinite;
  }
  .hint-branch {
    top: -36px;
    left: 110px;  /* fixed offset — half of the final column width */
    transform: translateX(-50%);
    color: rgba(74, 222, 128, 0.9);
    animation: hintBranch 13s ease-out infinite;
    white-space: nowrap;
  }
  .hint-branch .kbd {
    border-color: rgba(74, 222, 128, 0.5);
    background: rgba(74, 222, 128, 0.08);
    color: rgba(74, 222, 128, 0.95);
  }
  @keyframes hintDrift {
    0%, 3%    { opacity: 0; }
    7%, 18%   { opacity: 1; }
    24%, 100% { opacity: 0; }
  }
  @keyframes hintBranch {
    0%, 30%   { opacity: 0; }
    36%, 48%  { opacity: 1; }
    54%, 100% { opacity: 0; }
  }
</style>
</head>
<body>
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 32 32" fill="none">
      <rect x="3" y="3" width="11" height="11" rx="1.5" fill="rgba(255,255,255,0.45)"/>
      <rect x="19.5" y="1.5" width="11" height="11" rx="1.5" fill="#8b5cf6"/>
      <rect x="3" y="18" width="11" height="11" rx="1.5" fill="rgba(255,255,255,0.45)"/>
      <rect x="18" y="18" width="11" height="11" rx="1.5" fill="rgba(255,255,255,0.45)"/>
    </svg>
    <span class="brand-wordmark">driftgrid</span>
  </div>
  <div class="chrome-label">demo-project · R1</div>
  <div class="chrome-zoom">overview · 25%</div>

  <div class="hero">
    <h1 data-drift-editable>Welcome to DriftGrid</h1>
    <p class="tagline" data-drift-editable>Iterate, organize, and share your designs — together with your agent.</p>
  </div>

  <div class="stage">
    <div class="grid">
      <div class="column col-1">
        <div class="column-label">Dark Code</div>
        <div class="hint hint-drift"><span class="kbd">D</span> drift up</div>
        <div class="card new-drift"><span class="new-tag">new version</span><span class="vlabel">v4</span></div>
        <div class="card-stack">
          <div class="card"><span class="vlabel">v3</span></div>
          <div class="card"><span class="vlabel">v2</span></div>
          <div class="card"><span class="vlabel">v1</span></div>
        </div>
      </div>
      <div class="column col-2">
        <div class="column-label">Light Clean</div>
        <div class="card"><span class="vlabel">v3</span></div>
        <div class="card"><span class="vlabel">v2</span></div>
        <div class="card"><span class="vlabel">v1</span></div>
      </div>
      <div class="column col-3">
        <div class="column-label">Violet Bold</div>
        <div class="card"><span class="vlabel">v4</span></div>
        <div class="card"><span class="vlabel">v3</span></div>
        <div class="card"><span class="vlabel">v2</span></div>
        <div class="card"><span class="vlabel">v1</span></div>
      </div>
      <div class="column col-4">
        <div class="column-label">Warm Editorial</div>
        <div class="card"><span class="vlabel">v3</span></div>
        <div class="card"><span class="vlabel">v2</span></div>
        <div class="card"><span class="vlabel">v1</span></div>
      </div>
      <div class="new-col-slot">
        <div class="hint hint-branch"><span class="kbd">⇧</span><span class="kbd">D</span> drift right</div>
        <div class="column col-new">
          <div class="column-label">New Concept</div>
          <div class="card empty"><span class="new-tag">new concept</span><span class="vlabel">v1</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
