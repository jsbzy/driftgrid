<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DriftGrid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body {
    background: #0a0a0a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: rgba(255, 255, 255, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px;
    position: relative;
  }

  /* Subtle grid backdrop */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 0.5px, transparent 0.5px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 0.5px, transparent 0.5px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, black 10%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 10%, transparent 70%);
    pointer-events: none;
  }

  /* Main stack — stable, no fade so thumbnail captures cleanly */
  .stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    z-index: 2;
  }

  /* Logo mark — BIG version */
  .logo-mark {
    width: 140px;
    height: 140px;
    display: block;
    filter: drop-shadow(0 20px 40px rgba(139, 92, 246, 0.2));
  }
  .logo-mark rect { transform-origin: center; }
  .logo-mark .cell { fill: rgba(255, 255, 255, 0.85); }
  .logo-mark .cell-drift {
    fill: #8b5cf6;
    animation: driftPulse 3.6s ease-in-out infinite;
  }
  @keyframes driftPulse {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(1.5px, -1.5px); }
  }

  .wordmark {
    font-size: 58px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: rgba(255, 255, 255, 0.96);
    line-height: 1;
  }
  .wordmark .drift { color: rgba(255, 255, 255, 0.96); }
  .wordmark .grid { color: rgba(255, 255, 255, 0.55); }

  .tagline {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.5);
    line-height: 1.5;
    text-align: center;
    max-width: 540px;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: rgba(255, 255, 255, 0.12);
    margin: 12px 0;
  }

  /* Start prompt — a single key chip with → arrow */
  .start-prompt {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.16em;
    color: rgba(255, 255, 255, 0.45);
    text-transform: uppercase;
    margin-top: 4px;
  }
  .start-prompt .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 28px;
    padding: 0 10px;
    border: 1px solid rgba(139, 92, 246, 0.5);
    background: rgba(139, 92, 246, 0.1);
    border-radius: 5px;
    font-size: 14px;
    font-weight: 500;
    color: rgba(198, 175, 255, 0.98);
    animation: kbdPulse 2.4s ease-in-out infinite;
  }
  @keyframes kbdPulse {
    0%, 100% {
      box-shadow: 0 0 0 0 rgba(139, 92, 246, 0);
      border-color: rgba(139, 92, 246, 0.5);
    }
    50% {
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.18);
      border-color: rgba(139, 92, 246, 0.8);
    }
  }

  /* Subtle walkthrough label at bottom */
  .walkthrough-meta {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255, 255, 255, 0.22);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .walkthrough-meta .bullet {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
  }
</style>
</head>
<body>
  <div class="stack">
    <svg class="logo-mark" viewBox="0 0 32 32" fill="none">
      <rect class="cell"       x="3"    y="3"    width="11" height="11" rx="1.5"/>
      <rect class="cell-drift" x="19.5" y="1.5"  width="11" height="11" rx="1.5"/>
      <rect class="cell"       x="3"    y="18"   width="11" height="11" rx="1.5"/>
      <rect class="cell"       x="18"   y="18"   width="11" height="11" rx="1.5"/>
    </svg>

    <div class="wordmark">
      <span class="drift">drift</span><span class="grid">grid</span>
    </div>

    <div class="tagline">
      Rapid design iteration for you and your agent.
    </div>

    <div class="divider"></div>

    <div class="start-prompt">
      <span class="kbd">→</span>
      start walkthrough
    </div>
  </div>

  <div class="walkthrough-meta">
    <span>welcome</span>
    <span class="bullet"></span>
    <span>9 beats</span>
    <span class="bullet"></span>
    <span>~90 seconds</span>
  </div>
</body>
</html>
