<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DriftGrid — Drift Down</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body {
    background: #0a0a0a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: rgba(255, 255, 255, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 120px 160px 80px;
  }
  .header {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 240px);
    gap: 56px;
    align-items: start;
    flex: 1;
  }
  .column {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .column-label {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
    height: 16px;
  }
  .card {
    position: relative;
    width: 240px;
    height: 135px;
    background: #141414;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.03), transparent 60%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
  }
  .card .vlabel {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.3);
    font-weight: 500;
  }
  /* Column 1 content */
  .col-1 .card::after {
    content: '';
    position: absolute;
    inset: 18px;
    background:
      linear-gradient(180deg, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 28px);
    border-radius: 4px;
  }
  /* Dim neighbors */
  .col-2, .col-3, .col-4 { opacity: 0.35; }
  .col-2 .card { background: #f5f5f5; }
  .col-2 .card::before { display: none; }
  .col-2 .card::after {
    content: '';
    position: absolute;
    left: 18px; right: 18px; top: 24px;
    height: 6px;
    background: #1a1a1a;
    border-radius: 2px;
    box-shadow: 0 14px 0 rgba(0,0,0,0.6), 0 28px 0 rgba(0,0,0,0.2);
  }
  .col-3 .card {
    background: linear-gradient(135deg, #2a1757, #0a0a0a);
  }
  .col-4 .card {
    background: #1a1410;
  }

  /* New empty slot */
  .new-card {
    position: relative;
    width: 240px;
    height: 135px;
    border: 2px dashed rgba(139, 92, 246, 0.5);
    border-radius: 10px;
    background: rgba(139, 92, 246, 0.04);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    outline: 3px solid #8b5cf6;
    outline-offset: -4px;
    transform: translateY(-30px);
    opacity: 0;
    animation: slideIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s forwards;
  }
  @keyframes slideIn {
    to { transform: translateY(0); opacity: 1; }
  }
  .nc-version {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.92);
  }
  .nc-tag {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8b5cf6;
    font-weight: 600;
  }
  .nc-prompt {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.4);
    margin-top: 4px;
    font-style: italic;
  }
  .hint {
    margin-top: 60px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  kbd {
    display: inline-block;
    padding: 2px 7px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 4px;
    font-family: inherit;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.6);
    margin: 0 3px;
  }
</style>
</head>
<body>
  <div class="header">DRIFT DOWN — NEW VERSION IN THIS CONCEPT</div>

  <div class="grid">
    <div class="column col-1">
      <div class="column-label">Dark Code</div>
      <div class="new-card">
        <div class="nc-version">v5</div>
        <div class="nc-tag">NEW VERSION</div>
        <div class="nc-prompt">What should this version be?</div>
      </div>
      <div class="card"><span class="vlabel">v4</span></div>
      <div class="card"><span class="vlabel">v3</span></div>
      <div class="card"><span class="vlabel">v2</span></div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
    <div class="column col-2">
      <div class="column-label">Light Clean</div>
      <div class="card"><span class="vlabel">v3</span></div>
      <div class="card"><span class="vlabel">v2</span></div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
    <div class="column col-3">
      <div class="column-label">Violet Bold</div>
      <div class="card"><span class="vlabel">v4</span></div>
      <div class="card"><span class="vlabel">v3</span></div>
      <div class="card"><span class="vlabel">v2</span></div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
    <div class="column col-4">
      <div class="column-label">Warm Editorial</div>
      <div class="card"><span class="vlabel">v3</span></div>
      <div class="card"><span class="vlabel">v2</span></div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
  </div>

  <div class="hint">press <kbd>D</kbd> to drift a new version</div>
</body>
</html>
