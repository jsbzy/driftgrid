<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DriftGrid — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body {
    background: #0a0a0a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: rgba(255, 255, 255, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 140px 160px 120px;
  }
  .headline {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 24px;
  }
  .subhead {
    font-size: 18px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.5);
    text-align: center;
    margin-bottom: 96px;
    letter-spacing: 0.01em;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 240px);
    gap: 56px;
    align-items: start;
  }
  .column {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .column-label {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .card {
    position: relative;
    width: 240px;
    height: 135px;
    background: #141414;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.03), transparent 60%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
  }
  .card .vlabel {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.3);
    font-weight: 500;
  }
  .card.selected {
    outline: 3px solid #8b5cf6;
    outline-offset: -4px;
  }
  /* Fake content hints per column */
  .col-1 .card::after {
    content: '';
    position: absolute;
    inset: 18px;
    background:
      linear-gradient(180deg, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 28px);
    border-radius: 4px;
  }
  .col-2 .card { background: #f5f5f5; }
  .col-2 .card::before { display: none; }
  .col-2 .card::after {
    content: '';
    position: absolute;
    left: 18px; right: 18px; top: 24px;
    height: 6px;
    background: #1a1a1a;
    border-radius: 2px;
    box-shadow:
      0 14px 0 rgba(0,0,0,0.6),
      0 28px 0 rgba(0,0,0,0.2);
  }
  .col-2 .card .vlabel { color: rgba(0,0,0,0.35); }
  .col-3 .card {
    background: linear-gradient(135deg, #2a1757 0%, #0a0a0a 100%);
  }
  .col-3 .card::after {
    content: '';
    position: absolute;
    inset: 20px;
    background: linear-gradient(180deg, rgba(139,92,246,0.35), transparent 60%);
    border-radius: 4px;
  }
  .col-4 .card {
    background: #1a1410;
  }
  .col-4 .card::after {
    content: '';
    position: absolute;
    left: 18px; right: 18px; top: 30px;
    height: 8px;
    background: rgba(234, 179, 80, 0.4);
    border-radius: 2px;
    box-shadow:
      0 16px 0 rgba(255,255,255,0.08),
      0 30px 0 rgba(255,255,255,0.06);
  }
</style>
</head>
<body>
  <h1 class="headline" data-drift-editable>An infinite grid for design iteration.</h1>
  <p class="subhead" data-drift-editable>Concepts across. Versions down. Your agent fills in the slots.</p>

  <div class="grid">
    <div class="column col-1">
      <div class="column-label">Dark Code</div>
      <div class="card"><span class="vlabel">v4</span></div>
      <div class="card selected"><span class="vlabel">v3</span></div>
      <div class="card"><span class="vlabel">v2</span></div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
    <div class="column col-2">
      <div class="column-label">Light Clean</div>
      <div class="card"><span class="vlabel">v3</span></div>
      <div class="card"><span class="vlabel">v2</span></div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
    <div class="column col-3">
      <div class="column-label">Violet Bold</div>
      <div class="card"><span class="vlabel">v4</span></div>
      <div class="card"><span class="vlabel">v3</span></div>
      <div class="card"><span class="vlabel">v2</span></div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
    <div class="column col-4">
      <div class="column-label">Warm Editorial</div>
      <div class="card"><span class="vlabel">v3</span></div>
      <div class="card"><span class="vlabel">v2</span></div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
  </div>
</body>
</html>
