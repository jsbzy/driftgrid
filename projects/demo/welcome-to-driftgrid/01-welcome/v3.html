<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to DriftGrid — 01 — Welcome v3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        html, body { width: 100%; height: 100vh; overflow: hidden; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #0f0f0f;
      color: #f2f2f0;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .drift-prompt {
      text-align: center;
      padding: 48px;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 24px;
    }
    .eyebrow .accent {
      color: rgba(212, 168, 74, 0.9);
    }
    .title {
      font-size: 56px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #f2f2f0;
      margin-bottom: 32px;
      line-height: 1.05;
    }
    .hint {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.35);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .prompt-preview {
      margin-top: 24px;
      margin-bottom: 0;
      padding: 16px 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.72);
      text-align: left;
      max-height: 180px;
      overflow: hidden;
      position: relative;
    }
    .prompt-preview::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 40px;
      background: linear-gradient(to bottom, rgba(15, 15, 15, 0), rgba(15, 15, 15, 1));
      pointer-events: none;
    }
    kbd {
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.7);
    }
    /* Subtle pulsing grid for the in-progress state */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 56px 56px;
      animation: grid-pulse 3.2s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes grid-pulse {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 1; }
    }
    </style>
</head>
<body>
    <div class="drift-prompt">
      <div class="eyebrow">01 — WELCOME · V3 · <span class="accent">AWAITING PROMPT</span></div>
      <h1 class="title">New version</h1>
      <div class="hint">press <kbd>C</kbd> to prompt · or leave feedback to start</div>
    </div>
</body>
</html>
