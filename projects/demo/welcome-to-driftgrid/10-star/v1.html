<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DriftGrid — Star Your Picks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body {
    background: #0a0a0a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: rgba(255, 255, 255, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 110px 160px 80px;
  }
  .title {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-align: center;
    max-width: 900px;
    line-height: 1.15;
    margin-bottom: 14px;
  }
  .subtitle {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 72px;
    text-align: center;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 240px);
    gap: 56px;
    align-items: start;
  }
  .column {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .column-label {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .card {
    position: relative;
    width: 240px;
    height: 135px;
    background: #141414;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.03), transparent 60%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
  }
  .card .vlabel {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.3);
    font-weight: 500;
  }
  .col-1 .card::after {
    content: '';
    position: absolute;
    inset: 18px;
    background: linear-gradient(180deg, rgba(139, 92, 246, 0.15), transparent 60%);
    border-radius: 4px;
  }
  .col-2 .card { background: #f5f5f5; }
  .col-2 .card::before { display: none; }
  .col-2 .card::after {
    content: '';
    position: absolute;
    left: 18px; right: 18px; top: 24px;
    height: 6px;
    background: #1a1a1a;
    border-radius: 2px;
    box-shadow: 0 14px 0 rgba(0,0,0,0.6), 0 28px 0 rgba(0,0,0,0.2);
  }
  .col-2 .card .vlabel { color: rgba(0,0,0,0.35); }
  .col-3 .card {
    background: linear-gradient(135deg, #2a1757, #0a0a0a);
  }
  .col-3 .card::after {
    content: '';
    position: absolute;
    inset: 20px;
    background: linear-gradient(180deg, rgba(139,92,246,0.35), transparent 60%);
    border-radius: 4px;
  }
  .col-4 .card {
    background: #1a1410;
  }
  .col-4 .card::after {
    content: '';
    position: absolute;
    left: 18px; right: 18px; top: 30px;
    height: 8px;
    background: rgba(245, 158, 11, 0.4);
    border-radius: 2px;
    box-shadow: 0 16px 0 rgba(255,255,255,0.08), 0 30px 0 rgba(255,255,255,0.06);
  }

  /* Star icon */
  .star {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% {
      transform: scale(1);
      filter: drop-shadow(0 0 4px rgba(250, 204, 21, 0.6));
    }
    50% {
      transform: scale(1.1);
      filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.9));
    }
  }
  .star svg {
    width: 18px;
    height: 18px;
    fill: #facc15;
    stroke: #facc15;
  }

  .hint {
    margin-top: 56px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  kbd {
    display: inline-block;
    padding: 2px 7px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 4px;
    font-family: inherit;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.6);
    margin: 0 3px;
  }
</style>
</head>
<body>
  <h2 class="title" data-drift-editable>Star versions across concepts —<br>these are your selects.</h2>
  <div class="subtitle">Starred versions become your presentation set.</div>

  <div class="grid">
    <div class="column col-1">
      <div class="column-label">Dark Code</div>
      <div class="card">
        <span class="vlabel">v4</span>
      </div>
      <div class="card">
        <div class="star"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
        <span class="vlabel">v3</span>
      </div>
      <div class="card"><span class="vlabel">v2</span></div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
    <div class="column col-2">
      <div class="column-label">Light Clean</div>
      <div class="card"><span class="vlabel">v3</span></div>
      <div class="card"><span class="vlabel">v2</span></div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
    <div class="column col-3">
      <div class="column-label">Violet Bold</div>
      <div class="card">
        <div class="star"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
        <span class="vlabel">v4</span>
      </div>
      <div class="card"><span class="vlabel">v3</span></div>
      <div class="card"><span class="vlabel">v2</span></div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
    <div class="column col-4">
      <div class="column-label">Warm Editorial</div>
      <div class="card"><span class="vlabel">v3</span></div>
      <div class="card">
        <div class="star"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
        <span class="vlabel">v2</span>
      </div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
  </div>

  <div class="hint">press <kbd>S</kbd> to star / unstar</div>
</body>
</html>
