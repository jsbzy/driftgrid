<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DriftGrid — Round 2 Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body {
    background: #0a0a0a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: rgba(255, 255, 255, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 88px 120px 80px;
  }

  /* Brand (top-left) */
  .brand {
    position: fixed;
    top: 24px;
    left: 32px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
  .brand-wordmark {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: rgba(255, 255, 255, 0.6);
    text-transform: lowercase;
  }

  /* Round switcher (top-right) */
  .round-nav {
    position: fixed;
    top: 22px;
    right: 32px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
  }
  .round-nav .project {
    color: rgba(255, 255, 255, 0.35);
    padding-right: 6px;
    border-right: 1px solid rgba(255, 255, 255, 0.1);
    margin-right: 4px;
  }
  .round-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 4px 9px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .round-btn.inactive {
    color: rgba(255, 255, 255, 0.4);
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.12);
  }
  .round-btn.active {
    color: rgba(255, 255, 255, 0.98);
    background: rgba(139, 92, 246, 0.2);
    border: 1px solid rgba(139, 92, 246, 0.6);
    box-shadow: 0 4px 16px rgba(139, 92, 246, 0.15);
  }

  /* Hero */
  .hero {
    text-align: center;
    margin-bottom: 52px;
  }
  .hero h1 {
    font-size: 48px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 18px;
    color: rgba(255, 255, 255, 0.95);
  }
  .hero p {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 0.01em;
    line-height: 1.6;
  }

  /* Stage — grid layout showing R2 concepts */
  .stage {
    position: relative;
    width: 100%;
    max-width: 1520px;
    display: flex;
    gap: 48px;
    justify-content: center;
    align-items: flex-start;
  }

  .column {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 230px;
    /* Stable — no fade animation so the thumbnail captures the final state */
  }

  .column-label {
    font-size: 10px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
  }
  .card {
    position: relative;
    width: 230px;
    height: 130px;
    background: #141414;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.03), transparent 60%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
  }
  .vlabel {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.3);
    font-weight: 500;
    z-index: 2;
  }

  /* Card themes — R2 has the latest drifted versions */
  .col-1 .card.top {
    border: 1px solid rgba(139, 92, 246, 0.35);
    box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.2);
  }
  .col-1 .card::after {
    content: '';
    position: absolute;
    inset: 18px;
    background:
      linear-gradient(180deg, rgba(139, 92, 246, 0.2) 0%, transparent 50%),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.045) 0 2px, transparent 2px 28px);
    border-radius: 3px;
  }
  .col-2 .card { background: #f5f5f5; }
  .col-2 .card::before { display: none; }
  .col-2 .card::after {
    content: '';
    position: absolute;
    left: 18px; right: 18px; top: 24px;
    height: 6px;
    background: #1a1a1a;
    border-radius: 2px;
    box-shadow: 0 14px 0 rgba(0,0,0,0.6), 0 28px 0 rgba(0,0,0,0.2);
  }
  .col-2 .card .vlabel { color: rgba(0,0,0,0.35); }
  .col-3 .card {
    background: linear-gradient(135deg, #2a1757 0%, #0a0a0a 100%);
  }
  .col-3 .card::after {
    content: '';
    position: absolute;
    inset: 20px;
    background: linear-gradient(180deg, rgba(139,92,246,0.4), transparent 60%);
    border-radius: 3px;
  }
  .col-4 .card { background: #1a1410; }
  .col-4 .card::after {
    content: '';
    position: absolute;
    left: 18px; right: 18px; top: 30px;
    height: 7px;
    background: rgba(234, 179, 80, 0.45);
    border-radius: 2px;
    box-shadow: 0 16px 0 rgba(255,255,255,0.08), 0 30px 0 rgba(255,255,255,0.06);
  }
  .col-5 .card { background: #1a1410; }
  .col-5 .card::after {
    content: '';
    position: absolute;
    inset: 16px 22px;
    background:
      linear-gradient(90deg, rgba(244, 232, 210, 0.85) 0%, rgba(244, 232, 210, 0.85) 62%, transparent 62%);
    background-size: 100% 14px;
    background-position: 0 0;
    background-repeat: no-repeat;
  }

  /* "New" badge on top card of each column (R2's fresh drifts) */
  .fresh-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    padding: 3px 7px;
    border-radius: 10px;
    background: rgba(139, 92, 246, 0.95);
    color: rgba(10, 10, 10, 0.95);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 3px 12px rgba(139, 92, 246, 0.4);
    z-index: 5;
    animation: freshPulse 2.4s ease-in-out infinite;
  }
  @keyframes freshPulse {
    0%, 100% { box-shadow: 0 3px 12px rgba(139, 92, 246, 0.4); }
    50%      { box-shadow: 0 3px 18px rgba(139, 92, 246, 0.7); }
  }

  /* Round banner — floats just above the grid */
  .round-banner {
    position: absolute;
    left: 50%;
    top: -48px;
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: rgba(139, 92, 246, 0.1);
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    color: rgba(198, 175, 255, 0.95);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .round-banner .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(139, 92, 246, 0.95);
    box-shadow: 0 0 8px rgba(139, 92, 246, 0.6);
  }
</style>
</head>
<body>
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 32 32" fill="none">
      <rect x="3" y="3" width="11" height="11" rx="1.5" fill="rgba(255,255,255,0.45)"/>
      <rect x="18" y="3" width="11" height="11" rx="1.5" fill="rgba(255,255,255,0.45)"/>
      <rect x="3" y="18" width="11" height="11" rx="1.5" fill="rgba(255,255,255,0.45)"/>
      <rect x="19.5" y="19.5" width="11" height="11" rx="1.5" fill="#8b5cf6"/>
    </svg>
    <span class="brand-wordmark">driftgrid</span>
  </div>

  <div class="round-nav">
    <span class="project">demo-project</span>
    <span class="round-btn inactive">R1</span>
    <span class="round-btn active">R2</span>
  </div>

  <div class="hero">
    <h1 data-drift-editable>Round 2 is live</h1>
    <p data-drift-editable>Fresh drifts across every concept. R1 is still there when you need it.</p>
  </div>

  <div class="stage">
    <div class="round-banner">
      <span class="dot"></span>
      Round 2 · Client Review
    </div>

    <div class="column col-1">
      <div class="column-label">Dark Code</div>
      <div class="card top">
        <div class="fresh-badge">new</div>
        <span class="vlabel">v5</span>
      </div>
      <div class="card"><span class="vlabel">v4</span></div>
      <div class="card"><span class="vlabel">v3</span></div>
    </div>
    <div class="column col-2">
      <div class="column-label">Light Clean</div>
      <div class="card">
        <div class="fresh-badge">new</div>
        <span class="vlabel">v3</span>
      </div>
      <div class="card"><span class="vlabel">v2</span></div>
    </div>
    <div class="column col-3">
      <div class="column-label">Violet Bold</div>
      <div class="card">
        <div class="fresh-badge">new</div>
        <span class="vlabel">v5</span>
      </div>
      <div class="card"><span class="vlabel">v4</span></div>
      <div class="card"><span class="vlabel">v3</span></div>
    </div>
    <div class="column col-4">
      <div class="column-label">Warm Editorial</div>
      <div class="card"><span class="vlabel">v3</span></div>
      <div class="card"><span class="vlabel">v2</span></div>
    </div>
    <div class="column col-5">
      <div class="column-label">New Concept</div>
      <div class="card">
        <div class="fresh-badge">new</div>
        <span class="vlabel">v2</span>
      </div>
      <div class="card"><span class="vlabel">v1</span></div>
    </div>
  </div>
</body>
</html>
