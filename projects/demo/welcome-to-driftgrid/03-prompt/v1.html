<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DriftGrid — Leave a Prompt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body {
    background: #0a0a0a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: rgba(255, 255, 255, 0.92);
    display: flex;
    flex-direction: column;
  }
  .topbar {
    height: 52px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    align-items: center;
    padding: 0 40px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 0.05em;
    gap: 12px;
  }
  .crumb { color: rgba(255, 255, 255, 0.5); }
  .crumb-sep { color: rgba(255, 255, 255, 0.2); }
  .crumb-current { color: rgba(255, 255, 255, 0.92); }
  .dot-group { display: flex; gap: 6px; margin-right: 20px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.1); }
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 160px 20px;
    position: relative;
  }
  .frame {
    width: 1200px;
    height: 760px;
    background: #0f0f10;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    padding: 80px 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: visible;
  }
  .brand {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 28px;
    text-transform: uppercase;
  }
  .hero {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.05;
    max-width: 820px;
    margin-bottom: 28px;
    position: relative;
  }
  .desc {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.5);
    max-width: 560px;
    line-height: 1.6;
    margin-bottom: 44px;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.92);
    padding: 14px 22px;
    border-radius: 6px;
    font-size: 13px;
    width: fit-content;
  }

  /* Comment pin */
  .pin-wrap {
    position: absolute;
    top: 120px;
    left: 420px;
  }
  .pin {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #8b5cf6;
    box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.25), 0 0 24px rgba(139, 92, 246, 0.6);
  }
  .popup {
    position: absolute;
    left: 32px;
    top: -8px;
    width: 360px;
    background: rgba(20, 20, 22, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(139, 92, 246, 0.4);
    border-radius: 10px;
    padding: 18px;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
  }
  .popup::before {
    content: '';
    position: absolute;
    left: -7px;
    top: 18px;
    width: 12px;
    height: 12px;
    background: rgba(20, 20, 22, 0.95);
    border-left: 1px solid rgba(139, 92, 246, 0.4);
    border-bottom: 1px solid rgba(139, 92, 246, 0.4);
    transform: rotate(45deg);
  }
  .popup-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: rgba(255, 255, 255, 0.3);
    margin-bottom: 12px;
  }
  .input-row {
    display: flex;
    align-items: center;
    background: #0a0a0a;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.92);
    min-height: 44px;
  }
  .cursor {
    display: inline-block;
    width: 2px;
    height: 16px;
    background: #8b5cf6;
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    50.01%, 100% { opacity: 0; }
  }
  .popup-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  kbd {
    display: inline-block;
    padding: 2px 6px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 3px;
    font-family: inherit;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.6);
  }
  .hint {
    text-align: center;
    padding: 20px 0 28px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .hint kbd { margin: 0 3px; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="dot-group">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <span class="crumb">demo</span>
    <span class="crumb-sep">/</span>
    <span class="crumb">wavelength</span>
    <span class="crumb-sep">/</span>
    <span class="crumb">Dark Code</span>
    <span class="crumb-sep">/</span>
    <span class="crumb-current">v3</span>
  </div>

  <div class="stage">
    <div class="frame">
      <div class="brand">WAVELENGTH</div>
      <h1 class="hero" data-drift-editable>Ship products your team<br>can actually maintain.</h1>
      <p class="desc" data-drift-editable>A lightweight framework for engineering teams who want clarity over cleverness.</p>
      <div class="cta">Get started <span>→</span></div>

      <div class="pin-wrap">
        <div class="pin"></div>
        <div class="popup">
          <div class="popup-label">New comment</div>
          <div class="input-row">
            make it warmer and more inviting<span class="cursor"></span>
          </div>
          <div class="popup-footer">
            <span>Thread #4</span>
            <span><kbd>Enter</kbd> to post</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="hint">press <kbd>C</kbd> to leave a comment</div>
</body>
</html>
