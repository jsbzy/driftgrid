<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DriftGrid — Comment and Edit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100vh; overflow: hidden; }
  body {
    background: #0a0a0a;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: rgba(255, 255, 255, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 88px 80px 80px;
  }

  /* Brand (top-left) */
  .brand {
    position: fixed;
    top: 24px;
    left: 32px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark { width: 20px; height: 20px; flex-shrink: 0; }
  .brand-wordmark {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: rgba(255, 255, 255, 0.6);
    text-transform: lowercase;
  }
  .chrome-label {
    position: fixed;
    top: 24px;
    right: 32px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
  }

  /* Hero */
  .hero {
    text-align: center;
    margin-bottom: 44px;
  }
  .hero h1 {
    font-size: 48px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 18px;
    color: rgba(255, 255, 255, 0.95);
  }
  .hero p {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 0.01em;
    line-height: 1.6;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }
  .kbd-inline { display: inline-flex; align-items: center; gap: 3px; }
  .kbd-inline .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 22px;
    padding: 0 7px;
    border: 1px solid rgba(139, 92, 246, 0.5);
    background: rgba(139, 92, 246, 0.1);
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    color: rgba(198, 175, 255, 0.95);
  }

  /* Stage */
  .stage {
    position: relative;
    width: 100%;
    max-width: 1200px;
    height: 540px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Desktop browser frame (same look as canvas v3 end state) */
  .browser {
    width: 980px;
    height: 520px;
    background: #ffffff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.05);
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .browser-chrome {
    height: 40px;
    background: #e8e8e8;
    border-bottom: 1px solid rgba(10, 10, 10, 0.08);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    flex-shrink: 0;
  }
  .tlights { display: flex; gap: 6px; }
  .tlight { width: 10px; height: 10px; border-radius: 50%; }
  .tlight.red { background: #ff5f57; }
  .tlight.yellow { background: #febc2e; }
  .tlight.green { background: #28c840; }
  .addr-bar {
    flex: 1;
    height: 22px;
    background: #ffffff;
    border-radius: 4px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 10px;
    color: rgba(10, 10, 10, 0.5);
    letter-spacing: 0.02em;
    border: 1px solid rgba(10, 10, 10, 0.06);
  }
  .canvas-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 4px;
    background: rgba(139, 92, 246, 0.12);
    border: 1px solid rgba(139, 92, 246, 0.4);
    color: rgba(100, 60, 215, 0.95);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .browser-body {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: #fafafa;
  }

  /* Hero section of the website being reviewed */
  .site-hero {
    padding: 56px 64px 72px;
    position: relative;
  }
  .site-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 56px;
  }
  .site-nav .logo {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #1a1a1a;
  }
  .site-nav .nav-items { display: flex; gap: 22px; }
  .site-nav .nav-item {
    width: 48px;
    height: 6px;
    background: rgba(10, 10, 10, 0.32);
    border-radius: 2px;
  }

  .site-headline {
    width: 76%;
    height: 32px;
    background: #1a1a1a;
    border-radius: 3px;
    margin-bottom: 10px;
    transform-origin: left center;
    animation: headlineEdit 13s ease-out infinite;
  }
  .site-headline.two {
    width: 58%;
    margin-bottom: 26px;
  }
  /* The edit animation — headline gets bigger and a subhead appears */
  @keyframes headlineEdit {
    0%, 70%   { height: 32px; }
    76%, 100% { height: 44px; }
  }
  .site-headline.two {
    animation: headline2Edit 13s ease-out infinite;
  }
  @keyframes headline2Edit {
    0%, 70%   { height: 32px; width: 58%; }
    76%, 100% { height: 44px; width: 68%; }
  }
  .site-subhead-new {
    width: 50%;
    height: 8px;
    background: rgba(139, 92, 246, 0.7);
    border-radius: 2px;
    margin-bottom: 28px;
    opacity: 0;
    animation: newSubhead 13s ease-out infinite;
  }
  @keyframes newSubhead {
    0%, 74%   { opacity: 0; transform: translateY(-4px); }
    80%, 100% { opacity: 1; transform: translateY(0); }
  }

  .site-body {
    width: 48%;
    height: 6px;
    background: rgba(10, 10, 10, 0.3);
    border-radius: 1px;
    margin-bottom: 8px;
  }
  .site-body.short {
    width: 38%;
    margin-bottom: 32px;
  }
  .site-cta {
    width: 140px;
    height: 40px;
    background: #8b5cf6;
    border-radius: 5px;
    box-shadow: 0 8px 24px rgba(139, 92, 246, 0.2);
  }

  /* Comment pin — appears where the user clicks */
  .pin {
    position: absolute;
    top: 150px;
    left: 64px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(139, 92, 246, 0.95);
    border: 2px solid #ffffff;
    box-shadow: 0 4px 14px rgba(139, 92, 246, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #ffffff;
    opacity: 0;
    z-index: 5;
    animation: pinIn 13s ease-out infinite;
  }
  .pin::before { content: 'C'; }
  @keyframes pinIn {
    0%, 6%    { opacity: 0; transform: scale(0.2); }
    10%       { opacity: 1; transform: scale(1.3); }
    14%, 94%  { opacity: 1; transform: scale(1); }
    97%, 100% { opacity: 0; transform: scale(0.2); }
  }
  /* Pulsing ring behind the pin while comment is active */
  .pin::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid rgba(139, 92, 246, 0.5);
    animation: pinRing 2s ease-out infinite;
  }
  @keyframes pinRing {
    0%   { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  /* Cursor indicator (appears before the click) */
  .cursor {
    position: absolute;
    top: 140px;
    left: 56px;
    width: 20px;
    height: 20px;
    z-index: 6;
    opacity: 0;
    animation: cursorIn 13s ease-out infinite;
  }
  @keyframes cursorIn {
    0%, 1%    { opacity: 0; transform: translate(-20px, 20px); }
    4%        { opacity: 1; transform: translate(-10px, 10px); }
    7%        { opacity: 1; transform: translate(0, 0); }
    8%        { opacity: 1; transform: translate(0, 0) scale(0.85); }
    10%, 14%  { opacity: 1; transform: translate(0, 0) scale(1); }
    18%, 100% { opacity: 0; transform: translate(0, 0) scale(1); }
  }
  .cursor svg { width: 100%; height: 100%; }

  /* Comment popup — expands from the pin */
  .comment-popup {
    position: absolute;
    top: 186px;
    left: 100px;
    width: 340px;
    background: rgba(10, 10, 10, 0.96);
    border: 1px solid rgba(139, 92, 246, 0.35);
    border-radius: 8px;
    padding: 14px 16px 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(139, 92, 246, 0.2);
    opacity: 0;
    transform: translateY(-6px) scale(0.95);
    transform-origin: top left;
    z-index: 7;
    animation: popupIn 13s ease-out infinite;
  }
  @keyframes popupIn {
    0%, 14%   { opacity: 0; transform: translateY(-6px) scale(0.95); }
    20%       { opacity: 1; transform: translateY(0) scale(1); }
    68%       { opacity: 1; transform: translateY(0) scale(1); }
    74%, 100% { opacity: 0; transform: translateY(-6px) scale(0.95); }
  }

  .comment-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .comment-chip {
    width: 18px;
    height: 18px;
    border: 1px solid rgba(139, 92, 246, 0.6);
    background: rgba(139, 92, 246, 0.18);
    border-radius: 3px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    color: rgba(198, 175, 255, 0.98);
  }
  .comment-meta {
    font-size: 9px;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
  }
  .comment-body {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.9);
    line-height: 1.55;
    min-height: 19px;
    margin-bottom: 10px;
  }
  .typed-wrap {
    display: inline-block;
    overflow: hidden;
    white-space: normal;
    max-width: 0;
    vertical-align: bottom;
    animation: typePrompt 13s steps(44, end) infinite;
  }
  @keyframes typePrompt {
    0%, 22%   { max-width: 0; }
    42%, 68%  { max-width: 100%; }
    74%, 100% { max-width: 0; }
  }
  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: rgba(139, 92, 246, 0.9);
    margin-left: 1px;
    vertical-align: middle;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .comment-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    font-size: 9px;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.35);
    text-transform: uppercase;
  }
  .comment-submit {
    padding: 4px 10px;
    background: rgba(139, 92, 246, 0.85);
    border-radius: 3px;
    color: rgba(10, 10, 10, 0.95);
    font-weight: 700;
    font-size: 9px;
  }
</style>
</head>
<body>
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 32 32" fill="none">
      <rect x="3" y="3" width="11" height="11" rx="1.5" fill="rgba(255,255,255,0.45)"/>
      <rect x="18" y="3" width="11" height="11" rx="1.5" fill="rgba(255,255,255,0.45)"/>
      <rect x="3" y="18" width="11" height="11" rx="1.5" fill="rgba(255,255,255,0.45)"/>
      <rect x="19.5" y="19.5" width="11" height="11" rx="1.5" fill="#8b5cf6"/>
    </svg>
    <span class="brand-wordmark">driftgrid</span>
  </div>
  <div class="chrome-label">demo-project · R1</div>

  <div class="hero">
    <h1 data-drift-editable>Comment on anything</h1>
    <p>
      Press <span class="kbd-inline"><span class="kbd">C</span></span>
      to drop a prompt anywhere on the frame — your agent applies it in place.
    </p>
  </div>

  <div class="stage">
    <div class="browser">
      <div class="browser-chrome">
        <div class="tlights">
          <div class="tlight red"></div>
          <div class="tlight yellow"></div>
          <div class="tlight green"></div>
        </div>
        <div class="addr-bar">light-clean.html</div>
        <div class="canvas-tag">Desktop · 1440</div>
      </div>
      <div class="browser-body">
        <div class="site-hero">
          <div class="site-nav">
            <div class="logo"></div>
            <div class="nav-items">
              <div class="nav-item"></div>
              <div class="nav-item"></div>
              <div class="nav-item"></div>
              <div class="nav-item"></div>
            </div>
          </div>
          <div class="site-headline"></div>
          <div class="site-headline two"></div>
          <div class="site-subhead-new"></div>
          <div class="site-body"></div>
          <div class="site-body short"></div>
          <div class="site-cta"></div>
        </div>

        <!-- Cursor + pin + popup overlay -->
        <div class="cursor">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="M 2 2 L 2 16 L 6 12 L 10 18 L 12 17 L 8 11 L 14 11 Z"
                  fill="#ffffff" stroke="#0a0a0a" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="pin"></div>
        <div class="comment-popup">
          <div class="comment-head">
            <span class="comment-chip">C</span>
            <span class="comment-meta">you · just now</span>
          </div>
          <div class="comment-body"><span class="typed-wrap">Make the headline bigger and add a punchy subtitle.</span><span class="cursor-blink"></span></div>
          <div class="comment-foot">
            <span>↵ send</span>
            <span class="comment-submit">Prompt agent</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
