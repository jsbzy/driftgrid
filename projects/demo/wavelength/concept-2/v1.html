<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wavelength</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            padding: 0 140px;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        .container {
            max-width: 640px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
        }

        .status-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: #22c55e;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1 {
            font-size: 60px;
            font-weight: 700;
            line-height: 1.06;
            letter-spacing: -0.03em;
            color: #fafafa;
            margin-bottom: 24px;
        }

        .description {
            font-size: 17px;
            line-height: 1.7;
            color: #737373;
            max-width: 480px;
            margin-bottom: 44px;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            background: transparent;
            color: #fafafa;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #262626;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            letter-spacing: 0.02em;
        }

        .cta-cursor {
            color: #22c55e;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .version {
            margin-top: 64px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #404040;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">
            <span class="status-dot"></span>
            <span class="status-text" data-drift-editable="status" data-drift-maxlen="30">All systems operational</span>
        </div>
        <h1 data-drift-editable="headline" data-drift-maxlen="60">Communication for teams who build</h1>
        <p class="description" data-drift-editable="description" data-drift-maxlen="200">Wavelength is built for engineering teams. Threaded conversations, inline code sharing, and integrations with the tools you already use. No fluff.</p>
        <a class="cta" href="#">
            <span data-drift-editable="cta" data-drift-maxlen="30">wavelength init --start</span>
            <span class="cta-cursor">_</span>
        </a>
        <p class="version" data-drift-editable="version" data-drift-maxlen="30">v0.9.2-beta</p>
    </div>
</body>
</html>
