<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wavelength</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        .container {
            text-align: center;
            max-width: 680px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
            margin-bottom: 32px;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            background: #2563eb;
            border-radius: 50%;
        }

        h1 {
            font-size: 56px;
            font-weight: 700;
            line-height: 1.08;
            letter-spacing: -0.03em;
            color: #0a0a0a;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 18px;
            line-height: 1.6;
            color: #6b7280;
            max-width: 520px;
            margin: 0 auto 40px;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: -0.01em;
        }

        .cta-arrow {
            font-size: 16px;
            transition: transform 0.2s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">
            <span class="badge-dot"></span>
            <span data-drift-editable="badge" data-drift-maxlen="40">Now in public beta</span>
        </div>
        <h1 data-drift-editable="headline" data-drift-maxlen="60">Team communication, finally in sync</h1>
        <p class="subtitle" data-drift-editable="subtitle" data-drift-maxlen="140">Wavelength brings your conversations, decisions, and context into one place. No more switching between apps to find what matters.</p>
        <a class="cta" href="#">
            <span data-drift-editable="cta" data-drift-maxlen="30">Get started free</span>
            <span class="cta-arrow">&rarr;</span>
        </a>
    </div>
</body>
</html>
