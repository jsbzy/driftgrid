<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wavelength</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        /* Subtle dot grid */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, #e5e7eb 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.5;
        }

        .container {
            text-align: center;
            max-width: 780px;
            position: relative;
            z-index: 1;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: #eff6ff;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            color: #2563eb;
            margin-bottom: 36px;
        }

        h1 {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.02;
            letter-spacing: -0.04em;
            color: #0a0a0a;
            margin-bottom: 24px;
        }

        h1 span {
            color: #2563eb;
        }

        .subtitle {
            font-size: 19px;
            line-height: 1.6;
            color: #6b7280;
            max-width: 540px;
            margin: 0 auto 44px;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: #2563eb;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: -0.01em;
            box-shadow: 0 1px 2px rgba(37, 99, 235, 0.2), 0 8px 24px rgba(37, 99, 235, 0.15);
        }

        .cta-arrow {
            font-size: 17px;
        }

        .trust {
            margin-top: 48px;
            font-size: 13px;
            color: #9ca3af;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <div class="badge">
            <span data-drift-editable="badge" data-drift-maxlen="40">Launching Spring 2026</span>
        </div>
        <h1 data-drift-editable="headline" data-drift-maxlen="60">Communication that <span>stays in sync</span></h1>
        <p class="subtitle" data-drift-editable="subtitle" data-drift-maxlen="140">One workspace for your team's conversations, decisions, and shared context. Wavelength keeps everyone aligned without the noise.</p>
        <a class="cta" href="#">
            <span data-drift-editable="cta" data-drift-maxlen="30">Start for free</span>
            <span class="cta-arrow">&rarr;</span>
        </a>
        <p class="trust" data-drift-editable="trust" data-drift-maxlen="60">No credit card required &middot; Free for teams up to 10</p>
    </div>
</body>
</html>
