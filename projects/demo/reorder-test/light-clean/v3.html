<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wavelength</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        /* Subtle dot grid */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, #e5e7eb 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.35;
        }

        .layout {
            display: flex;
            align-items: center;
            gap: 80px;
            position: relative;
            z-index: 1;
            padding: 0 120px;
            width: 100%;
            max-width: 1920px;
        }

        .content {
            flex: 1;
            max-width: 600px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: #eff6ff;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            color: #2563eb;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.04;
            letter-spacing: -0.04em;
            color: #0a0a0a;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 18px;
            line-height: 1.65;
            color: #6b7280;
            margin-bottom: 36px;
            max-width: 480px;
        }

        .cta-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .cta-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            border-radius: 100px;
            text-decoration: none;
            box-shadow: 0 1px 2px rgba(37, 99, 235, 0.2), 0 8px 24px rgba(37, 99, 235, 0.15);
        }

        .cta-secondary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 14px 24px;
            color: #374151;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
        }

        .cta-secondary span:last-child {
            font-size: 14px;
        }

        /* Product mockup - CSS only */
        .mockup {
            flex-shrink: 0;
            width: 520px;
            height: 400px;
            position: relative;
        }

        .mockup-window {
            width: 100%;
            height: 100%;
            background: #f9fafb;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 24px 48px rgba(0,0,0,0.06);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .mockup-titlebar {
            height: 44px;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
        }

        .mockup-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e5e7eb;
        }

        .mockup-body {
            flex: 1;
            display: flex;
            padding: 16px;
            gap: 12px;
        }

        .mockup-sidebar {
            width: 140px;
            background: #ffffff;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mockup-sidebar-item {
            height: 10px;
            background: #e5e7eb;
            border-radius: 4px;
        }

        .mockup-sidebar-item.active {
            background: #dbeafe;
        }

        .mockup-main {
            flex: 1;
            background: #ffffff;
            border-radius: 10px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mockup-msg {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .mockup-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .mockup-avatar.blue { background: #dbeafe; }
        .mockup-avatar.green { background: #d1fae5; }
        .mockup-avatar.purple { background: #ede9fe; }

        .mockup-bubble {
            flex: 1;
        }

        .mockup-name {
            height: 8px;
            width: 60px;
            background: #d1d5db;
            border-radius: 3px;
            margin-bottom: 6px;
        }

        .mockup-text {
            height: 8px;
            background: #e5e7eb;
            border-radius: 3px;
            margin-bottom: 4px;
        }

        .mockup-text:last-child {
            width: 70%;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="layout">
        <div class="content">
            <div class="badge">
                <span data-drift-editable="badge" data-drift-maxlen="40">Now in public beta</span>
            </div>
            <h1 data-drift-editable="headline" data-drift-maxlen="60">Where teams find their rhythm</h1>
            <p class="subtitle" data-drift-editable="subtitle" data-drift-maxlen="140">Wavelength is the team communication platform that brings conversations, decisions, and context together in one calm, focused workspace.</p>
            <div class="cta-group">
                <a class="cta-primary" href="#">
                    <span data-drift-editable="cta" data-drift-maxlen="30">Get started free</span>
                    <span>&rarr;</span>
                </a>
                <a class="cta-secondary" href="#">
                    <span data-drift-editable="cta-secondary" data-drift-maxlen="30">Watch demo</span>
                    <span>&rarr;</span>
                </a>
            </div>
        </div>
        <div class="mockup">
            <div class="mockup-window">
                <div class="mockup-titlebar">
                    <div class="mockup-dot"></div>
                    <div class="mockup-dot"></div>
                    <div class="mockup-dot"></div>
                </div>
                <div class="mockup-body">
                    <div class="mockup-sidebar">
                        <div class="mockup-sidebar-item active" style="width: 80%;"></div>
                        <div class="mockup-sidebar-item" style="width: 90%;"></div>
                        <div class="mockup-sidebar-item" style="width: 65%;"></div>
                        <div class="mockup-sidebar-item" style="width: 75%;"></div>
                        <div class="mockup-sidebar-item" style="width: 60%;"></div>
                    </div>
                    <div class="mockup-main">
                        <div class="mockup-msg">
                            <div class="mockup-avatar blue"></div>
                            <div class="mockup-bubble">
                                <div class="mockup-name"></div>
                                <div class="mockup-text" style="width: 90%;"></div>
                                <div class="mockup-text" style="width: 60%;"></div>
                            </div>
                        </div>
                        <div class="mockup-msg">
                            <div class="mockup-avatar green"></div>
                            <div class="mockup-bubble">
                                <div class="mockup-name" style="width: 50px;"></div>
                                <div class="mockup-text" style="width: 80%;"></div>
                                <div class="mockup-text" style="width: 45%;"></div>
                            </div>
                        </div>
                        <div class="mockup-msg">
                            <div class="mockup-avatar purple"></div>
                            <div class="mockup-bubble">
                                <div class="mockup-name" style="width: 70px;"></div>
                                <div class="mockup-text" style="width: 95%;"></div>
                                <div class="mockup-text" style="width: 70%;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
