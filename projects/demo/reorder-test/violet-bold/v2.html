<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wavelength</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100vh; overflow: hidden; }
        body {
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 40%, #2563eb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        @media print { html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

        .container {
            text-align: center;
            max-width: 700px;
            position: relative;
            z-index: 2;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 36px;
        }

        h1 {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.04;
            letter-spacing: -0.04em;
            color: #ffffff;
            margin-bottom: 24px;
        }

        .subtitle {
            font-size: 19px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            max-width: 500px;
            margin: 0 auto 48px;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: #ffffff;
            color: #4f46e5;
            font-size: 16px;
            font-weight: 700;
            border-radius: 100px;
            text-decoration: none;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
        }

        /* Floating UI elements */
        .float-card {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            padding: 16px 20px;
            z-index: 1;
        }

        .float-card-1 {
            top: 160px;
            left: 100px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .float-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
        }

        .float-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        .float-msg {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2px;
        }

        .float-card-2 {
            top: 180px;
            right: 120px;
        }

        .float-emoji {
            font-size: 20px;
            margin-bottom: 6px;
        }

        .float-stat {
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
        }

        .float-stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 2px;
        }

        .float-card-3 {
            bottom: 180px;
            left: 140px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .float-dot-green {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
        }

        .float-online {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
        }

        .float-card-4 {
            bottom: 200px;
            right: 100px;
        }

        .float-threads {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .float-thread-count {
            background: rgba(255, 255, 255, 0.2);
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="float-card float-card-1">
        <div class="float-avatar"></div>
        <div>
            <div class="float-name">Sarah K.</div>
            <div class="float-msg">Just shipped the update</div>
        </div>
    </div>

    <div class="float-card float-card-2">
        <div class="float-emoji">&#9889;</div>
        <div class="float-stat">142</div>
        <div class="float-stat-label">Messages today</div>
    </div>

    <div class="float-card float-card-3">
        <div class="float-dot-green"></div>
        <div class="float-online">12 online</div>
    </div>

    <div class="float-card float-card-4">
        <div class="float-threads">
            Threads <span class="float-thread-count">8 active</span>
        </div>
    </div>

    <div class="container">
        <div class="badge">
            <span data-drift-editable="badge" data-drift-maxlen="40">New: Smart thread summaries</span>
        </div>
        <h1 data-drift-editable="headline" data-drift-maxlen="60">Your team, always on the same wavelength</h1>
        <p class="subtitle" data-drift-editable="subtitle" data-drift-maxlen="140">The communication platform designed for modern teams. Organized threads, real-time presence, and context that never gets lost.</p>
        <a class="cta" href="#">
            <span data-drift-editable="cta" data-drift-maxlen="30">Get started free &rarr;</span>
        </a>
    </div>
</body>
</html>
